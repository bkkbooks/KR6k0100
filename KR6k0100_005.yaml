body:
  text: 姚秦三藏法師鳩摩羅什奉詔譯明廣陵傳戒後學沙門寂光直解菩薩心地品之下第二十一瞋打報仇戒佛言佛子不得以瞋報瞋以打報打若殺父母兄弟六親不得加報若國主為他人殺者亦不得加報殺生報生不順孝道尚不畜奴婢打拍罵辱日日起三業口罪無量況故作七逆之罪而出家菩薩無慈心報仇乃至六親中故作報者犯輕垢罪此釋瞋打報仇戒也此戒繇上以慈心故行放生業而來以彼文中觀一切男子是我父一切女人是我母即今瞋打我者亦皆是我父母既作是觀寧有其子以瞋打報父母者乎且瞋乃根本煩惱中最重之一此法增恚為性長惡為業于慈愍中乖菩提道而修菩薩行者發弘誓願以度衆生故當以慈心為本若乃起一瞋心則違本願即捨衆生而失本慈故戒之也佛言佛子者標名以勸不得以瞋報瞋以打報打正欲菩薩心空境寂人我雙忘不得懷不仁心以瞋打報仇也若殺父母等者以重況輕之意謂不但彼瞋打己身不得懷報即若殺我父母兄弟六親之親亦不得加報又國主設為他人殺者即亦不得加報夫以不共戴天之仇義當反報而諸佛皆戒不得加報是為何義蓋為菩薩化導衆生斷除煩惱結縛出離三界輪回令其永絶生死得大解脫何得殺一生而報一生使諸衆生生生世世互殺不已上云一切男子女人是我父母今若殺生報生是殺多生父母以報今生父母豈孝順之道耶是故殺生報生不順孝道也又不特此且修道人尚不得畜奴婢打拍罵辱日日所起打拍身業罵辱口業瞋怒意業此三業中口業罪過尚得無量何況故作殺父母以報父母不順孝道之七逆罪耶是故不得瞋打報仇也而出家下辨明不得報仇意所言不得報者唯謂出家菩薩正當冤親平等人我兩忘何得懷報似俗人之怨害相尋者乎問設我不報豈不縱彼行殺耶答我念既不加報人亦不起害心故此兩得解脫若在家菩薩有位行權或報可也而出家菩薩無有慈心為己瞋打報仇乃至為六親中故爾報仇者犯輕垢罪第二十二憍慢不請法戒若佛子初始出家未有所解而自恃聰明有智或恃高貴年宿或恃大姓高門大解大富饒財七寶以此憍慢而不咨受先學法師經律其法師者或小姓年少卑門貧窮下賤諸根不具而實有德一切經律盡解而新學菩薩不得觀法師種姓而不來咨受法師第一義諦者犯輕垢罪此釋憍慢不請法戒也憍者謂於己盛事深生染著醉傲為性能障不憍染依為業蓋憍醉者生長一切雜染法故此貪分攝謂不憍者即無貪也即二十隨煩惱中之一憍者謂恃己於他高舉為性能障不慢生苦為業蓋為慢於有德心不謙下繇此生死輪轉無窮受諸苦故即六根本煩惱中之一此二煩惱能障諸修行人一切功德不得成就故戒之也若佛子下標明憍慢根本言此佛子自初發心出家離塵脫俗之時始而見識未廣學力未深於第一義諦無我法中甚深理趣毫未有所得解而自恃聰明有智不知此等聰明乃世諦中能所知見非出世法中正知見也或恃名位高貴或恃身當年宿或恃其家大姓高門與夫學問大解資産大富饒財七寶如是所有皆世俗中所最尚者俱非出世尊重之道而初出家佛子以恃此憍慢故而不虗心咨問領受先學法師所說經律所謂既飲毒藥真藥現前則不能下此也此上皆能恃憍慢之心其法師下明所恃憍慢之境其法師者或小姓年少者對上自恃大姓年宿或卑門貧窮下賤者對上自恃高門高貴大富或諸根不具者對上自恃聰明有智而實有下正明不得以迹取人所謂依德不依人也如是法師雖然對世間法一一不如而於出世品位實為有德又彼學識廣大一切經律盡能通解堪為後昆模範而諸新學菩薩不得觀法師種姓優劣妄生憍慢應當未聞求聞未解請解如以出處自相高下恃慢於心而竟不來咨受法師所演第一義諦者犯輕垢罪第二十三憍慢僻說戒若佛子佛滅度後欲以好心受菩薩戒時於佛菩薩形像前自誓受戒當七日佛前懺悔得見好相便得戒若不得好相時應二七三七乃至一年要得好相得好相已便得佛菩薩形像前受戒若不得好相雖佛像前受戒不得戒若現前先受菩薩戒法師前受戒時不須要見好相何以故是法師師師相授故不須好相是以法師前受戒即得戒以生至重心故便得戒若千里內無能授戒師得佛菩薩形像前自誓受戒而要見好相若法師自倚解經律大乘學戒與國王太子百官以為善友而新學菩薩來問若經義律義輕心惡心慢心不一一好答問者犯輕垢罪此釋憍慢僻說戒也憍慢之義解前僻者偏即見也以見不正必墮外道邪魔故戒之也詳此文勢其義有二一若佛子下至便得戒一節明弟子心無憍慢僻受師長心無憍慢僻說之義二若法師下至不一一好答問者一節正明師恃憍慢僻說弟子無憍慢僻受之義受戒法儀有三一者佛在世時親從佛前而授受者得上品戒二者佛滅度後於先受菩薩戒法師前如法受者得中品戒三者若千里內無能授戒法師於佛菩薩形像前自立誓願而稟受佛戒者必定要見好相若見好相得下品戒所言佛滅度者揀佛在世以佛為師今乃佛滅度後即以戒法為師以戒師為佛也欲以好心等者此正明無憍慢僻受之義於佛菩薩形像前者正謂佛不在世現前無師欲以好心秉受菩薩戒時只得於佛菩薩形像之前而自立諸誓願受戒願云我某甲等發十四種大願復立十三種誓發誓願已更當七日佛前殷勤懺悔一切罪障罪障消滅得見好相即便自知已得戒矣設若一七日中不得好相者應當二七三七乃至一年之久而必要得好相若果得好相已便許此人向佛菩薩形像位前自誓受戒方證得戒勝緣若不得好相雖佛像前受戒不名得戒徒有受戒之名而無其實一生虗妄體是白衣若是佛滅度後現前有先受菩薩戒法師者當即於是師前精誠求戒不須要見好相所以者何以是說者受者二俱現前則非遙受代受及於像前求受故也言先受者揀非新戒無德臘者可能師也而曰菩薩戒法師者則是智行雙運之師此師堪為師範如是師前秉受戒時是故不須要見好相所以者何此有二義一者法師得戒本從師師相授而來此具戒師即是過去諸佛住世一般是以法師前受戒時即得具戒故也二者求戒弟子於本說戒師前生至重心觀戒師為諸佛是故從是師前受戒即便得戒所以自無憍慢僻受師無憍慢僻說一一皆如法也然師前求受甚易像前求受甚難何故不從師而從像前受也若千里之內無能授戒師者始得於佛菩薩形像座前自誓受戒若於像前求戒必定要見好相方成得戒之信若是千里之內有能授戒師而不從是師前秉受必於像前而受戒者此人不但不得戒而且反招憍慢僻受罪也若法師者內自倚恃能解經律秉受大乘學戒外又倚恃所交國王太子百官以為善好之友而見新學菩薩遠來請問經義律義時乃以所交自恃倚者而生輕心藐視惡心嫉妒慢心忽略不一一好答來求問法之人是法師得憍慢僻說之過犯輕垢罪第二十四不習學佛戒若佛子有佛經律大乘法正見正性正法身而不能勤學修習而捨七寶反學邪見二乘外道俗典阿毗曇雜論一切書記是斷佛性障道因緣非行菩薩道者若故作者犯輕垢罪此釋不習學佛戒也謂諸佛經律藏乃是超生死越苦海之寶筏若無此筏永無得出三界愛河茲有佛法而不習學自甘沈溺故戒之也言有佛經律者既為佛子有佛可歸是吾本師有法可崇是吾本法既是本師本法應當時時親近而習學也經即修多羅律即毗奈耶經律所云大乘法者謂佛所說經律有菩薩藏有聲聞藏此是菩薩藏故云大乘法也既本大乘法藏則所詮理趣乃是正知正見正性正法身也不偏不邪曰正繇是正知正見明了不生不滅不遷不變正因佛性為因地心即證本有不生不滅不遷不變正法有果夫有佛可皈有法可崇不能一意皈崇敏勤習學捨諸佛覺道七種最上至極之寶反學邪見二乘外道俗典及阿毗曇雜論一切書記是斷佛性障道因緣非行菩薩道者既非菩薩之道豈當學耶邪見等者解見上文言俗典者四韋陀典外道書也阿毗曇者此云無畏又名曰分別慧雜論即凡論有論無小乘外道等論一切書記乃詩詞歌賦醫卜陰陽術數等也是斷佛性等者出所習之過也承上如是邪見二乘等人俱不當親而反親之外道俗典等教俱不當習而反習之自迷迷人所謂二乘枯寂焦菩提芽外道斷常刳正覺種是斷佛性也又此邪見等法內惑正解知見外亂正修行門實障菩提道因緣惡法非行菩薩大乘之正法也若故背其當學而習不當學者犯輕垢罪問治世語言資生業等皆順正法何故於俗典等學而犯罪答以新學者智弱識強恐棄本逐末故若地上大菩薩為利生故習學無礙第二十五不善知衆戒若佛子佛滅度後為說法主為僧房主為教化主坐禪主行來主應生慈心善和鬪諍善守三寶物莫無度用如自己有而反亂衆鬪諍恣心用三寶物者犯輕垢罪此釋不善知衆戒也謂佛弟子乃是住持三寶弘通法人應知己識人設或亂衆鬪諍乃至三寶財物不善守護即非佛子故戒之也言佛滅度後者舉末世而言也佛在世時佛為一切大衆主中之主諸弟子中自無恣亂今佛滅度後則諸弟子各為其主故云佛滅後也言為說法主者於佛所說三藏教法善能主持使其流通不致斷絶為僧房主者謂善主持上中下座僧衆安居犍度等事有調理故教化主者謂能主持方便化導因緣次第等事不使錯謬故坐禪主者謂能主持修禪定中魔境現前等事方便制伏故行來主者謂善主持遠近賓客迎送禮節等事不致疏慢故既為如是衆中之主應生慈心善和鬪諍善守三寶財物莫無度用也言應生慈心者訓勉之詞也謂生慈心能與一切衆生安樂故善和鬪諍者謂諍事如未起時即令不起已起即令息滅故善守三寶物者謂於三寶常住財物不使交互侵損漏失故莫無度用正明善守義所言三寶財物使用有節其義有三一者係佛物元即佛事中用法物法事中用僧物僧事中用當用則用不可無度放意而用二者此是三寶財物應善守護莫作自己所有任意而用三者謂守三寶物者即如守護自己法財莫使惑業侵毀破壞故云莫無度用如是慈心和衆善守方是佛子行門若乃不能善和而反亂衆鬪諍應善守護而反恣心雜用三寶物者犯輕垢罪第二十六獨受利養戒若佛子先在僧坊中住若見客菩薩比丘來入僧坊舍宅城邑若國王宅舍中乃至夏坐安居處及大會中先住僧應迎來送去飲食供養房舍臥具繩牀木牀事事給與若無物應賣自身及男女身應割自身肉賣供給所需悉以與之若有檀越來請衆僧客僧有利養分僧坊主應次第差客僧受請而先住僧獨受請而不差客僧者僧坊主得無量罪畜生無異非沙門非釋種姓犯輕垢罪此釋獨受利養戒也僧具六和之德謂戒和同修見和同解身和同居言和無諍意和無瞋利和同均若內一和有虧六和全費故戒之也言先在僧坊中住者自然是主既已為主必盡主道若見客菩薩比丘來入僧坊住處或入居士宅舍住處或入城邑住處或入國王舍宅之中乃至夏坐安居之處及大會中如是住處凡先住僧所盡主道當異尋常見來則盡迎來之禮臨去則盡送往之禮終始如一不可失節其中供養如以飲食房舍臥具繩牀木牀凡諸物類事事給與不得吝惜一物俱如法供養何也始為尊重法門克盡為主之道問設若我自無物云何供養答若果為求菩薩道者應賣自身及賣男女身而為供養且又不獨賣身而已應割自身肉賣供給所須悉以與之如是推之何況所有身外之物而反慳吝不供給耶若有檀越下申明不得獨受請義既言主人無物尚自賣身割肉而為供養豈有檀越請齊而不次第差客僧受請者無是理也是故若有檀越來請衆僧齊者客僧俱當有利養分而僧坊主應當一一次第差客僧受請方具沙門六和之德若先住僧獨自受請不讓客僧受請僧坊主得無量罪五百問云衆僧食已分盡食他分一飽者犯波羅夷不飽犯墮得無量罪準例可知如是比丘下不合人情便非人類與畜生無異中不合僧禮全無六和故非沙門上不合佛心不知重道則非釋迦種姓應當同受而反獨入己者犯輕垢罪第二十七受別請戒若佛子一切不得受別請利養入己而此利養屬十方僧而別受請即取十方僧物入己八福田中諸佛聖人一一師僧父母病人物自己用故犯輕垢罪此釋受別請戒也此戒承前為佛弟子不但不得獨受利養而已乃更一切不得受人別請利養入己若別受請利養而不分與衆者亦非沙門非佛種子故戒之也一切不得受別請利養入己者謂凡道俗一切諸檀越等請僧齊者應與衆同受請不得私受人請應衆中同利養故而此利下釋上不得受別請義問別請供物應受入己何故不得答謂此利養屬十方僧一切有分而若別受請者即取十方僧物私入一己是故不得受別請也八福等者釋上義謂不但不得私取十方僧物入己乃至八福田中一切財物亦不得私用入己若取私用亦是取十方僧公物入己故也八福田者一諸佛二聖人三和尚四闍黎五衆僧六父七母八病人也言諸佛者即果人也言聖人者即因人也一一師者即本和尚闍黎尊證之十師也僧者即大衆也父母即生身二親也病人者但凡一切親怨眷屬之中有苦患人也已上自諸佛菩薩乃至父母七位名為敬田病人一種名為悲田此八總皆植福修慧良勝田也此一切物若公用即獲福私用即得罪今別受請即取八福田中物直為自己用故而不給與衆者犯輕垢罪第二十八別請僧戒若佛子有出家菩薩在家菩薩及一切檀越請僧福田求願之時應入僧坊問知事人今欲請僧求願知事報言次第請者即得十方賢聖僧而世人別請五百羅漢菩薩僧不如僧次一凡夫僧若別請僧者是外道法七佛無別請法不順孝道若故別請僧者犯輕垢罪此釋別請僧戒也此戒亦從上受別請而來謂受請者既不別受則請僧者亦不應別請也般若經云不住相布施其福德等於虗空住相布施則獲福有限故戒之也若佛子下標明求願種福之人出家菩薩剃髮染衣受大戒人在家菩薩是受六重二十八輕之優婆塞戒人也及一切檀越者承上謂不止此二種菩薩并凡作福一切檀越梵語檀那此云好施以好行檀波羅蜜法是則超越世間貪吝之士故得美稱也如是正信檀衆請僧福田求願之時或有發願度生或有祈禱常情或為聽聞道法或願生天生人乃至願生西方如來所求所願必當於三寶中求三寶即一切衆生植福良田也三寶住世全賴衆僧是故請僧福田求願之時應入僧坊問知事人曰我某甲今欲請僧求願彼知事人應當報言汝欲請僧合遵次第請儀所以者何以聖凡難辨不可擇故所以次第請者即得十方賢聖僧也若以分別心必請五百羅漢菩薩聖僧如是揀名別請不如隨於衆僧中次第所請一凡夫僧功德所以者何以有住相心故若是別請僧者且是外道之法我佛法中無揀擇心以不著相求故又即上推七佛以來亦無別請之法七佛者毗婆尸佛尸棄佛毗舍浮佛此三如來是過去莊嚴劫中已成正覺者拘留孫佛拘那含牟尼佛迦葉佛釋迦牟尼佛此四如來是現在賢劫中今成正覺者以是七佛作證不應別請僧明矣蓋別請求願者即是不行孝道何者謂上違七佛教誡之道中乖菩薩平等之心下失衆生利益之德所以若故別請僧者結過犯輕垢罪第二十九邪命自活戒若佛子以惡心故為利養販賣男女色自手作食自磨自舂占相男女解夢吉凶是男是女呪術工巧調鷹方法和合百種毒藥千種毒藥蛇毒生金銀毒蠱毒都無慈愍心無孝順心若故作者犯輕垢罪此釋邪命自活戒也邪命揀非正命自活揀非為人既為佛子菩薩比丘當以乞法乞食而為生活乞法謂乞實相一乘之法珍重守護以證法身乞食謂乞檀越一餐之供清淨自活以資色身如是利己利人以為德業利己者不墮非佛子故利人以續彼善根故若以邪命邪求不但釋子不得作為亦非清淨信士所宜故戒之也以惡心故者揀非善心為道故為利養者亦非為求救濟衆生苦故邪命事別開無量總則八種法一者販賣男女色此事離他骨肉玷人門風不顧羞恥道俗共制二者自手作食自磨自舂佛制比丘食法尚以淨人授受方食豈聽沙門作生活計既失威儀亦長貪心此事惟制出家三者占相男女占則斷人禍福相則判人窮通亦非沙門所為四者解夢吉凶解人夢中所見夢事斷其吉凶也五者是男是女此即妄定六甲所生是男是女六者呪術工巧呪為諸呪呪以驅神遣將攝人魂魄術為幻術種種幻事以幻惑人工為精工巧為巧匠皆世人所作已上俱非釋子所宜為也七者調鷹方法調謂善調鷹犬能使疾便以取物命道俗共戒八者和合百種毒藥千種毒藥毒藥有百千種略出一二一者和合蛇毒害人并害生命故二者和合生金銀毒謂生金生銀性最毒以此毒人害物和合諸蟲蠱毒毒人及毒生靈故以上道俗共制違而作者都無慈愍心都無孝順心也都無慈愍心者全無一念視人如子女故都無孝順心者全無一念視人如父母故如是邪命為利而故作者犯輕垢罪第三十不敬好時戒若佛子以惡心故自身謗三寶詐現親附口便說空行在有中為白衣通致男女交會淫色作諸縛著於六齊日年三長齊月作殺生劫盜破齊犯戒者犯輕垢罪此釋不敬好時戒也言不敬好時者謂於天王巡狩年月日期不修福慧無敬畏心有失大利故戒之也若佛子下至親附四句明不敬好時之心口便說空至犯戒者一節詳不敬好時之事言以惡心故者揀非修出世善心故自身謗三寶者揀非但以口謗三寶故謂心若不正則身自不端身不端則百事皆不實故詐現親附者釋不實義謂本非與人親厚而現親厚之相以圖依附口便說空者見其心詐行在有中者見其身謗為白衣等者申明自身謗三寶行在有中之義為白衣者乃為世諦中人經理也通致男女者通謂通達致謂致意以女意達於男以男意達於女凡私通婚嫁之事作諸縛著全不解脫今舉一事以戒餘耳於六齊日等者此句正明不敬好時戒也月六齊日年三齊月俱是鬼神得力善月日也亦乃天神巡狩人間考較善惡之期於此月日持戒作福福勝餘時月六齊者初八二十三乃是毗沙門天王分鎮南洲之日十四二十九如月小二十八乃是天王太子十五與三十乃天王自身也年三長齊月者每年正五九此三月者名三善月是帝釋天巡狩之月此天殿中有大寶鏡從年正月則照南贍部洲二月則照西牛賀洲三月則照北具盧洲四月則照東勝神洲五月復照南贍部洲如是三番照察人間善惡凡人舉心動念自然鏡中顯現分明是故為佛弟子於此月日宜當勸人齊戒放生作諸福德而反於此時中反作殺生劫盜破齊犯戒損人功德滅人法財自害害人結過犯輕垢罪如是十戒應當學敬心奉持制戒品中廣明如是一句總結前十戒之文應當下二句以勸修行時時刻刻心心念念修學此戒不可忘失意也制戒品一句引大部中別品廣明此義第三十一不行救贖戒佛言佛子佛滅度後於惡世中若見外道一切惡人劫賊賣佛菩薩父母形像及賣經律販賣比丘比丘尼亦賣發心菩薩道人或為官使與一切人作奴婢者而菩薩見是事已應生慈悲心方便救護處處教化取物贖佛菩薩形像及比丘比丘尼一切經律若不贖者犯輕垢罪此釋不行救贖戒也救即救護贖即取贖菩薩護持三寶有理有事以理持事以事持理互相顯發若見三寶破壞不急救贖三寶從此斷滅人間慧命福田亦無地矣故戒之也佛言佛子下舉時分也意謂佛在世時無此等事佛滅度後於惡世中或有此事耳惡世即五濁惡世時也於此時中多諸外道惡人言外道者不達自心多執異見外于正道故名外道斷佛慧命故名惡人如是之人常與佛法共諍與僧共諍劫三寶財盜賣佛菩薩像或賣父母形容且佛為大慈父菩薩為大悲母能與衆生樂能拔衆生苦皈敬供養得福無量豈可賣乎賣則破滅佛寶獲罪無量也及賣經律者經以開心見性而證真常律制三業六根清淨解脫豈可賣乎賣則破滅法寶販賣比丘比丘尼者謂比丘僧尼是人間福田住世僧寶賣則破滅僧寶于三寶中罪皆無量亦賣發心菩薩道人者此廣兼道俗四衆謂凡發大乘心修大乘行者俱是有道之士故稱道人如是比丘道人等或被劫虜盜去賣為官使與一切人作奴婢者菩薩見有如是苦難事已應生拔苦與樂之心假諸善巧設多種方便門急急救護處處教化檀越取彼財物贖佛菩薩形像如法供養俾見相皈依獲福滅罪及贖比丘比丘尼令離苦難安隱修道并贖一切經律使法輪常轉用開迷途是名佛子住持三寶行菩薩道倘見此事不救贖而坐視者犯輕垢罪第三十二損害衆生戒若佛子不得畜刀杖弓箭販賣輕稱小斗因官形勢取人財物害心繫縛破壞成功長養猫狸猪狗若故養者犯輕垢罪此釋損害衆生戒也為菩薩者當以慈悲喜捨為根本心六度萬行為方便門若害物傷慈非是大士心行故戒之也若佛子下總標損害衆生事言不得畜刀杖弓箭者謂此惡器損害衆生身命惡心易起是故不得畜也不得二字貫下不得販賣輕稱小斗明瞞暗騙損害衆生交易不得因官形勢取人財物倚威挾勢非善法求損害衆生名利不得所求不遂復假官威害心繫縛損彼衆生形體不得求財不遂勒彼變賣兒女産業破壞成功骨肉不得長養猫狸猪狗捕鼠害物為利販賣以恩結仇已上諸戒不得有作向下結過若故養者犯輕垢罪問文中所言不得畜賣害心長養有多種事結文只言若故養者犯罪何也答養尚不得豈許畜賣故一戒一切戒也第三十三邪業覺觀戒若佛子以惡心故觀一切男女等鬬軍陳兵將劫賊等鬬亦不得聽吹貝鼓角琴瑟箏笛箜篌歌叫妓樂之聲不得摴蒱圍棋波羅塞戲彈棋六博拍毱擲石投壺牽道八道行城爪鏡蓍草楊枝鉢盂髑髏而作卜筮不得作盜賊使命一一不得作若故作者犯輕垢罪此釋邪業覺觀戒也邪業揀非正業覺即覺照觀即觀察覺體本無邪正全在照察若被物轉即名邪業覺觀若能轉物即名正業覺觀此恐初心菩薩心念不結觀照不熟故戒之也若佛子下總標邪業覺觀根本之義言以惡心故者揀非屬行道中隱顯攝化遊戲善念明是逐情流轉故名惡心觀一切男女等鬬者正明邪業覺觀之事相也觀即能觀之心一切等者即所觀之境也此有二事一者謂即一切男女戲舞之事二者或乃因忿相諍鬬毆之事故云一切男女等鬬軍陳兵將等鬬者即兩國敵殺以各圖封蔭故劫賊等鬬者此即盜賊劫掠鬬殺之事以上鬬事不一俱係眼觀使心流逸此戒眼觀即是戒心切勿被爭鬬境所轉欲令眼根得其清淨心亦清淨所謂一根清淨而多根清淨也是故應效諸大菩薩常與五陰等魔共戰可也亦不得聽吹等者承上不但眼家不得邪觀耳家亦不得邪聽是則清淨耳根不被物奪即旋轉聞機故貝即螺貝南蠻國人吹以節樂鼓即杖鼓斫木為匡以革蒙兩面可擊者也角即犀角羌胡吹之以驚中國之馬琴即雅琴古制五絃今制七絃瑟者有五十絃庖犧所作虞舜改為二十五絃箏十三絃蒙恬所作笛有七也以竹為之箜篌者有二十四絃師延所作已上皆是樂器之類歌叫妓樂之聲者即人樂之聲也雖則人樂有異一入耳根使心流蕩以不得聽也不得摴蒱等者亦令身根清淨摴蒱即賭博是圍棋即奕碁是波羅塞戲即象是碁彈棊即漢時糚奩戲六博即雙陸是拍毱即蹴圓是擲石即今投壺古以石投今以矢投牽道即走馬賣械之類行城即城𣐟上行走或牽道八道行城棊是雖則事有各別皆賭博之類也爪鏡用藥塗指上呪之則有光明如鏡照人斷人吉凶蓍草出文王墓百莖一叢上有青雲覆蓋下有靈龜伏氣長大截取以筮斷人休咎楊枝即樟柳神附人耳邊報人禍福者是鉢盂即今照水碗是以水注盂用以刀呪攪之令定以斷人是非故髑髏取新尸首呪之自靈能說人禍福故而作卜筮者此總收上幾種而言不得作盜賊使命者意謂設遇盜賊虜去乃至畢命必不可為彼作使命也一一不得作者此句總結是佛叮嚀勸誡之言謂上諸邪事業俱非佛子所為故一一不得作若故作者犯輕垢罪經中音樂博筮之具多同此方故引釋之上文波羅塞戲彈棊二解疑書刻之訛耶恐波羅塞戲即糚奩戲彈棊即象碁是也第三十四暫念小乘戒若佛子護持禁戒行住坐臥日夜六時讀誦是戒猶如金剛如帶持浮囊欲渡大海如草繫比丘常生大乘善信自知我是未成之佛諸佛是已成之佛發菩提心念念不去心若起一念二乘外道心者犯輕垢罪此釋暫念小乘戒也暫即頃刻也念即作意也言小乘戒揀非大乘昔舍利弗行菩薩行遇婆羅門乞眼舍利弗言眼在我身有用爾用何為婆羅門言汝修菩薩行者隨乞即與莫管有用無用時舍利弗即取眼與彼得在手以鼻嗅之曰腥臊臭物用他作麼唾踏而去舍利弗言菩薩行難只一念中捨戒退墮聲聞二十小劫故戒之也若佛子下此總標明行菩薩行時分言護持禁戒者護即防護使魔無能侵故持謂堅持使心無有退故禁即約束五根不動戒即止滅意地不起所謂精進持淨戒猶如護明珠也行住坐臥即四儀處日夜六時晝六夜六之十二時也於此時分護持佛戒不被境風耗蕩是則戒堅得定定澄發慧三學具足三身圓滿也讀誦是戒申明護持方便言護持是戒者云何護持即當熟讀是戒對本尋文知戒輕重開遮誦以離本究心明其指歸保持是戒猶如金剛以金剛智能碎一切妄想顛倒嚴護戒品亦如帶持浮囊得渡苦海浮囊渡海器也昔有商人持囊渡海海中羅剎從乞浮囊其人不與乃乞一半亦不聽許至乞一絲亦不從願何故命在囊故浮囊若破則於海岸終不能到以喻持戒之人欲渡生死苦海設遇愛染羅剎假求一願亦終不從何故命在戒故戒若有破則溺生死苦海永無出期是故護戒若此如草繫比丘者此喻持戒悲心不傷物故昔有比丘被賊所抄恐追趕至故將比丘以草繫縛比丘奉佛禁戒不拔生草不敢動移時遇王過得以釋脫此小乘法何以引喻大乘意謂小乘無望成佛尚於此戒如是堅持況大乘人兼利自他豈可於是戒中而生放逸是故菩薩持戒亦當如此常生大乘善信者正謂小乘之人不信自心是佛茲者大乘新學雖生是信恐遇二境則退故勉於此大乘常生善信恆無間斷應信自心是佛自心作佛以決定信信得我是因中一尊未成之佛但未即得果地莊嚴以我行願未圓惑障未空故也諸佛是已成之佛者意謂諸佛已得三身圓滿萬德具足五住究竟二死永亡是故我能如是修因必然如是證果若少有怠惰即失當來莊嚴之果佛也上護持禁戒者行也常生善信者信也自知我是未成之佛諸佛是已成者解也發菩提心者此心乃是信解行中本覺智體信解行三雖具若證佛果必於所發大乘菩提正心念茲在茲永無忘失以是念念不去于心乃是菩薩純熟戒行佛果可期若於所信所解所行所發之中但起一念二乘外道心者犯輕垢罪問只此一念何云犯罪答雖云暫念佛種有傷失菩提心即為魔業豈不致退墮二十小劫乎故此得罪第三十五不發願戒若佛子常應發一切願孝順父母師僧願得好師同學善知識常教我大乘經律十發趣十長養十金剛十地使我開解如法修行堅持佛戒寧捨身命念念不去心若一切菩薩不發是願者犯輕垢罪此釋不發願戒也承上護戒發心已起大乘信解又必發願勤求師友發明理趣於理不明猶恐錯念濫同小乘外道故戒之也若佛子下總標明發諸大願也言常應者謂發願不難惟恐不恆所以常應發願以是大願無盡一切皆發衆生無盡而煩惱障業障報障一切無盡故菩薩之願心亦無有盡故云常應發一切願也孝順父母師僧等者此別開願心也願雖無量十願總攝一願孝順父母二願求好師三願求同學四願求大法五願求十發趣六願求十長養七願求十金剛八願求十地九願求開解佛乘十願堅持佛戒也一願孝順父母問曰父母有生育之恩師僧有教誨之德自然不敢忤違何假發願孝順謂小乘戒中比丘為道若父母不能繩線比丘乞食與半雖孝不大今於大乘戒中以觀一切衆生如己父母若不發願孝順恐同小乘見解其心不普不恆故當發願如此二願得好師者謂師有大乘小乘正見邪見有解無行有行無解之別今所求者願求正知正見解行具足之師問上云發願孝順師僧此又揀擇願得好師者何也上在供養承事邊說此在求道邊說故當願求好師非同我慢之心也三願同學善知識者雖逢聖師指點更須賢朋資輔即如臨濟激發於首座昌黎發悟於三平所以求師為最訪友第一是故求同學者必真善知識也四願常教我大乘經律者擇非小乘法也承上求師擇友為欲常常教我大乘經律使我頓圓佛慧故也所以圓覺五性差別乃在遇師遇教是故願求大乘法也五願修十發趣者即十住位以發真源修空觀理故六願修十長養者即十行位長養菩提修假觀行故七願修十金剛者即十向位智悲雙運修中道觀故八願修十地者即十聖位以圓修三觀圓證三身故九願使我開解者謂上教以大乘經律非但只教熟讀而已更欲於大乘經律中所詮三賢十聖修證菩提道法一切行門使我一一開解得以如法修行而速證佛果也十願堅持佛戒者謂雖求大乘智悲雙運若不堅持佛戒聖賢道果一切皆失所謂若犯如微塵許現身不得發菩提心乃至佛性常住妙果一切皆失云云是故發願堅持佛戒設遇惡緣寧捨身命念念不敢捨去堅持佛戒之心如是發願如是持戒是真佛子決定成佛而無疑也若一切菩薩不發是願者犯輕垢罪第三十六不發誓戒若佛子發十大願已持佛禁戒作是願言寧以此身投熾然猛火大坑刀山終不毀犯三世諸佛經律與一切女人作不淨行復作是願寧以熱鐵羅網千重周匝纏身終不以此破戒之身受於信心檀越一切衣服復作是願寧以此口吞熱鐵丸及大流猛火經百千劫終不以此破戒之口食於信心檀越百味飲食復作是願寧以此身臥大猛火羅網熱鐵地上終不以此破戒之身受於信心檀越百種床座復作是願寧以此身受三百鉾刺身經一劫二劫終不以此破戒之身受於信心檀越百味醫藥復作是願寧以此身投熱鐵鑊經百千劫終不以此破戒之身受於信心檀越千種房舍屋宅園林田地復作是願寧以鐵鎚打碎此身從頭至足令如微塵終不以此破戒之身受於信心檀越恭敬禮拜復作是願寧以百千熱鐵刀鉾挑其兩目終不以此破戒之心視他好色復作是願寧以百千鐵錐劖刺耳根經一劫二劫終不以此破戒之心聽好音聲復作是願寧以百千刃刀割去其鼻終不以此破戒之心貪嗅諸香復作是願寧以百千刃刀割斷其舌終不以此破戒之心食人百味淨食復作是願寧以利斧斬斫其身終不以此破戒之心貪著好觸復作是願願一切衆生成佛菩薩若不發是願者犯輕垢罪此釋不發誓戒也前為發願此乃發誓以先願後誓者猶馬雖有轡勒更加鞭䇿期其必至欲期大果若無決定大誓願力恐遇順境不能打過則所願必虗故戒之也發十大願已者牒前持佛禁戒起後言堅持佛戒者上云寧捨身命念念不去于心我發願已更立誓以堅之也立誓總有四段一者不作非梵行誓二者不虗受供養誓三者不染污六根誓四者本為化衆生誓初明不作非梵行者設若吾人欲念起時誓曰寧將此身投熾然猛火中受焦爛苦墮大坑塹受陷墜苦入刀山上受割截苦如是諸極苦處寧當現世一生忍受不以為患終決不敢毀犯三世諸佛所說清淨決定禁戒經律與一切女人作不淨行也二明不虗受供養誓此言復開六種一者不虗受衣服誓復作誓願如遇寒時寧以熱鐵羅網千重周匝纏身皮焦肉潰不以為苦而終不敢以此破戒之身受於信心檀越一切衣服二者不虗受飲食誓復作誓願如遇饑時寧以此口吞熱鐵丸渴時及飲大流猛火以受焦腸爛肺之苦終不以此破戒之口食於信心檀越百味飲食三者不虗受臥具誓復作誓願如身體疲倦時寧以此身臥大猛火羅網熱鐵地上以受肉盡骨燋之苦終不以此破戒之身受於信心檀越百種床座四者不虗受醫藥誓復作誓願如患病時寧以此身受三百鉾刺身縱經一劫二劫鉾刺之苦終不以此破戒之身受於信心檀越百味醫藥五者不虗受田舍誓復作誓願如居止時寧以此身投熱鐵鑊經百千劫誓當忍受終不以此破戒之身受於信心檀越千種房舍屋宅園林田地六者不虗受禮拜誓復作誓願如自尊自重時寧以鐵鎚打碎此身從頭至足令如微塵終不以此破戒之身受於信心檀越恭敬禮拜三者不染污六根誓此誓復開五種初淨眼根之誓復作誓願如眼對色之時寧以熱鐵刀鉾挑其兩目壞此肉眼終不以此破戒之心視他好色以壞清淨法眼問清淨眼根豈能壞乎所言壞者非是爛壞之壞是令清淨眼根不得通徹無礙故耳二者淨耳根誓復作誓願如耳對音聲時寧以百千鐵錐劖刺耳根縱經一劫二劫如是至常至極之苦寧當忍受終不以此破戒之心聽好音聲以壞清淨法耳三者淨鼻根誓復作誓願如鼻對諸香時寧以百千刃刀割去其鼻亦可忍受終不以此破戒之心貪嗅諸香以壞清淨鼻根四者淨舌根誓復作誓願如舌取飲食時寧以百千刃刀割斷其舌亦當受之終不以此破戒之心食人百味飲食以壞清淨舌根五者淨身根誓復作誓願如身對好觸時寧以利斧斬斫其身當忍受之終不以此破戒之心貪著好觸以壞清淨法身已上三科十二誓願是自利行下一誓願乃利他行四者本為化衆生誓復作願云我今發願立誓非獨自為一己清淨解脫而已本為普化法界一切衆生悉皆成佛故也如是立誓發願是名菩薩若不發此四科十三種誓願者犯輕垢罪第三十七冒難遊行戒若佛子常應二時頭陀冬夏坐禪結夏安居常用楊枝澡豆三衣瓶鉢坐具錫杖香爐灑水囊手巾刀子火燧鑷子繩牀經律佛像菩薩形像而菩薩行頭陀時及遊方時行來百里千里此十八種物常隨其身頭陀者從正月十五日至三月十五日八月十五日至十月十五日是二時中十八種物常隨其身如鳥二翼若布薩日新學菩薩半月半月布薩誦十重四十八輕若誦戒時於諸佛菩薩形像前誦一人布薩即一人誦若二及三人至百千人亦一人誦誦者高座聽者下座各各披九條七條五條袈裟結夏安居一一如法若頭陀時莫入難處若國難惡王土地高下草木深邃獅子虎狼水火風劫賊道路毒蛇一切難處悉不得入若頭陀行道乃至夏坐安居是諸難處亦不得入若故入者犯輕垢罪此釋冒難遊行戒也前言發誓度生雖慈悲廣大恐初心菩薩道力未充不能一切無礙凡遇難處不可輕遊故戒之也若佛子下標明菩薩遊行時也常應二時者每年春秋二時也是時溫和氣象萬物方長成熟時分堪當遊行是故常應此時化衆生也頭陀者此云抖擻抖去客塵煩惱以求無上道法故冬夏坐禪結夏安居者謂冬時隆寒夏時酷暑當習靜坐禪離昏散心清寒暑患是故結冬休夏而精勤佛道也常用楊枝等者釋安居事謂凡結冬休夏之時須常用楊枝等十八種物為法器也楊枝常用有五種利益一固齒二明目三清心四消風五除垢是故凡受食後宜用楊枝如或不用五百問云犯墮罪澡豆即皂角凡出廁畢以淨身手便可禮佛持呪誦經三衣即五衣七衣大衣也其大衣中亦有上中下三品三三共九品俱以蔽形除貪超俗服故鉢者梵語鉢多羅此云應量器大者斗五中者七升小者隨量比丘食法以一鉢資身斷邪命邪求故瓶即軍持以注法水滋益衆生滌除塵垢故臥具梵語尼師壇此云敷具亦名隨足衣敷之坐禪以建五分法身如塔之有基故錫杖梵語隙棄羅此云錫杖亦名智杖亦名德杖表樹法幢顯聖人智故香爐表信斷法界疑入佛道故漉水囊者用密絹成漉水護生顯慈心故手巾拭面便浴以潔垢故刀子古以戒刀降魔今用剃除鬚髮以斷愛根別俗相故火燧即取火以資明破暗表有慧故鑷子古頭陀跣足行恐刺傷足用以拔之表盡煩惱諸毒刺故繩牀用繩串成表脫貢高不生放逸故亦不受地濕故言經律者經以開心見性成佛果故律乃嚴護身口意令解脫故佛菩薩形像者佛是本師良導菩薩乃同學善友所謂生我者父母成我者師友何敢時刻忘之又佛是果人菩薩是因人未成佛者觀已成佛我必如是證觀未成佛我必如是修正為安居行道榜樣所以當供其妙像也而菩薩行頭陀等者釋上常應二時頭陀遊行事毋暫離也謂不但冬夏安居用之即菩薩行頭陀時及遊方時無論行來百里千里若遠若近此十八種物亦常隨身皆不可離也已上總明安居遊行常用法器事竟向下申釋遊行時分及常用法器之義言二時頭陀者在於何時謂從正月十五日至三月十五日是春分之時從八月十五日至十月十五日是秋分之時是二時中此十八種物常隨其身何也如鳥之二翼翼若有失則鳥難飛騰法器若缺則僧難遊行所以常隨身也若布薩日等者此明遊行懺悔之法梵語布薩此云作法辦事亦云我對說又名相向說罪以有過失相向對佛像前說悔罪過也新學菩薩等者揀非久修性地位也新學智劣識強於戒品中勉力堅持若不謹束身心恐墮放逸故半月半月作布薩法從此十重四十八輕之戒相諦審有犯無犯各為懺悔也於諸佛菩薩形像前誦者佛在世時對佛親誦佛滅度後得于像前為作證明而誦非敢自專此十八種物中所以有經律及佛菩薩形像故也一人布薩下等者明誦戒儀式若誦戒時一人布薩即一人誦若二及三人至百千人布薩亦是一人誦戒不可普誦以致淆訛其誦戒儀誦者高座聽者下座而此誦者聽者各各披九條七條五條袈裟毋得著俗服以乖僧體此之布薩法儀不但頭陀行道時為然凡結夏安居時一一如此法則不可違也已上總明安居遊行法事竟下明一切難處不可安居遊行也先明頭陀遊行時莫入難處何等難處謂若國難別本云惡國界以此國中廣行殺法及饑饉等時難非宜遊行故不可往也言惡王者謂國中主不信三寶不修福慧是為惡王土地高下高則坑下則濕遊行險隘之難草木深邃多諸惡獸出入往返驚怖之難水火風災俱不可往恐有漂焚鼓折驚恐之難劫賊道路處所恐有遺誤罔害之難道路貫下毒蛇橫道處所恐有途路螫害之難有如是難皆不得往也一切難處等者謂不止此難處而已凡一切難處悉不得入也若頭陀行道等者莫入難處不但頭陀遊行難處不可得入乃至夏坐安居是諸難處亦不得入此總誡安居遊行之當慎也若乃自恃有德無妨諸怖違佛言教強入險處遊行者犯輕垢罪第三十八乖尊卑次序戒若佛子應如法次第坐先受戒者在前坐後受戒者在後坐不問老少比丘比丘尼貴人國王王子乃至黃門奴婢皆應先受戒者在前坐後受戒者次第而坐莫如外道癡人若老若少無前無後坐無次第如兵奴之法我佛法中先者先坐後者後坐而菩薩一一不如法次第坐者犯輕垢罪此釋乖尊卑次序戒也此戒繇上布薩誦戒而來謂誦戒者高座聽者下座以下聽衆亦有高下次序以凡一切坐衆不可紊亂有乖佛制故戒之也若佛子下此總標明坐序法也先受下別釋也謂若佛子坐法應如法次第坐言如法者謂依佛訓而坐也謂先受戒者應在前坐後受戒者應在後坐不問老少生年但依受戒次第而坐如比丘比丘一類比丘尼比丘尼一類貴人貴人一類國王國王一類王子王子一類乃至黃門奴婢各自一類而分先後非是無問僧俗貴賤而混然論先後次序坐也若是不但不順世法且亦不通佛法以佛法中即百歲比丘尼禮三歲沙彌足百歲三歲乃是受戒三年百年非世諦生年也以百年者戒長臘深三年戒晚臘淺若一槩而論受戒先後應三歲沙彌禮百歲尼足何百歲尼而禮三歲足乎是知論戒各自為一類以序先後且又以比丘為宗主也莫如外道等者外道無有智慧無論若老若少無前無後坐無次第乃如兵奴之法一般而我佛正法中必以先者先坐後者後坐是名行菩薩道建立法門謙恭遜讓之義也而菩薩下結成違戒得罪所言為菩薩者若不一一如法次第坐者犯輕垢罪此罪若不犯者如普照三昧云阿闍世王請文殊齊文殊尊讓迦葉前行曰大迦葉久為沙門世間所有羅漢皆從仁後仁當前行迦葉答云計於法律不以年歲為尊法律所載智慧為尊神智聖達乃為可尊博聞辨才乃為可尊諸根明徹乃為可尊文殊乃前行也問據此豈不乖尊卑次第耶答闍王之請意在文殊不在迦葉如天帝釋請華嚴師置座五百應真之上即其類也文殊始讓迦葉不敢違古佛之恆規迦葉終遜文殊所以順請主之本意此二大士正破我慢貢高之弊第三十九不修福慧戒若佛子常應教化一切衆生建立僧房山林園田立作佛塔冬夏安居坐禪處所一切行道處皆應立之而菩薩應為一切衆生講說大乘經律若疾病國難賊難父母兄弟和尚阿闍黎亡滅之日及三七日四五七日乃至七七日亦應講大乘經律一切齊會求福行來治生大火大水焚漂黑風所吹船舫江河大海羅剎之難亦讀誦講說此經律乃至一切罪報三惡八難七逆杻械枷鎖繫縛其身多淫多瞋多愚癡多疾病皆應講此經律而新學菩薩若不爾者犯輕垢罪此釋不修福慧戒也此戒要令一切衆生植福植慧以成佛故若無福慧二種莊嚴則佛果菩提安可希冀故戒之也若佛子下標顯常心廣大心也謂能教者應常教化一切衆生建立三寶而亦常自修福修慧也建立等下正明勸修福慧之事建立僧房山林園田二句即是興隆僧寶以修福也立作佛塔者即興隆佛寶以修福也冬夏坐禪至皆應立之者即興隆法寶以修福也天台疏中修福總有七事一建僧坊以為衆僧棲息修道處故二治山林便衆經行兼以足材薪故三治園圃園以種植果蔬供佛僧故四治田地田以插穀地以種粟而備久遠資糧使得僧衆安心以辦道故五建佛塔莊佛相好嚴淨國界遠近瞻依增福慧故六治安居坐禪處所以為息定有所歸止易得定故七治一切所行道處皆應立者如行準提呪者應為立準提堂乃至觀音勢至文殊普賢藥師彌陀等行隨一切行人所行一切行門皆應為立一切處所令彼道人處處得以安隱而行道故上為修福若乃非理募化自附營修以公濟私誤因昧果所謂天堂未就地獄先成如是修福不如避罪若果真為興隆三寶因果分明纖毫無差復能無我人相了達三輪體空如是修福是為真行菩薩道者上修福德以滿自他檀波羅蜜下修慧德以圓自他般若波羅蜜故其慧有聲聞慧有菩薩慧菩薩智慧應為一切衆生講說大乘經律以大乘經律者乃有滅惡生善之功除罪獲福之益是故令修大乘之智慧也若疾病下正明令修菩薩智慧之德相也若疾病時應講此經律也以得除滅一切諸苦令安樂故若國有難而講此經律者以得滅除刀兵饑饉令諸國土得豐泰故若遇賊難而講此經律者以得解脫一切劫殺得無擾故若父母兄弟和尚阿闍黎亡滅之日及三七日四五七日乃至七七日亦應講此大乘經律者以得解脫一切幽冥之苦得見佛聞妙法故若是一切齊會求福亦應誦此經律者以得圓滿一切衆生所有心願令成就故行來治生講誦此經律者以具足一切如意法財周濟世間無乏少故若為大火所燒而誦此經律者以能使解脫一切熱惱令清涼故若為大水所漂而誦此經律者以能令超脫一切愛河到彼岸故若遇黑風所吹船舫而誦此經律者以得解脫一切無明穩駕法船度衆生故若遇江河大海羅剎之難而誦此經律者以能令害心頓歇鬼氣潛消俱解脫故不但此也乃至一切罪報三惡八難七逆杻械枷鎖繫縛其身若講此經律者謂此經律為大赦書俱令身心速解脫故多淫多瞋多愚癡多疾病如是等報皆應講此經律者謂此經律具足一切戒定慧樂能滅一切貪瞋癡苦能除身心病患令證五分法身故也如是若依修福修慧方名自利利他而諸新學菩薩若不如是修福慧者犯輕垢罪如是九戒應當學敬心奉持梵壇品當說如是一句總結前九戒也應當一句結勸自利應當學也敬心一句結勸奉持當流通也梵壇一句乃引大部別品廣明其義顯此處所說者尚為略也第四十揀擇授戒戒佛言佛子與人授戒時不得揀擇一切國王王子大臣百官比丘比丘尼信男信女淫男淫女十八梵天六欲天子無根二根黃門奴婢一切鬼神盡得受戒應教身所著袈裟皆使壞色與道相應皆染使青黃赤黑紫色一切染衣乃至臥具盡以壞色身所著衣一切染色若一切國土中國人所著衣服比丘皆應與其俗服有異若欲受戒時應問言現身不作七逆罪耶菩薩法師不得與七逆人現身受戒七逆者出佛身血殺父殺母殺和尚殺阿闍黎破羯磨轉法輪僧殺聖人若具七逆即現身不得戒餘一切人盡得受戒出家人法不向國王禮拜不向父母禮拜六親不敬鬼神不禮但解法師語有百里千里來求法者而菩薩法師以惡心瞋心而不即與授一切衆生戒者犯輕垢罪此釋揀擇授戒戒也謂佛戒法平等一切皆應得受若分貴賤高下應受不授不應受而授者先已得罪豈可為師故戒之也佛言佛子者呼名而告既為佛子必當上弘下化為授戒師凡與人授戒時應當平等施與不得揀擇也不揀有二一授戒法不揀二授衣法不揀先明不揀授戒無論一切國王王子大臣百官比丘比丘尼信男信女淫男淫女十八梵天六欲天子無根二根黃門奴婢一切鬼神盡得受戒不應揀也何以故謂但凡有心者皆當作佛豈不盡得受戒是故不應擇也應教身下次明授衣亦不揀也言應教身所著袈裟等者上與授戒是令心體如法此與授衣乃令身相亦如法也謂但受戒者若心體如法凡身相不如法者不能令人深起敬信若是身相如法心體不清淨者諸天神明未必歡喜必也內具戒心外具法服表裏如一即獲天龍恭敬戒神護持所以凡授衣者亦不揀也袈裟解前言皆使壞色者謂離外染心故與道相應者謂於內受道法正相應故皆染使下申明壞色也謂皆一一染之而似青黃赤黑紫色故也彌沙塞云思入玄妙究暢幽密應著青色摩訶僧祇律云勤學衆經宣說真義應著黃色曇無德云通達理味開導利益應著赤色薩婆多云博通敏達導以法化應著黑色迦葉遺云精勤勇猛快攝衆生應著木蘭色也此五部中皆用五種壞色非正五色言應著木蘭者如木蘭葉之背似紫而非紫故又律部中所言青色之下有非青等二字可證五色非五正色一切染衣等者謂不但袈裟者皆以染壞但凡一切染衣乃至臥具盡皆以壞色也已上二種應不揀竟向下應揀亦有二法先明衣中有揀謂凡比丘身所著衣一切皆以染色雖云不揀平等與之內有不當同者應別之也何者如若一切國土之中國人所著衣服為比丘者皆當與其俗服有異故不同耳次明戒中有揀謂若欲受戒時戒師應于求受戒者問言汝今現身不作七逆罪耶問定有無無則應與授戒有則不應與授何故謂七逆罪障深重故是以菩薩法師不得與七逆人現身授戒何名七逆一出佛身血二殺父三殺母四殺和尚五殺阿闍黎六破羯磨轉法輪僧七殺聖人若具此七逆者即現身不得戒所以應揀餘一切人盡得受戒所以不得揀也出家人法等者此明僧俗受戒禮義之不同也優婆塞戒經云若優婆塞優婆夷等欲受三皈五戒之法必先稟禮君親眷屬家廟祖先然後方可求受戒法若出家人受戒之法不同優婆塞等受戒之法謂始出家之時先曾禮禮君親過已故出家後以道自重不務世禮所以不向國王禮拜不向父母禮拜六親不敬離愛念故鬼神不禮離諂媚故如是一切放下但只解得法師說戒之語便得受菩薩戒故也有百里下正明惡心揀擇之義上云但能解法師語盡得與他授戒設若百里千里以至誠心而來法師座前求授戒者而為菩薩法師即當以慈悲心平等與之授戒是名菩薩設若反以惡心嫉妒瞋心惱恨而不即與授一切衆生戒者犯輕垢罪第四十一為利作師戒若佛子教化人起信心時菩薩與他人作教誡法師者見欲受戒人應教請二師和尚阿闍黎二師應問言汝有七遮罪否若現身有七遮罪者師不應與授戒若無七遮者得與授戒若有犯十重戒者教懺悔在佛菩薩形像前日夜六時誦十重四十八輕戒苦到禮三世千佛得見好相者若一七日二三七日乃至一年要見好相好相者佛來摩頂見光華種種異相便得滅罪若無好相雖懺無益是人現身亦不得戒而得增長受戒益若犯四十八輕戒者對首懺悔罪便得滅不同七遮而教誡師於是法中一一好解若不解大乘經律若輕若重是非之相不解第一義諦習種性長養性性種性不可壞性道種性正覺此其中多少觀行出入十禪支一切行法一一不得性法中意而菩薩為利養為名聞故惡求多求貪利弟子而詐現解一切經律為供養故是自欺詐亦欺詐他人故與人授戒者犯輕垢罪此釋為利作師戒也此戒承前所云不犯七逆罪者盡與受戒如受戒後設有犯戒其為師者云何教令懺悔設於懺悔之法不解而為利作師者得何等罪故戒之也若佛子下舉能教顯所教有根性義菩薩與他人下明教誡師不得自專以授戒時必同二師授也二師應問言下審明無遮難者方堪與授戒也若有犯下明受戒後懺悔之法若不解下明不解者不堪為師而菩薩下明無解作師之罪也教化人起信心時者謂此菩薩善為人作教誡法師教人發起大乘信心授戒之時不得專自一己為人授戒應教受戒之人請和尚闍黎二師二師應問受戒者言汝有七遮罪否否者問定有無之詞若現身有七遮罪者師不應與授戒若無七遮者得與授戒是故二師應先審問遮難遮難若無方許授戒若有犯下此是世尊大慈大悲之心為後末世一種癡迷衆生恐遇逆順境緣不能排遣犯此十重戒者開此一種懺悔法門方便濟拔若不勤求懺悔必陷三塗永無出期是故若有犯此十重戒者應教急急懺悔其懺悔法應教在佛菩薩形像前日夜六時以至誠心誦此十重四十八輕戒相知所犯戒深生慚愧觀罪性空殷勤悔過苦到稱禮三世千佛言苦到者如苦到來時節如救頭然之急相也是故禮拜稱揚過去未來現在三千諸佛萬德洪名如是禮拜哀求得見好相罪便得滅若無好相立一七日二三七日乃至一年必竟要見好相言好相者或坐禪中或禮拜中或睡臥中或經行中或見佛來摩頂或見光見華見種種異相以此證知便得滅罪許可復戒若無此好相罪不得滅如悔心未切雖懺無益是人現身亦不能得復戒但得增長未來受戒益耳犯十重罪必要好相若犯四十八輕戒者對首懺悔罪便得滅准地持經第四卷方便處品羯磨文云菩薩一切所犯突吉羅攝當向大小乘人有力解語能受懺者如法懺悔如比丘犯突吉羅罪懺悔法說以其不同七遮十重戒故而教誡下正為作教誡師者勉之於是懺悔法中一一好解不可忽略也言好解者乃善解也謂於大乘經律輕重開遮是非之相一一明徹不得以輕作重以重作輕應當懺者教令懺悔應復戒者即與復戒毋得以是為非以非為是有誤人也若乃不解大乘經律於中若輕若重是罪非罪之相不解第一義諦實相之理不解習種性長養性性種性不可壞性道種性正覺性於是三賢十聖法門其中多少觀行出入乃至十禪支一切行法一一不得此法中意是即不堪為人師範應生慚愧也習種性等已解上卷文中言其中多少觀行者如十住中空觀多假觀少十行位中假觀多空觀少十向位中中道觀多空假觀少十地菩薩位中自初地後至六地前無相觀少有相觀多五地已後七地已前有相觀少無相觀多至七地後純無相觀故云多少觀行言出入者即三昧中出定入定之方便法十禪支者解前即四禪中所修觀法一切行法結上觀行法門一一不得此法中意總結上文而言謂此大乘一切修斷觀行法門甚深微妙若是一一不得此法中意自利尚難況利人乎如盲人引路彼此俱有陷墜之患可不慎哉而菩薩為利養等者謂自無所解但貪利名故而強為人師也矯飾威儀廣陳因果取信愚夫於中獲利如斯求名為利俱非是善故名惡求多求也貪利弟子等者因師貪利名於前弟子亦效行之於後互相讚嘆誑妄欺人本自不解一切經律而詐現能解一切經律究其所以實為求供養故如是之人是名自欺自詐亦欺詐他人是故與人作師授戒者犯輕垢罪第四十二為惡人說戒戒若佛子不得為利養故於未受菩薩戒者前若外道惡人前說此千佛大戒邪見人前亦不得說除國王餘一切不得說是惡人輩不受佛戒名為畜生生生不見三寶如木石無心名為外道邪見人輩木頭無異而菩薩於是惡人前說七佛教戒者犯輕垢罪此釋為惡人說戒戒也惡人有多種但不受菩薩戒及不信敬三寶毀謗戒者俱名惡人倘與彼前稱說而反增彼毀謗罪過故戒之也言不得為利養故者前云不解經律不得為利妄說是戒此言能解法者即亦不得貪利而濫說也渴而與飲則水之味甘暗而思明則燈之用大也是以未受大戒人前及外道惡人前皆不得說此千佛大戒不但未受大戒人前及外道惡人前不可說即邪見人前亦不可說也邪見人者乃隨外道唱和易生反復人也除國王者謂諸國王乃域中之主故如來滅度之時以佛法僧付囑國王宰臣掌護俾令三寶得以住世又大國王即人中天願人改過遷善自不宣人長短故凡所行佛事不宜隱諱況興滅亦係焉是故唯除國王餘一切人不得說也言餘不得說者是惡人輩貪瞋障心淫殺覆體而好宣人長短過失於是佛性戒中有耳不聞有鼻不嗅有舌不䬸有身不觸有心不知雖在人類名為人中畜生縱三寶在前彼若罔見以是生生不見三寶且畜生中尚有報障輕者或時一聞佛言即得解脫如龍聽法而即悟道蟒聞懺法而即生天今人不受佛戒尚不如畜生乎然而形雖若人實同木石無心況木石之為物亦有感應道交之時生公說法頑石點頭今人不受佛戒頑石之不若矣如是之人名為外道名為邪見人輩雖曰有情實與木頭無異木頭本無知覺焉知有佛戒耶所以不得向彼說也而此菩薩若乃為利養故於是惡人之前說此七佛教誡法者是為裨販之流是故結過犯輕垢罪言七佛教誡今舉七佛以該三千謂此戒者乃是三千諸佛共護故不可褻說也第四十三無慚受施戒若佛子信心出家受佛正戒故起心毀犯聖戒者不得受一切檀越供養亦不得國王地上行不得飲國王水五千大鬼常遮其前鬼言大賊入房舍城邑宅中鬼復常掃其腳跡一切世人皆罵言佛法中賊一切衆生眼不欲見犯戒之人畜生無異木頭無異若故毀正戒者犯輕垢罪此釋無慚受施戒也慚愧之水能滌罪垢若無慚愧則其罪垢日日深厚以是帶罪受供真可憐愍故戒之也若佛子下總明先後二心初明先心謂此佛子初發信心出家而受佛正戒者是名好心為道堪為福田應當受供養故下明後心上言好心受戒堪當受供若乃故變所信之心反起不信之心而毀犯聖戒者即失福田不堪受供問前云正戒後云聖戒何也正謂此戒離偏邪故聖謂此戒諸佛共證說故故毀此戒即不得受一切信心檀越供養不但不得受供而已即亦不得於國王地上行不得飲國王水所以者何以是水土皆屬國王惟有道行者可以飲履無戒德者於四事中俱為無分故佛藏云佛言我聽持戒比丘而受供養破戒比丘我則不聽受一飲水又俱舍云犯根本戒於大衆食及僧住處佛不許此噉一段食踐一腳跟之地即此義也五千大鬼等者謂持戒者天龍八部諸戒神王恆相衛護毀戒之輩五千大鬼常遮其前善惡分感理應然也鬼言大賊者世間劫盜於佛法中尚有所畏敬今此破戒之人不敬佛法不畏因果凡受檀越所施皆為竊用內無慚愧外無怕怖非賊之大者乎如是之賊凡入房舍城邑宅中護戒鬼神不惟呵罵大賊而已復常掃其腳跡何者蓋以如來行處皆有足輪人天供養增益福慧今此破戒比丘遊行腳跡有穢清淨伽藍是故鬼復常掃其腳跡也一切世人皆罵言者兼未發心童稚之流謂不但鬼神瞋責即一切世間人見破戒者咸皆罵言此破戒比丘者乃是佛法中賊佛藏經云破戒比丘竊入我法此人著衣食飯皆是盜得又佛所言我滅度後持戒比丘能令佛法久住破戒比丘能令佛法速滅是知破戒者乃佛法中賊也又且靡獨世人罵言而已凡若一切有眼衆生皆不欲見何故謂是犯戒之人乃非人類與畜生無識者無異與木頭無知者無異故如是觀之諸佛聖戒不可毀犯明矣若故毀佛正戒無慚受施者犯輕垢罪第四十四不供養經典戒若佛子常應一心受持讀誦大乘經律剝皮為紙刺血為墨以髓為水析骨為筆書寫佛戒木皮榖紙絹素竹帛亦應悉書持常以七寶無價香華一切雜寶為箱囊盛經律卷若不如法供養者犯經垢罪此釋不供養經典戒也承上言毀戒者人鬼俱呵持戒者天龍悉護如是皆繇受戒功德之力是故應當供養流通戒法不然使佛慧命不復相續即為背恩又為自棄故戒之也若佛子下舉能信之心所信之法言常應一心者即是一念無間之心向何法上用心惟有受持讀誦大乘經律甚深微妙法也剝皮為下乃明尊重供養流通之義流通佛法法師有六種一受持二讀誦三書寫四禮拜五講演六供養此中有五以供養中具禮拜也又流通佛法有事有理以事雖多不出二種一捨身命二捨財寶捨身命者即剝皮為紙刺血為墨以髓為水析骨為筆如是捨不堅固世間身命書寫佛戒流通常住法寶智慧身命二捨財寶者有二一捨輕財即以木皮榖紙絹素竹帛亦應悉書持故二捨重財常以七寶無價香花一切雜寶為箱為囊盛經律卷以捨此不堅固之世寶財流通常住出世之法寶財如是供養是名佛子一心受持行菩薩道弘護三寶之功德也若不如法供養惜其世財而捨法身慧命財者犯輕垢罪第四十五不化衆生戒若佛子常起大悲心若入一切城邑舍宅見一切衆生應唱言汝等衆生盡應受三皈十戒若見牛馬猪羊一切畜生應心念口言汝是畜生發菩提心而菩薩入一切處山林川野皆使一切衆生發菩提心是菩薩若不教化衆生者犯輕垢罪此釋不化衆生戒也此戒繇前捨身命財流通戒法若不廣化衆生受持佛戒仍是法教之不普耳故戒之也若佛子下標明行菩薩道本因心也常起大悲心者菩薩以度盡衆生為願故見衆生在世苦不能離如切膚痛故發拔苦之大悲心所以恆常起也若入一切等者正明大悲心行所入之處謂諸衆生無盡世界無盡故菩薩大悲心亦無有盡是以凡入一切城邑舍宅之處見諸衆生應當唱言汝等衆生各各俱有佛戒之性繇汝無始至於今生背覺合塵而以五戒不持人天路絶今當覺知前念起惡捨此惡心盡應受持三皈十戒能止後念令其不起此之三皈十戒乃是一切衆生所歸覺路成佛之正因心所謂衆生受佛戒即入諸佛位也菩薩戒本經云若人聞三寶名則不墮三惡道何況至心皈依三寶又戒壇云皈依佛者永離地獄皈依法者永離餓鬼皈依僧者永離傍牛所以三寶為大舟航為大慈父能保衆生不墮苦處出生死之苦海到菩提之覺岸者也十戒即菩薩十無盡波羅提木叉戒非沙彌之十戒若見牛馬等者推廣以明度生之普上言入城見生乃指人類而言此下見生即指畜類而言設見牛馬豬羊一切畜生云何教化應當心中作念口中發言汝是畜生亦具有知覺者即是戒性本覺之心因爾衆生迷此本覺真心而為無明之妄心也只今返妄便可皈真是故教令發菩提始覺心翻破無明之不覺心永離畜生道苦毋使再迷此心可也而菩薩入一切等者言不但城邑舍宅人類畜生二種衆生當施教化乃至一切所至山林川野凡見一切禽獸衆生亦皆如是使發菩提心也如是方便如是教化名為菩薩大悲之心若不如是教化諸衆生者犯輕垢罪第四十六說法不如法戒若佛子常行教化起大悲心入檀越貴人家一切衆中不得立為白衣說法應在白衣衆前高座上坐法師比丘不得地立為四衆白衣說法若說法時法師高座香華供養四衆聽者下座如孝順父母敬順師教如事火婆羅門其說法者若不如法說犯輕垢罪此釋說法不如法戒也上文所云若入城邑曠野凡見一切衆生皆普教化使發菩提之心然此不過一兩言句以故隨便為說若為人衆分析說法之時又即不可輕褻而說褻則得罪故戒之也若佛子下標明菩薩本行心也言常行教化者謂諸菩薩行門無量無非以教化衆生為事又則所貴惟在恆心故言常行教化所謂無間歇也又起心度生者有二此所起者即大悲心此心乃即一切衆生離苦得樂之最勝心故起此悲心也入檀越下正明所用悲心之處檀越即好施之美稱貴人家者即是國王太子宰官為人中尊故云貴人家也一切衆中即該四衆八部等衆不得立為白衣說法云何而說應在白衣衆前高座上坐而說此乃尊人以尊法也是故法師比丘不得地立而為四衆白衣說法四衆即比丘等白衣乃未受戒人等若為說法之時為法師者理宜高座而坐座前當以香華供養以展請法至誠法師乃可代佛應機而說法也四衆聽者各各其類次第下坐以受法者當如是也上明說法如法下明聽法如法如孝順父母等者謂聽法者敬師如孝順父母不敢少怠慢故如是說者聽者人己兩利功德不可思議其說法師若不如法高座香花供養而為說者犯輕垢罪第四十七非法制限戒若佛子皆以信心受戒者若國王太子百官四部弟子自恃高貴破滅佛法戒律明作制法制我四部弟子不聽出家行道亦復不聽造立形像佛塔經律立統制衆安藉記僧菩薩比丘地立白衣高座廣行非法如兵奴事主而菩薩應受一切人供養而反為官走使非法非律若國王百官好心受佛戒者莫作是破三寶之罪而故作破法者犯輕垢罪此釋非法制限戒也上言必應高座上坐如法為說惟恐聽受法者自恃尊位必不如法從聽反起傲慢惡心而作破法罪業故戒之也若佛子下標明道俗尊卑一切佛子皆以信心受持佛戒同立護法之心為佛四衆弟子非局外之人也若國王下別開非法制限之人四部弟子乃即在家出家四衆問其中亦有無位云何能破法耶謂假他人威勢亦作破法事耳故統論之自恃高貴破滅佛法戒律者有三義或者身雖受戒高心未除見僧高座上坐輒生我慢故起破法之心或見師友說過舉罪不肯降心受誨而欲掩恥故起破法之心或初本是信心身在法中後來見有壞法不肖之流遂於三寶不生信敬故起破法之心故云自恃高貴破滅佛法戒律明作制等四句申明破法之事明謂彰明作謂作用制謂制限法謂法度以此法度曉諭該管制我四部弟子云何而制不聽出家行道言不聽出家者不許新增即破僧寶亦復不聽造立形像佛塔者即破佛寶不聽貫下不聽造印經律即破法寶如是皆明破滅三寶之事故云明作制法等也立統制衆二句申明制限之事既已不許新增出家於舊出家僧人又乃別立統屬禁止於衆安其簿籍記僧名字以令照世應役與民無異故云立統制衆安藉記僧也制限如此尚何敬重三寶之有哉寶積第四卷云為子出家父母障止即其父母乃感七世貧婆之報況壞佛法之報應乎菩薩等下申明非法之法謂此菩薩比丘乃修道人是為僧寶如來佛法流通於世衆生慧命不致斷絶全賴是人宣當尊重敬以高座而反令之地立白衣未受戒人求解脫道敬事三寶當宜地立而反高座廣行非法使諸菩薩比丘如兵奴之事主而菩薩下勸明不可破義然而為菩薩者應受一切天人供養乃名福田之身而反為官家之走使如此非法而制非律而限豈是靈山付囑而來者哉亦非初以信心受佛戒者之所為也若國王百官等既是初心好心受佛戒者原為求出離道即當體佛深慈莫以高貴自恃作是破滅三寶之罪又藏經云國王長者從體事三寶中來豈可昧其來因而不為善反為惡乎是乃自失將來福慧之因反招惡業之果若故作破法者犯輕垢罪第四十八破法戒若佛子以好心出家而為名聞利養於國王百官前說佛戒者橫與比丘比丘尼菩薩戒弟子作繫縛事如獄囚法兵奴之法如獅子身中蟲自食獅子肉非餘外蟲如是佛子自破佛法非外道天魔能破若受佛戒者應護佛戒如念一子如事父母不可毀破而菩薩聞外道惡人以惡言謗佛戒之聲如三百鉾刺心千刀萬杖打拍其身等無有異寧自入地獄經於百劫而不聞一惡言破佛戒之聲況自破佛戒教人破法因緣亦無孝順之心若故作者犯輕垢罪此釋破法戒也上為在家菩薩破佛法戒此乃出家菩薩自破法戒以破法罪不善故戒之也若佛子下標明出家之因心也以好心出家者謂出家之因緣有多種不同或因恐怖或因逼迫或因氣惱或為名聞或為利養或為生死言好心者正明為生死發心出家者也而為名下此明道心之不恆也謂始發心出家原為生死後來或與貪名好利者同事漸相染習故亦轉成為名為利人也別本所云不以好心出家亦可何也為名聞利養故也佛藏經云佛告舍利弗昔迦葉佛預記我言釋迦牟尼佛法中多受供養故法當疾滅舍利弗我法實以多受供養故法當疾滅是故貪名好利而出家者俱非好心而反破滅佛法故耳於國王下此申明為名利之事言為名利故者揀非為求護法故也是言為成名利若乃不與國王太子百官交友則名不弘其利不大故與國王太子百官交友便於彼前說佛戒者其義有三一者尊貴之人素所崇敬故在彼前而說佛戒令彼信受增長善根得以護法注念三寶故二者尊貴之人威力自在仗彼威力壓己同行橫與比丘比丘尼及菩薩戒弟子作繫縛事如獄囚法令不出離如兵奴法使聽其命以辱同類故三者因自不能守戒見持戒者反加毀謗故於尊貴人前說佛戒者所言佛戒乃本無持無犯以持犯者但束身耳是橫與比丘比丘尼及菩薩戒弟子作繫縛事安居等事即如獄囚之法以是自纏自縛不得解脫事上座等亦似兵奴之法自拘自束不敢放逸以是謗言使彼隨而和之以令佛戒不致流通衆生慧命不致相續已上三者前之一法是好心出家者後之二法是乃不以好心出家此之三解隨人識取如獅子下引喻以明破法之相如是破佛戒者即如獅子身中之蟲自食獅子之肉非餘外蟲能也獅子乃獸中王何蟲敢近食獅子肉惟是獅子自身中蟲方能食獅子肉非餘外蟲敢食也如是等者合上之喻言如是佛子者乃法內相關人應護佛法今反自破佛法非是外道天魔不相關切之人而能破之豈非自殘自毀者哉故云如是佛子自破佛法也若以初來好心受戒論之凡受佛大戒者應護佛戒如念一子佛戒即汝當身一件要緊大事譬如一子若失則終身無倚戒法若破佛果三身終無所獲是故保戒護戒如念一子又若護佛戒者當如奉事父母佛為慈父而受戒諸佛子同氣連枝念其共受之戒為此身所從出之父母也所謂諸佛阿耨多羅三藐三菩提法皆從此經出也是乃尊親之至愛惜之深不可毀破細而推之而菩薩聞外道惡人以惡言謗佛戒之聲如三百鉾刺心痛不可忍亦如千刀萬杖打拍其身痛難可受聞謗之痛與傷身心之痛等無有異又非止此一生而已寧當自入地獄經於百劫千劫長遠之時受如是苦不以為患而不忍聞一惡人言破佛戒之聲也夫聽他人之謗聲尚不忍聞如此況自家破佛戒而又忍心教有勢力之人廣作破法罪業因緣反橫加刑於諸佛子者乎夫此全不念同條共本之源毫無一念孝順之心是以佛子滅佛子者豈是實為生死好心出家而來受佛戒者之所為耶若故作破法者犯輕垢罪如是九戒應當學敬心奉持如是二字總結上九戒法應當一句以勸修學敬心一句以勸奉持此戒勿忘失也以上五番總結乃隨別釋小科而結之也向下總結四十八輕收上五番總勸修學而奉持也二總結戒相諸佛子是四十八輕戒汝等受持過去諸菩薩已誦未來諸菩薩當誦現在諸菩薩今誦諸佛子一句結告其人是四十八一句舉法勸受持也過去下等數句引同行者以勸誦也誦四十八輕戒非我獨勸汝等新學持誦乃是過去諸菩薩已誦未來諸菩薩當誦則汝等現在諸菩薩今誦已上正宗分文義竟三明流通分三初流通本戒二總結本品三總讚流通初流通本戒諸佛子聽十重四十八輕戒三世諸佛已誦當誦今誦我今亦如是誦汝等一切大衆若國王王子百官比丘比丘尼信男信女受持菩薩戒者應受持讀誦解說書寫佛性常住戒卷流通三世一切衆生化化不絶得見千佛佛佛授手世世不墮惡道八難常生人道天中我今在此樹下略開七佛法戒汝等大衆當一心學波羅提木叉歡喜奉行如無相天王品勸學中一一廣明三千學士時坐聽者聞佛自誦心心頂戴喜躍受持此乃釋結流通本戒也諸佛子下誡聽本受戒法三世諸下引證以勸誦也言諸佛子汝等聽我所說十重四十八輕戒法實三世諸佛相傳而誦過去諸佛已誦未來諸佛當誦現在諸佛今誦我今亦隨諸佛如是而誦是故汝等一切大衆若國王王子之仁君文武百官之良臣此皆居塵不染尊重佛法之佛弟子比丘比丘尼乃是出家受法弟子信男信女乃即在家淨信弟子既皆受持菩薩戒者悉應受持讀誦解說書寫此本佛性常性戒卷流通三世一切衆生展轉流布化化不絶為急務也得見千佛等者正明流通戒法之益所言展轉流布化化不絶者是何利益蓋謂得見千佛佛佛授受以佛佛授受故乃得生生世世不墮惡道八難苦處此上滅罪之益向下獲福之益問既不墮諸難處當生何處答常生在人道天中乘願力而修道也我今等者此下舉法結勸謂我釋迦如來今在此道樹下示現成道示轉法輪初結波羅提木叉十重四十八輕戒者乃是略開過去七佛所說一切衆生修因證果心地法戒汝等大衆應當一心學此十重波羅提木叉戒以是勸汝歡喜奉行勿自怠耳此是略言如大部內之無相天王品勸學文中則一一廣明也三千學士即在會諸菩薩總該天龍八部道俗貴賤而言時坐聽者聞佛自誦十重四十八輕戒法悉皆心心頂戴其言喜躍受持不敢忘失佛性種子也二總結本品爾時釋迦牟尼佛說上蓮華臺藏世界盧舍那佛心地法門品中十無盡戒法品竟千百億釋迦亦如是說從摩醯首羅天王宮至此道樹下住處說法品為一切菩薩不可說大衆受持讀誦解說其義亦如是千百億世界蓮華藏世界微塵世界一切佛心藏地藏戒藏無量行願藏因果佛性常住藏如是一切佛說無量一切法藏竟千百億世界中一切衆生受持歡喜奉行若廣開心地相相如佛華光王七行品中說此總結顯一佛多佛本佛迹佛所說心地戒法以勸流通大略之義爾時釋迦至法品竟一節乃結此界一佛所說法也言爾時者即上囑付大衆聽受心地戒法之好時也釋迦牟尼佛者乃我娑婆教主化身如來說上蓮華臺藏世界盧舍那佛所傳心地法門品中十無盡戒法品如是行布圓融一一事理已說究竟而千百億釋迦亦悉如此娑婆教主所說不異皆從摩醯首羅天王宮中至此苦提樹下及諸住處所說法品亦無有異而為一切菩薩不可說之大衆如是大衆各各受持讀誦書寫解說其義亦如婆婆大衆受持不二不但此也如千百億世界中佛乃至微塵世界中佛是一切世界內本佛迹佛及迹迹佛此之一切諸佛所說之三十心心藏十地地藏十重四十八輕光明金剛寶戒戒藏三賢十聖所起無量一切妙行行藏所發無量無邊百千大願願藏百劫修行勝因因藏成等正覺佛果果藏一切衆生本覺佛性之常住藏如是心地戒行願因果七種為別佛性一種是總常住二字即是讚詞讚此佛性雖隨緣立名而性無遷改如在心言名為不生不滅清淨本心在地名為真如平等理地在戒名為光明金剛寶戒在行名為普賢萬行在願名為諸大願王在因名為本源自性深因在果名為究竟無上菩提涅槃妙果故言佛性常住俱言藏者謂此八種廣博包含圓融遍攝具足一切無有窮盡如是上言一切諸佛所說此心地等無量一切法藏究竟而千百億世界之中一切衆生受持歡喜一一奉行亦如此界衆生等無有異如是本佛迹佛迹迹之佛說法度生大略如此若乃廣開心地相相之義則又在大部之中如佛華光王七行品中詳其所說重言相相依一心地相廣開無量相也三總讚流通三初讚持戒益二勸觀戒體三勸護回向初讚持戒益明人忍慧強能持如是法未成佛道間安獲五種利一者十方佛愍念常守護二者命終時正見心歡喜三者生生處為諸菩薩友四者功德聚戒度悉成就五者今後世性戒福慧滿此是諸佛子智者善思量此乃讚獎持戒利益之義言明人者乃即超越愚夫之類者也忍慧二字即顯明人能護持戒之體用也謂此明人能具忍慧二強之德以有忍強力故則不被物轉也有慧強力故則能轉於物也如是之人能持心地戒法此人決定當來成佛無疑且未成佛道間先已安然自獲五種殊勝利益何名五益一者佛護益謂持戒人現前即感十方諸佛俯加愍念常為守護使其進道無魔得以紹隆佛種故二者善終益此人繇持佛戒臨命終時乃得正見心生歡喜遠離顛倒夢想無惡境現前故三者好侶益此人生生世世在在處處同行同住為諸菩薩道友以無惡黨混同故四者德備益此人無量功德品聚繇持十重四十八輕光明金剛戒度悉能成就無一法不足故五者道成益此人從今向後自性戒體福慧圓滿得名稱兩足尊故前四種益是因後一種益是果此五種利是持戒諸佛子所得明智之人當於此實相心地戒法思量體會而修行也二勸觀戒體計我著相者不能信是法滅壽取證者亦非下種處欲長菩提苗光明照世間應當淨觀察諸法真實相不生亦不滅不常復不斷不一亦不異不來亦不去如是一心中方便勤莊嚴菩薩所應作應當次第學於學於無學勿生分別想是名第一道亦名摩訶衍一切戲論惡悉從是處滅諸佛薩婆若悉由是處出此乃觀察實相戒體之義承上既是智者當於此戒體性善為思量勿使錯亂而修所以者何若計我之外道著相之凡夫如是等人俱為根塵所縛不能信是無受而受無持而持清淨之戒法也何故以著我取相者不能善思量故不但凡外不能縱使耽空守寂滅壽取證聲聞二乘之人亦非是下菩提種處所謂焦芽敗種之流也然佛戒平等豈偏絶彼奈彼等人不善思量故皆無分設凡夫外道欲長此菩提心苗使智慧光明能照察世間者應當於此心地戒中發起無礙清淨之慧靜觀靜察諸法之中真而無妄實相之理即本吾人圓滿清淨戒體此法不屬緣生亦復不屬緣滅以是一切諸法緣會而生此之真而無妄實相戒體本來無動一切諸法緣盡而滅此之真而無妄實相戒體本來無倒故云不生亦不滅不同凡夫之生滅也此戒體性不但不屬凡夫生滅亦即不屬外道斷常以本剎那無住而不屬常萬古恆如而不屬斷故云不常復不斷也又不但不屬凡夫生滅外道斷常等法即二乘修證等法總不相關所謂類殊難合而本不一同體難分而本不異迎之莫知所至而本不來追之莫知所從而本不去故云不一亦不異不來亦不去也如是之法既不屬生滅斷常一異去來是何法耶惟在此一心中當方便勤莊嚴一心即毗盧法界寂滅心所謂寂滅者名為一心以先悟此心為本因地復依此心而起方便道勤修種種行門以此莊嚴無上菩提如是慧解如是妙行實非凡外小乘思量所能作者乃是發大乘心受大乘戒之諸菩薩所應作也雖然名大非是一口說了就是必須次第如法善學始得相應云何次第學也即於研真斷惑之有學處真窮惑盡之無學處於此勿生分別有無想相以不生分別處是名不落二乘之第一道亦名摩訶衍之大乘法也第一道即上一心摩訶衍即上方便所以修如是道則此凡外小乘一切戲論惡法悉從是大道處而滅盡無餘諸佛智慧神通三昧薩婆若之妙果悉繇是處而得顯出無少缺也此之不可思議心地戒法豈非善思觀察而能獲滅罪生善之益哉三勸護回向是故諸佛子宜發大勇猛於諸佛淨戒護持如明珠過去諸菩薩已於是中學未來者當學現在者今學此是佛行處聖主所稱歎我已隨順說福德無量聚回以施衆生共向一切智願聞是法者疾得成佛道所謂一切惡從此滅一切善從此生實非小根小莖一朝一夕可能到者是故受戒諸佛子當發大勇猛心於諸佛淨戒必護持如明珠不令一毫損染方是佛子持心地中光明金剛寶戒也過去下引證結勸回向流通之義謂我勸汝等於此戒法勇猛護持者非無證據也此大戒經乃過去諸菩薩既證果者已於是中學而未來證果者當於是中學此現在證果者今於是中學實三世諸佛本因地中所經行處亦即我本師聖主舍那常所稱揚而讚歎也我亦下舉自證以勸謂我釋迦如來已隨諸佛所說稱揚讚歎況汝等新學倍當勇猛護持也回以下四句總結說心地戒本意蓋我與諸佛如是所說心地戒中廣大無量無邊福德之聚為隨順實相因此以施衆生俾各各皆以此戒為因地心不同凡夫不類二乘共向一切諸佛種智又願凡聞是心地戒法者不待來世方證無上菩提當下疾得圓成佛果也上云衆生受佛戒即入諸佛位豈虗言哉則所現千釋迦千百億釋迦光光所化無量無邊微塵釋迦於此會歸自心舍那之本佛千世界千百億世界微塵世界於此會歸自體華藏之本境所說或重或輕無量無邊戒法於此會歸自性尸羅之法門所度若僧若俗若貴若賤無量無邊一切衆生於此會歸自性有情之衆生如是心地妙戒甚深法門不可思議不可思議普願法界一切有情世世生生同發金剛不壞之心常隨諸佛修學共證無上菩提妙果可也直解義唯備自觀若大智者應閲雲棲大師戒疏發隱千華本師大和尚專精弘律鼎重法門手著梵網直解久布海內甲申冬日於會稽戒壇更殫精思重加刪潤命顯較正兼董剞劂永為定本乙酉秋仲刻成謹志歲月於後婁東大戒弟子願雲戒顯拜題
