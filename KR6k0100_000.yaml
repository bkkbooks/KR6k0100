front:
  text: 梵網經直解弁言言炎炎非夸理空空不頑達人信之餘則大笑焉人生以四大偶聚之身生未經禍亂不識存亡輪報之因不發心地光明之藏不繹諸佛菩薩修證之書不逢大善知識登壇開示宗義信者不槩見而笑者接踵固其所也今天下荼苦蔑以加矣流寇擾戮中原芟刈人命如草菅然揆所元來豈不緣信者之乏人而笑者之弘多乎往見名山大剎中高置猊座登演三車伐大鏞樹寶幢侍從儀仗鵠立左右儼然如古王者禮祗承明訓竦聽伏息此其與功令之畫一將毋同然卒不見浮提之人屠刀釋而見性石額點而傳燈豈有異故則亦解法者之未繩乎法度世者之未遑自度也余年來薦歷兵戎數經憂患兵燹之慘觸目痛心念此火坑灰劫何繇以甘露楊枝灑之立躋清涼乎會戊寅秋三昧大師廣集大眾說戒長干現智身於華藏騰應質於娑婆於時浮屠九級放大光明香靄薰空梵音動地都人皈依投體者以萬數薦紳先生暨諸文人名士質疑護法以百千數而余爰得拜於風下西來大意拈示娓娓隨叩洪鐘耳聾却走嗣是千華室結四眾雲來即素有非笑我法咸相顧咋舌無敢出聲余以是信師之能以自度者度人慈航寶筏具在是矣昔大雄氏為一切眾生開心地道或頓或漸罔不基命於戒定慧今使人人立愛惟親消除殺孼玄夷脫劒黃巾賣刀菩提樹下珠光𦦨𦦨無生本來各有安放佛心地黑風鬼國悉是清淨大千安見此五十八戒中固不已合天人眼而並觀齊大小乘而一致歟吾師金䇿所駐闡法繁殷以夙所釋梵網經簡閱推詳宣揚妙義字櫛句比不牽技葉顏曰直解為信之者廣長舌也若夫金剛寶藏性地圓明妙戒法門修證源本亦無所庸解矣崇禎庚辰春王穀旦之吉河間范景文敬撰進大寶華山三代律師著述奏章大寶華山慧居寺臣僧福聚謹奏為恭懇天恩收錄末學事臣僧山野庸愚仰承皇上宣暢律宗誠千載罕遇之奇緣使歷代佛祖增輝億萬緇流戴德由是臣僧念本山第一代臣僧寂光著有梵網直解四卷二代臣僧讀體著有毗尼止持十六卷毗尼作持十五卷三壇正範四卷三代臣僧德基著有毗尼關要十六卷誠乃戒律之楷模可為苾芻之綱領今蒙聖恩重修大藏敬將三代著述上懇天慈收錄末學編入大藏續如來之慧命作後學之津梁臣僧福聚躬闡殊恩不勝感格之至謹奏雍正十二年五月初二日上命莊親王同超善自塏等將此書校閱明白編入大藏本月十七日上問莊親王止持五部等書入藏之事莊親王覆奏臣同超善自塏商議華山三代所著戒律堪為入藏但此內或有刪去者酌量刪去明白奏請入藏於本日奉上諭若有刪改者著令福聚帶往回南刪改明白送到之日請旨入藏欽此乾隆元年十二月十八日啟和碩莊親王和碩和親王寶華山住持僧福聚謹啟為恭懇慈恩轉達天聽事福聚山野庸愚恭逢聖世宣暢律宗重修大藏於雍正十二年五月初二日在京請將華山律宗五部収錄入藏欽奉世宗憲皇帝俞旨將此書著令福聚帶回南去刪改明白俟送到之日請旨入藏欽此欽遵福聚還山焚香恭禱佛前敬述聖恩詳閱梵網直解四卷毗尼止持十六卷毗尼作持十五卷毗尼關要十六卷咸屬戒行之楷模僧人之律典解釋詳明毋庸增註條分縷細無可減刪福聚愚昧實不能增損一字惟三壇正範四卷乃闡揚作持部內未盡精微存之雖似涉冗繁刪之則作持部內又少發明恐後學難於領會福聚回南之時曾將此書留存一分於藏經館今應否將三壇正範四卷刪除抑或並存伏候欽定福聚恭逢天降佛緣廣敷善願率土僧歸戒律敬懇慈恩轉呈天聽一併編入大藏永垂萬世伏乞王爺恩賜轉奏謹啟總理藏經館事務臣允祿弘書謹奏為請旨事據寶華山僧人福聚稟稱雍正十二年五月初二日在京請將華山律宗五部收錄入藏欽奉世宗憲皇帝俞旨將此書著令福聚帶回南去刪改明白俟送到之日請旨入藏欽此欽遵福聚還山詳閱梵網直解四卷毗尼止持十六卷毗尼作持十五卷毗尼關要十六卷咸屬戒行之楷模僧人之律典解釋詳明毋庸刪減但三壇正範四卷乃闡揚作持部內未盡之意今應否刪除抑或一併賜入大藏等語臣等令僧人超盛等詳加查看得三壇正範四卷其受戒儀軌與作持部內實屬重複等語查三壇正範既與作持部內重複應行刪去謹將華山律部五種一併恭呈御覽伏侯欽定為此謹奏請旨乾隆二年正月二十六日交奏事太監王常貴等轉奏於本月二十八日奉旨照所奏入藏欽此於乾隆三年十二月十五日大藏工竣乾隆四年六月二十六日欽奉聖旨頒發藏經於乾隆五年五月初七日江甯織造臣韓四格專誠齎送龍藏一部計七千二百四十五卷到寺臣僧福聚欽遵供奉望闕謝恩今將臣僧所進本山三代律祖著述七函欽依頒奉卷次敬謹編刊方策板存寶華律社用廣流通以此功德恭為今上皇帝祝延聖壽無疆仰願皇圖鞏固帝道遐昌聖日與佛日長明金輪同法輪齊轉乾隆五年八月十三日司律寶華第七世欽命傳戒賜紫沙門慧居寺住持臣僧福聚恭紀欽定龍藏梵網直解卷帙字號標目勞字號一之十卷一上之一弁言至故云不共卷二三華光請釋至更廣說之卷三二明十行義至上之二故云深深心解脫也卷四四達心位至二文所說卷五四體性爾𦦨地至無二相矣卷六下之一二明心地戒至詞旨切矣卷七三正結戒品至可不慎歟卷八二說輕戒相至亦復如是卷九下之二第二十一瞋打報仇戒至尚為略也卷十第四十揀擇授戒戒至後䟦
