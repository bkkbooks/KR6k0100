body:
  text: 姚秦三藏法師鳩摩羅什奉詔譯明廣陵傳戒後學沙門寂光直解菩薩心地品之下二明心地戒三初結顯法門二付授勸轉三受已轉化初結顯法門二初結說心地二顯說心地初結說心地爾時盧舍那佛為此大衆略開百千恆河沙不可說法門中心地如毛頭許此舉能說顯所說之法也爾時二字承上所說三十心十地已竟時也盧舍那佛即能說報佛也修因感報故名為報然此報身有自有他自報即理智如如身他報即相好無盡身是此報身名為盧舍那佛華嚴經中所說毗盧遮那佛即盧舍那佛梵語云盧舍那華言淨滿淨者五住究盡二死永亡以諸患淨盡故滿者三覺果滿萬行因圓以福慧具足故一切聲聞辟支佛等所不能知唯佛與佛乃能究盡諸法實相此也故華嚴中阿僧祇品心王菩薩問佛云何名阿僧祇乃至不可說不可說佛即為說算數無窮無盡無量法門積成十種大數而破諸算量今于不可說法門中心地略說開示如毛頭許法也二顯說心地二初引他證己二引己證信初引他證己是過去一切佛已說未來佛當說現在佛今說三世菩薩已學當學今學是過去下此引果人同證同說以勸信也三世等者此引因人同修同學以勸受也言上所說心地法門雖如毛頭至微至細少許之法其力極大三世諸佛所證證此所說說此三世菩薩所修修此所學學此故大經云如有大經卷量等三千界在於一塵內若有聰慧人破塵出經卷利益一切人是故諸佛菩薩皆在一微塵許心地法門之中作大佛事故法華云過去諸佛出現世間皆以一大事因緣故出現於世開示悟入佛之知見使一切衆生悟佛知見入佛知見道故未來諸佛出現世間亦以一大事因緣故出現於世開示悟入佛之知見使一切衆生悟佛知見入佛知見道故現在諸佛出現世間亦以一大事因緣故出現於世開示悟入佛之知見使一切衆生悟佛知見入佛知見道故佛之知見即心地法門也所以過去一切佛已說未來一切佛當說現在一切佛今說三世一切菩薩已過去者已學已修當未來者當學當修今現在者今學今修佛佛祖祖無不以此心地法門光明金剛寶戒以心印心燈燈相續而無盡也二以己證信我已百劫修行是心地號吾為盧舍那我已百劫修行是心地者此即舉因以明果也號吾為盧舍那者此即舉果以明因也承上云一切諸佛三世菩薩所證所說所修所學既不異不虗者我今所修所學所證所說豈復虗乎故云我已百劫修等可見證果本非他因惟在此心地耳二付授勸轉二初總勸轉化二別勸轉化初總勸轉化汝諸佛子轉我所說與一切衆生開心地道此乃舍那慈尊告勉千佛轉法化生之義承上我已百劫修行是心地者可謂因深號吾為盧舍那者是為果極以是因深果極第一之道我今授汝汝當轉我為汝所說心地法門說與一切衆生而為一切衆生開心地道以諸衆生各各具足此心地道與佛無二故下文云是一切佛本源一切菩薩本源佛性種子一切衆生皆有佛性乃至當當常有因故當當常住法身也云開心地道者此心地本來無垢無染無遮無障虗廓靈妙清淨自在何言開耶所謂開者對封而言以諸衆生皆為識情所障迷背不覺非因智者指點開示終無得見諸佛體性猶如瞽者若非金鎞撥轉瞳神終無得見森羅萬象所謂千年暗室仗燈能破歷劫煩惱得智始除也二別勸轉化二初授勸轉化二勸授有序初授勸轉化時蓮華臺藏世界赫赫天光師子座上盧舍那佛放光光告千華上佛持我心地法門品而去復轉為千百億釋迦及一切衆生時蓮華下舉依報也赫赫天光等下舉正報也舍那放光顯能告勝光告等者顯所告勝也持我等者正明所告之詞師子座者師子乃獸中王若哮吼時百獸聞之悉皆腦裂以表世尊無上法王所坐之座即無畏坐所說之法即無畏法天魔外道若見若聞皆失心喪膽也言放光光告者此有二義一者即佛放光而於光中召告如楞嚴云爾時世尊頂放百寶無畏光明光中出生千葉寶蓮有佛化身結跏趺坐宣說神呪即此光中召告之義二者即所放光光亦能告謂不但正報身善能說法乃至依報蓮華光明亦悉能說法也所謂依報正報常宣妙法寶網靈臺水流風動皆演法音之義持我心地等者謂欲千佛轉相傳與一切衆生而千釋迦付授勸轉已畢復轉為千百億釋迦付授勸轉而與一切衆生開心地道故云復轉為千百億釋迦及一切衆生也二勸授有序次第說我上心地法門品汝等受持讀誦一心而行次第等者明非頓說汝等受下明漸中有頓也意謂心地法門位有四十諸衆生性根有大小利鈍不等生住異滅四十二品無明亦有輕重不一必須次第說我上心地法門品其次第者初說十住真空妙理次說十行實相妙行次說十向中道一諦次說十地所證真如此圓融中而說行布非若儱侗真如之所談也汝等受下是舍那佛囑授千佛千百億釋迦佛令轉囑授一切衆生故也領納曰受固守曰持對本曰讀離本曰誦言一心者有五小乘教中假四諦理而說一心故得悟解始教約第八識心了一切緣生之法法法皆空各無自性而受異熟之果終教所言一切恆沙性淨功德具於如來藏心頓教即於一念不生之心無染無淨頓顯理性圓教主伴圓融法法無礙一即一切一切即一卷舒自在總該萬有此五總即不出發起究竟之心亦名一行三昧所謂攝心一處即是諸佛道場散亂片時乃即衆生境界受持讀誦一心而行是行布中說圓融法非若分別名相之類也三受已轉化二初受已謝師二各旋本界初受已謝師爾時千華上佛千百億釋迦從蓮華藏世界赫赫師子座起各各辭退舉身放不可思議光光光皆化無量佛一時以無量青黃赤白花供養盧舍那佛受持上所說心地法門品竟言爾時者即盧舍那勸授轉化時也舍那付授已畢時當機諸佛領旨各旋本迹世界說法利生應緣去也舉身等者表顯心地戒光出生無量無邊智慧佛凡此本佛迹佛迹迹之佛皆從心地戒光流出此光非可心思言議故云不可思議也光光等者即千釋迦及千百億釋迦所放不思議光復于光光中皆化無量不思議佛是以心地法門戒光無盡而即出生諸佛亦無盡故一時等者以行果道同故花表因行非花無果非因萬行則無果佛世間花果從土地中生出世花果從心地中生故以妙花莊嚴妙果青花以表十住赤花以表十行黃花以表十向白花以表十地千臂經中乃廣明之故以心地因花還以供養心地果佛所謂諸供養中法供養最是也受持等者從供養中作一結語以起下文故云受持心地法門品竟二各旋本界二初入定歸本二出定說法初入定歸本各各從此蓮華藏世界而沒沒已入體性虗空華光三昧還本源世界閻浮提菩提樹下各各等者顯從本依世界而隱初隱為沒終隱謂沒已入體性下正明所隱迹處即入本體法性三昧定也體性虗空華光三昧者此即法身本定之別號也言此法身常住本定體牲在聖不增處凡不減是知心佛與諸衆生三無差別平等平等所謂諸佛心內衆生時時成道衆生心內諸佛念念證真衆生迷而不覺不自受用諸佛悟此出沒隱顯自在無礙猶如虗空其體本非色相而以色相顯發法身體性本非來往無形無相而以行花智光任運莊嚴用不離體照不離寂照寂平等理行無二故曰體性虗空華光三昧問此定與上舍那如來所現虗空體性本源成佛常住法身三昧定光有何差別答彼定乃為發明因地之心修果地覺故云成佛常住法身三昧此定即為發明果地之覺現身益物故曰虗空華光三昧二定名異而體同也還本源世界者千釋迦佛千百億釋迦佛各各從彼本土放光示衆各各接生疑之衆俱往本師盧舍那佛所聽戒法令受戒竟故又各還應跡所依本源世界見隱顯不離當處故云還本源世界也閻浮提者即娑婆世界四洲之中南贍部洲也菩提華言覺道亦名道樹凡一切諸佛皆在此樹下示成無上覺道故也二出定說法二初明橫說法二明豎說法初明橫說法二初出定相示二正說法門初出定相示從體性虗空華光三昧出出已上既有入此必有出初現名出現畢名為出已問諸佛法身充滿十方普現一切色身三昧何有入定出定相耶答略有三義一者觀實相義本離名字言說等相所謂諸法寂滅相不可以言宣除佛方便說故有此出入相二者觀說法時有當說時不當說時之別所謂欲識佛性義當觀時節因緣故有此出入相三者觀衆生根以何等根說何等法所謂隨機演教應病與藥故有此出入相經云先說無量義經復入無量義定乃至出定揚德使彼根機純熟深心仰慕然後與說正合此義二正說法門三初次第所說二圓頓所說三例結所說初次第所說方坐金剛千光王座及妙光堂說十世界法門海復從座起至帝釋宮說十住復從座起至𦦨天中說十行復從座起至第四天中說十回向復從座起至化樂天說十禪定復從座起至他化天說十地復至一禪中說十金剛復至二禪中說十忍復至三禪中說十願此釋出定說法示迹之義方坐金剛等者此是初會說十信法門也方者正也金剛取至堅至利義千光取至明至照義王者至尊無對之義以顯此座乃是千佛所傳無動無壞無晦無蒙無有比對大寶華王座也初地菩薩功德積感承本願力寄位人乘作金轉輪王位修十善業以化衆生行檀度法而嚴妙果統攝四洲一切國土故佛始成正覺初轉法輪而於此處說十信法門也言十世界法門海者此即華藏莊嚴十世界海一真如心乃是十方三世一切諸佛自覺聖智受用境界諸佛乘此法門倒駕慈航一切菩薩皆修此門以至究竟果海一切衆生以迷此心流轉十方生死無盡故云十世界法門海又顯十方世界無盡諸佛無盡衆生無盡諸佛法門亦復無盡故也海喻深廣汪洋無所不藏無有窮盡之相此十世界法門海義甚深說不能盡大意欲令衆生即入圓信以起圓解乃得圓證之義若廣明者當閲華嚴十世界品毗盧遮那如來名號如來現相諸品一一發明此義復從座起至帝釋宮等者此第二處次第所說十住法門之義問舍那唯說三十心十地法門何故先說十信次說十住答以舍那佛對千佛說故頓說心地品以十住中具該十信非信無以有住故上所云堅信忍中十發趣心向果今明次第是故先說十信後說十住使已發大心衆生得入圓十信位方得圓十住也帝釋宮者即忉利天所住內庭也梵語釋提桓因華譯云能天主梵語忉利華言云三十三此天居須彌頂繇單修上品十善得生其中帝釋二字華梵合舉即離垢地菩薩修行功行多作忉利天王寄位天乘是故世尊次於此天說十住門為令已入十信菩薩天王得入圓十住法門也至𦦨天中等者此第三處所說十行法門義也𦦨天即夜摩天華言時分謂時時快樂觀蓮花開合乃分晝夜此天依空而居繇修上品中善兼坐未到定禪得生其中即發光菩薩修行功行多作夜摩天王寄位天乘是故世尊次於此處說十行法為令已入十住菩薩天王得入圓十行法門也至第四天等者此第四處所說十回向法門四天即兜率陀天華言知足謂於五欲知止足故此天依空而居所修同前即𦦨慧地菩薩初斷俱生身見觀於道品同於初果預流位也是故世尊次於此處而說十回向門使令已入十行菩薩天王得入圓十回向法門也至化樂天等者此第五處所說十禪定法門言化樂者謂此自化五欲而娛樂故此天依空而居所修同前即難勝地菩薩修行功行多作化樂天王寄位阿羅漢乘觀四諦行既終同於四果無學位也是故世尊次於此處而說十禪定門為令已入十回向位諸大菩薩天王得圓知諸佛禪定圓入諸佛剎土圓證法身境界也言禪定者梵語禪那此云寂靜此是諸佛自覺聖智境界故云禪定別經所云三賢行滿修四加行方登十地此也至他化自在等者此第六處所說十地法門他化自在天者此有二種一者正修上品十善兼坐未到定禪假此得成自然受樂二者偏修十善假他所化以成己樂即魔王天此二天王依空而居謂現前地菩薩修行功成多作自在天王統攝欲界寄緣覺乘謂此菩薩於修十二因緣觀行同於緣覺是故世尊次於此處而說十地為令已入十禪菩薩天王得圓證十地法門也已上所在四王忉利夜魔兜率化樂他化六天之中所說十信十住十行十向十禪十地門者正為初地乃至六地菩薩寄位人乘天乘聲聞乘緣覺乘同彼凡夫天人三乘二乘斷惑是故世尊亦即在此六欲天中說十信三賢十禪十地令彼諸凡夫天人聲聞緣覺回向大乘而證十地也下說十金剛十忍十願者以七地八地九地菩薩寄位一乘修菩薩行為令已登七地諸菩薩等發起自在任運現身說法是故世尊在於初禪二禪三禪說十金剛十忍十願為令永斷俱生二執生相無明得入如來妙覺果海復至一禪等者此第七處說十金剛法門初禪天王即離生喜樂地此天已離下界欲惡欣上妙定故云離生喜樂即遠行地菩薩修行功行多作初禪天王寄菩薩乘以自證法攝化衆生是故世尊次於此處說十金剛為令已登七地菩薩天王得證金剛觀智入妙覺果海也復至二禪等者此第八處說十忍法門二禪即定生喜樂地此天已離初禪之喜攝心在定淡然凝靜而生勝定故云定生喜樂即不動地菩薩修行功德多作二禪天王主小千界寄一乘位說自證門教化衆生是故世尊次於此處說十忍法令彼已得真無生忍菩薩天王修行十忍法門入妙覺果海也復至三禪等者此第九處說十願法門三禪即離喜妙樂地此天已離初禪二禪喜踊之動泯然入定而得勝妙之樂故云離喜妙樂地也即善慧地菩薩修行功德多作三禪天王主中千界寄一乘位以自法門為諸衆生演說開示是故世尊次於此天說普賢十願法門令彼已證第九善慧菩薩天王更得十大願力得入如來妙覺果海也二圓頓所說復至四禪中摩醯首羅天王宮說我本源蓮華藏世界盧舍那佛所說心地法門品已上九處乃圓融中說行布此之一處是行布中說圓融也四禪即捨念清淨地此天即捨二禪之喜三禪之樂心無憎愛一念平等清淨無雜住於此禪空明寂靜萬象皆現故云捨念清淨即法雲菩薩修行功德多作四禪天王主大千界而位寄一佛乘於諸聲聞緣覺菩薩天王說自證法門是故世尊次於此處頓說心地四十行位法門品令彼圓證十地菩薩入妙覺果海也三例結所說其餘千百億釋迦亦復如是無二無別如賢劫品中說此例釋迹迹佛說法之義謂千釋迦所說如是其餘千百億釋迦佛出定之後示轉法輪亦皆初從妙光堂中終至首羅宮中十處說法次第敷演漸說頓說與千釋迦所說亦復如是無二無別自爾時盧舍那至此所說乃是略言其義廣如賢劫品中已說也二明豎說法二初天上說道二人間說戒初天上說道四初示相成道二成道說法三說經繇致四往返多遍初示相成道爾時釋迦牟尼佛從初現蓮華藏世界東方來入天宮中說魔受化經已下生南閻浮提迦夷羅國母名摩耶父字白淨吾名悉達七歲出家三十成道號吾為釋迦牟尼佛已上明千釋迦及千百億釋迦皆於十方世界說心地法門品此下明一釋迦於一世界之中所說心地法門品也爾時等者示降生來源義爾時釋迦世尊自從初現華藏世界東方而來入此兜率天王宮中先在此天伏魔說魔受化經已次觀下界衆生有業覆障難解脫者有根純熟易解脫者故即從天王宮隱勝現劣下生南閻浮提迦夷羅國淨梵王家為太子也迦夷羅國此云赤澤或迦毗羅此云黃色黃即處中最為安隱又古有黃色仙在此修道又古諸佛出現世間皆於此處示生有此多義故名黃色爾時如來將欲降神先現五瑞所謂從兜率天降皇宮者第一相也母名摩耶等者示生身父母之名德梵語摩耶此云大幻以大幻術幻出諸佛故凡十方諸佛示現受生皆其母也父字白淨者是此方譯語梵語頭檀也世尊將欲受生之時觀淨梵王性行仁賢摩耶夫人五百世時曾為菩薩之母應當往彼托胎所謂示入母胎住胎第二第三相也吾名悉達者示出生之名德也梵語悉達此云頓吉以太子初生時寶藏悉空空而復滿故名頓吉亦名一切義成即於世出世間一切諸法實相義成故於時太子從摩耶右脅出立蓮花上一手指天一手指地目顧四方周行七步曰天上天下唯吾獨尊世出世間此法第一所謂示現出胎誕生第四相也言七歲出家者示離塵俗返妄歸真之義世尊初為太子具大智慧成就捨心觀生老病死苦厭世五欲捨金輪位如棄涕唾心思出家往白父王父王不許故於二月三日身放光明普照四天王宮乃至淨居天宮諸天見已到太子所禮足白言菩薩無量劫來所修行滿今正成熟即於午夜逾城出家苦行林中剃除鬚髮所謂示現逾城出家苦行林中第五相也所言三十成道號吾為釋迦牟尼佛者道即道果世尊功行滿足道成德備三身圓現四魔潛消所證圓果德號亦以顯然燈佛授記不虗故號吾為釋迦牟尼佛所謂示現覩明星而成道降魔第六相也此經言七歲出家三十成道諸說不一或云騰寫之訛或云八千返中之一或表圓教七信已上無退或七歲表七覺支三十表念處正勤神足根力八正道具三十七品助道法凡諸佛出世說法度生皆依此故今則不然七歲出家猶言出家七歲謂初出家時先學不用處定不久得證知非究竟次學非非想定不久得證知其亦非究竟次復遊行諸國凡經一年次更苦行六年至三十乃成正覺此按毗尼部中所釋也二成道說法於寂滅道場坐金剛華光王座乃至摩醯首羅天王宮其中次第十住處所說於寂滅道場者此示成道轉法輪相約事而言即是真阿練若正修行處約理而言即是所證菩提涅槃無為無相清淨寂滅之理所謂圓滿菩提歸無所得是故諸佛於無所得寂滅理中成等正覺於無所得寂滅理中坐大道場轉大法輪故云於寂滅道場也坐金剛下明轉法處既成道已當轉法輪度諸衆生爾時世尊即自思惟我得智慧無能信受若我住世於世無益不如入於涅槃爾時梵天而白佛言世尊今日法海已滿法轉已立潤濟開導今正是時云何欲捨一切衆生入於涅槃而不說法是時如來受梵天王請已雖知根鈍且稱本懷是故雙垂兩相一處於鹿野苑為憍陳如五比丘等轉四諦輪說小乘種種教法一處於菩提場演大華嚴并普光明殿中同說此經此佛與上千佛所說皆從初坐金剛千光王座終至首羅天宮其中次第所說住處共有十也蓋上多佛所說一佛所說頓說漸說及諸住處皆亦無二無別華嚴七處九會所說此經十處十會所說二經大同小異所謂示現成道轉大法輪第七相也何無第八以未涅槃故也三說經繇致時佛觀諸大梵天王網羅幢因為說無量世界猶如網孔一一世界各各不同別異無量佛教門亦復如是此釋心地戒品緣起之義及此梵網得名處也時者即於此梵天中說此心地法門之時爾時世尊在大梵天宮中觀彼網羅幢因為喻為說無量世界衆生心行依正差別猶如網孔一一世界各各不同別異無量故佛教門隨機施設亦復如是此義俱已解見題中今不繁釋四往返多遍吾今來此世界八千返為此娑婆世界坐金剛華光王座乃至摩醯首羅天王宮為是中一切大衆略開心地法門竟此是如來大慈悲心廣大誓願重來人間至八千返所謂佛慈無盡衆生無盡此雖來八千返若較華嚴經中如來出現名號品中看來其名其號其法其時又非可以數目窮盡可歎我等癡迷至今還作衆生深負我佛大慈弘恩豈不慚愧為此娑婆世界等者申明來此八千返義也坐金剛華光王座者金剛之座三世諸佛坐此成道無少變壞故乃至等者謂此說法道場共有十處超其中八故云乃至為是等者明佛說法本懷之義謂我來此八千返者無非只為此界人天一切大衆也略開二字明說未廣竟者言在天上說心地法門已畢也二人間說戒二初聖凡本源二總結戒相初聖凡本源三初差別說戒二頌前起後三正結戒品初差別說戒復從天王宮下至閻浮提菩提樹下為此地上一切衆生凡夫癡暗之人說我本盧舍那佛心地中初發心中常所誦一戒光明金剛寶戒是一切佛本源一切菩薩本源佛性種子一切衆生皆有佛性一切意識色心是情是心皆入佛性戒中當當常有因故當當常住法身如是十波羅提木叉出於世界是法戒是三世一切衆生頂戴受持吾今當為此大衆重說十無盡藏戒品是一切衆生戒本源自性清淨前文自地上大觀梵網孔為因詳說三十心十地中修斷法門品竟今從天上復下人間而詳舉心地中十重四十八輕戒行故云復從天王宮等為此地上等者正明下至閻浮提義一切衆生總舉閻浮界內諸衆生也凡夫癡暗人者未出三界俱名凡夫以凡夫煩惱覆心慧目不開故名癡暗之人如是之人必依何法而使障破慧開入聖超凡若非戒法攝心終於煩惱生死海中永無出離故為此衆復下天宮說我本師盧舍那佛心地因中初發心中常所誦一戒此戒何名乃光明金剛寶戒也言說我盧舍那佛者舉法有所師也常所誦一戒者出戒本體此戒體華嚴所言一真法界大總相法門體如圓覺云神通大光明藏如楞嚴云即是常住真心性淨明體法華所云一乘實相佛知佛見在此名為光明金剛寶戒言光明金剛寶戒者此出戒相名德也光明即智慧也金剛即堅利也寶戒即具足衆善之法財也欲破煩惱黑暗非大智慧光明不能欲碎根本無明非金剛堅利智不能欲以莊嚴法身果相非衆善寶戒法不能蓋此一戒是諸佛與衆生平等具足無二體性諸佛衆生本無增減是故以此一戒為一切佛果海本源為一切諸菩薩因地本源不獨諸佛菩薩以此戒為本源此一戒者是即一切衆生本有佛性種子既皆有佛性何不成佛道所以不得成佛道者蓋用一切意識色心迷背佛性戒體故也意者思量曰意屬第七末那識名染污意即亦轉呼為染淨依也識者分別曰識以計名相起惑造業即前六種轉識色者所緣曰色即五根六塵也心者集起名心即第八識名阿賴耶統收前七種識謂此心識以攝世出世間染淨諸法有三藏義能藏所藏我愛執藏此識體性乃佛性種子本無遷改在衆生分中言名為佛性在非衆生分中名為法性今在因故名為佛性若能具大智慧悟此體性即本是情是心皆入佛性戒中既云皆入佛性戒中應當發本有常具正因心也既發此正因心則當依此正因修行不墮邪因既不墮邪因當來決定證得常住清淨法身不生不滅之果而不為幻身所染故云當當常有因故當當常住法身也如是十波羅提木叉等者出戒用也夫觀衆生皆有戒因以成戒果是則諸佛所悟凡夫所迷盡此一戒如是諸佛不忍見衆生於本有勝因勝果迷而不悟是故若不假此多種戒品一一攝持何以得令六根返妄歸真所以又將此一戒方便開而為十如是十波羅提木叉出於世界教誨諸人此十戒法諸佛本此軌則成佛若人依此戒則體會修行必定成佛即是衆生成佛法則之戒故云是法戒也如起信云一者體大真如平等不增減故即此一戒是二者相大謂如來藏具足無量性功德故即此光明金剛寶戒是三者用大能生世出世間善因果故即此十波羅提木叉是梵語波羅提木叉此云保解脫謂持此戒者保護三業六根得大解脫也三世一切等者舉人勸受持也言此十戒既為法則成佛大用是則三世一切衆生應當頂禮佩戴時時尊尚不可輕褻領受執持刻刻體會不可忽忘故云頂戴受持吾今當為等者結顯戒法雖則無盡不離本體之義言為此大衆者即為此現受戒四衆八部之大衆也重說等者謂此戒體是一因諸衆生心念無盡故此戒法亦無有盡是故以此一戒演而為十十戒復開為四十八乃至三千八萬無窮無盡一切戒品無不攝歸於此十波羅提木叉故云吾今當為此大衆重說十無盡藏戒品也是一切衆生戒本源自性清淨此二句的指戒體原本一味平等以衆生心念無盡是故諸佛所說戒品亦無有盡惟恐衆生執此戒相不達戒性所以復言此無盡諸戒者即是一切衆生本源自性清淨戒體本無戒可持亦本無戒可說今此說者受者皆方便也二頌前起後我今盧舍那方坐蓮華臺周匝千華上復現千釋迦一華百億國一國一釋迦各坐菩提樹一時成佛道如是千百億盧舍那本身千百億釋迦各接微塵衆俱來至我所聽我誦佛戒甘露門即開是時千百億還至本道場各坐菩提樹誦我本師戒十重四十八戒如明日月亦如瓔珞珠微塵菩薩衆繇是成正覺是盧舍那誦我亦如是誦汝新學菩薩頂戴受持戒受持是戒已轉授諸衆生諦聽我正誦佛法中戒藏波羅提木叉大衆心諦信汝是當成佛我是已成佛常作如是信戒品已具足一切有心者皆應攝佛戒衆生受佛戒即入諸佛位位同大覺已真是諸佛子大衆皆恭敬至心聽我誦此段總頌上下開說心地戒法結前起後讚歎勸受奉行大略也我今盧舍那者此明本迹之佛聖人說法皆以無我破一切我今言我者非同凡夫我相之我亦非外道神我之我乃至亦非權乘假我之我是乃無我中我八自在我無生我也今者當說時也盧舍那佛即正報身毗盧遮那即正法身然佛法身乃有一身二身三身十身等別此佛圓攝一切故云我今盧舍那也方坐蓮華臺者此明本迹依報國土方者正也坐者安也以正心地法戒安住其身及安一切衆生身故蓮華總有二義一處泥恆淨二出水香潔喻顯心地戒體在凡夫中本無垢相在聖人中本無淨相所謂處生死流驪珠獨耀於滄海踞涅槃岸桂輪孤朗於碧天也又蓮有開合義以表如來開權顯實會權歸實謂開一乘心地戒法之實演說十重四十八輕之權復會歸本源自性清淨心地戒體之實又表舍那一體化為千釋迦佛復現千百億釋迦佛而此千釋迦佛千百億釋迦佛皆攝歸於盧舍那佛之本體也又因果齊彰義即因該果海果徹因源故臺者即高顯也以表舍那心地戒體無有及者無有逾者所謂一切衆律中戒經為上最也又臺居中以中攝十方故即表舍那如來為千佛主心地妙戒為衆戒本也周匝千華上者明應迹依報土顯本迹依報周遍融通之義復現千釋迦者明應跡正報身顯本迹正報周偏融通之義謂千華上每一華中復有一化佛身而坐其上即顯從一光明金剛寶戒中演出十波羅提木叉之妙戒也一華百億國者明迹迹依報土顯迹佛依報周遍圓融之義謂千華朵各有百億葉瓣每一葉瓣為一佛國土每一國土中有一化佛為衆說法以表四十八輕乃至無量戒品亦皆從十戒中演出各坐菩提樹一時成佛道者申明應化同時體用不二表心地戒品數雖多同一梵行體也已上八句顯明從體起用如是千百億下顯明攝用歸體言千百億釋迦以千釋迦為本千釋迦佛又以盧舍那佛為本故也已上三節總頌大部前九品文正為開說心地戒法緣起之義千臂經中說心地戒品前先取此義後說三賢十地法門文義錯綜以今上卷文中亦有從本起迹攝迹歸本之義此似以後例前而為發起之端向下正頌此品起發繇也千百億釋迦等五句此頌上卷自爾時釋迦佛身放慧光所照鼓動天人生疑玄主集衆請問光相釋迦接衆至舍那所聽受心地戒藏一大段經文義問今只言千百億釋迦至舍那所不言千釋迦何也答既千百億釋迦皆各接微塵衆至舍那所聽受戒者則千釋迦亦各接微塵衆來聽受戒不待言矣問所言各接微塵衆是何處衆答是千釋迦千百億釋迦於應迹本源世界垂手接引不可說不可說生疑作念大根衆生至本師所聽受心地戒法正明小根機者未堪與也俱來至我所者謂能接佛所接衆生俱至華藏故云俱來聽我誦佛戒者謂聽舍那所誦諸佛大戒以顯此心地大戒是諸佛共證也甘露門即開者讚戒德也謂此戒法如世甘露若得食者便獲清涼不老不死若人能受淨戒當下即出三界生死熱惱喻甘露門開也是時千百億下四句頌上千釋迦佛與千百億釋迦領衆至舍那所聽受戒竟復即各還本源世界示現受生出家成道上升天宮十處說法化天已畢又復從天王宮下至閻浮界說本盧舍那佛初發心中常所誦一戒乃至本源自性清淨一段經文是時千百億者即舍那佛為千釋迦傳授心地戒法授受時也還至本道場者謂千釋迦及千百億釋迦聽戒已畢復還本道場中說法利生以顯諸佛出定入定去來坐立皆不離本體故言坐菩提樹者顯諸佛成道轉法同一本覺無二道也誦我本師戒者顯戒授有師不忘根本心故已上頌前向下頌後十重四十八者出戒相也戒如明日月亦如瓔珞珠者讚戒功德謂若人能受持此戒能滅愚癡暗障即如日月能破昏暗又持戒人清淨六根於一切法常得解脫亦如日月朗照十方於空往來自在無礙又持戒者滅除罪垢即如杲日能消霜雪又持戒者能滅身心熱惱即如明月能清涼故亦如瓔珞珠者謂持戒人因戒生定因定發慧一切功德智慧法身悉繇戒度而成就故如瓔珞珠莊嚴身相圓滿好故微塵菩薩衆繇是成正覺者顯持戒者利益真實而不虗故言微塵衆顯持戒者獲益衆多如是無量無邊微塵衆繇持十重四十八輕戒而得成佛以見冀佛果者必當受持此戒也是盧舍那誦我亦如是誦者承上謂此諸戒繇我本師自誦我亦隨誦非自不誦教人誦也汝新學菩薩等四句勸自受以授人也上言微塵諸菩薩衆既繇茲戒而得成佛汝等新學菩薩應當一心頂戴受持是戒以受持是戒已更當轉授諸衆生也自利利人故稱菩薩摩訶薩也若不轉授衆生濫同聲聞人矣諦聽我正誦等三句此誡聽也諦者審也聽者領也我正誦者揀非外道二乘所誦偏邪戒也外道妄計前世從雞狗中來即持雞犬等戒獨立噉穢而行苦行望生天上名曰邪戒即是邪誦二乘持誦寂滅空戒名為偏戒即是偏誦今誦大乘實相心地妙戒故名正誦此法既正若非審諦而聽終不得入一乘實相心地妙戒是故須當審諦聽也佛法中戒藏者佛所說法藏有三此三藏中戒藏也戒藏即毗尼梵語毗尼華言性善謂性本自善故亦云善住能令佛法久住世故亦云善壽謂毗尼住世則佛法住世毗尼若滅則佛法速滅毗尼乃佛法中壽命故云佛法中戒藏也波羅提木叉者即戒果義持戒為因解脫是果是故若人能持淨戒保衛得大解脫也大衆心諦信下四句勸諦信也謂聽而弗信則空聽無益故須當諦信茲戒為成佛正因能如是奉持當來決定成佛無疑且我是已成佛繇我信持如是心地戒品已得福慧具足又我是已成佛尚常作如是信況汝未成佛乎是故勸汝應諦信也一切有心等者六句此勸受也謂既信當受信而不受非真信也言一切有心者揀非木石無心也謂凡有心者皆當作佛豈小因小果故云一切有心者皆應攝佛戒也問上云是情是心皆入佛性戒中此云一切有心者皆應攝佛戒二義何別答上是從外而進故云皆入佛性戒中此是依內而納故云皆應攝佛戒又上是返妄歸真義故云皆入今是合覺背塵故名攝也言衆生受佛戒即入諸佛位者正明皆應攝佛戒義蓋心外無佛心地外無佛地今則衆生既受諸佛心地法戒豈不即入諸佛位耶位同大覺已真是諸佛子者舉位讚獎勸進之義問上既云即入諸佛位此又云位同大覺已即當是佛何以僅名佛子答戒位雖同大覺而非實證大覺道果之位以因行未圓必經三大阿僧祇劫廣修六度一切萬行承事十方諸佛盡行諸佛道法行願滿足始紹佛位如灌頂王子必紹王位時為儲君祗稱王子今受佛戒以修佛行故名佛子真是諸佛子者佛子有三一外佛子謂諸凡夫未曾入道未曾紹隆佛種故名外子二庶佛子謂二乘人但稟小乘教法生於法身不從如來大法中生名為庶子三真佛子謂大乘菩薩稟受如來大乘戒法生於法身故稱真是諸佛子言大衆皆恭敬至心聽我誦者結勸誡聽之義大衆即閻浮地上稟受佛戒國王王子百官宰相及比丘比丘尼優婆塞優婆夷乃至天龍八部聖凡同會清淨之衆也皆恭敬者恭就身言即身業虔誠敬就心言即意業虔誠外肅內虔內外精誠言語道斷心行處滅此攝口業虔誠所謂制心一處無事不辦也此有二義一者謂舍那所傳心地戒法我尚自誦如對舍那佛面如聞舍那佛語況汝新學可不至心聽誦耶二者汝繇受持佛戒即入諸佛寶位是汝出世大事因緣可不至心聽誦叮嚀付囑詞旨切矣三正結戒品二初標敘結受二說戒相貌初標敘結受二初經家敘說二佛自敘說初經家敘說爾時釋迦牟尼佛初坐菩提樹下成無上覺初結菩薩波羅提木義孝順父母師僧三寶孝順至道之法孝名為戒亦名制止佛即口放無量光明是時百萬億大衆諸菩薩十八梵天六欲天子十六大國王合掌至心聽佛誦一切諸佛大乘戒此總標顯結制心地戒法緣起也言爾時者即從天上復下人間示現出家成道時也釋迦牟尼佛者示生娑婆之佛號也初坐菩提樹下者即示始坐道場之處成無上覺者即正遍知覺是如來示現所證菩提涅槃二轉依號一切聲聞緣覺諸菩薩等無有等者無有逾者故云成無上覺初結菩薩波羅提木叉者示初轉法輪之急務也如來出世本懷原為令諸衆生離苦得樂同佛菩提等無差別奈衆生不知其苦是故世尊思惟畢竟以何法門能令衆生離苦故演波羅提木叉保衛三業六根得大解脫衆生離苦佛願滿足故先結戒戒有大小乘分大乘戒藏被菩薩乘小乘戒藏被聲聞乘聲聞戒狹未稱究竟不言即成佛道菩薩戒廣普被一切衆生受戒即入佛位離一切苦得究竟樂又聲聞戒常隨佛衆隨事而制菩薩修行六度化利衆生不常隨佛波羅提木叉戒乃即六度萬行元首故世尊最初成道始轉法輪即先頓教結此菩薩戒藏也孝順父母師僧三寶顯菩薩戒行萬行因中最勝因也何者父母即生身父母以此世身繇本父母懷胎乳哺移乾就濕種種辛勤撫育而成師即本師和尚乃法身父母以我法身繇師誨戒之力而生又即師有三師七師皆有教誨之恩僧有同學同見同行皆有成人之德三寶即佛法僧乃慧命父母也以我慧命賴三寶熏修之力而得如是諦思父母師僧三寶俱有深恩重德實難酬報當發孝心而順事之即此戒中便是孝順如不孝者禽獸之不如也故云孝順父母師僧三寶孝順至道之法此句承上謂波羅提木義其義廣大無量無邊此孝順一法何以能盡佛戒之義曰此孝順深因乃趣無上佛果至道之法非同世間孝道秪得人天小果而已蘭盆疏云稽首三界主大孝釋迦尊纍劫報親恩積因成正覺茲繇報親深因而成佛道極果不孝當致至極苦果所謂五刑之屬三千而罪莫大於不孝也是故世出世間善惡果報皆在孝與不孝儒典讚孝曰至德要道又謂聖人之德無以加於孝也故曰至道之法孝名為戒亦名制止此二句者明波羅提木叉之名義也上以波羅提木叉為戒今只言孝順曰至道之法而不言戒品何耶蓋孝順所在自然梵行具足因得戒名如法苑云戒即是孝衆生皆吾父母是故不殺不盜即守戒也皆吾父母即行孝也又下經云以常行放生業觀一切男子是我父一切女人是我母我生生無不從之受生故六道衆生皆是我父母而殺而食者即殺我父母有生無殺即孝即戒也故此經首尾貫徹十重四十八輕戒中皆云孝順心恭敬心慈悲心而恭敬心慈悲心者悉從孝順心中流出故云孝名為戒亦名制止者此句再舉孝道名位正以盡戒義制者法制止者禁止以諸戒心修一切善即得阿耨菩提無善不修便是孝順心中之法制也以諸戒品滅一切惡便是孝順心中之禁止也故云制止所謂諸惡莫作衆善奉行自淨其心是諸佛戒此一法三聚足三身圓以是離一切苦得究竟樂此吾佛世尊始結波羅提木叉正義也括而言之如來出世所說三藏十二部教所詮者戒定慧所修者六度行所證者無上道是以始成無上正覺初結菩薩波羅提木叉戒終至涅槃會上云汝等諸比丘當尊重珍敬波羅提木叉是汝大師如佛在世無有異也波羅提木叉戒也是汝大師孝也是故始終所說一以孝名為戒亦名制止總括收盡而已佛即口放無量光明者標心地戒法瑞應也此經放光共有六處一者釋迦身放慧光即果明因故二者玄主身放金剛白雲色光即因顯果故三者舍那身放虗空光明因果不二故四者舍那付授放光光中召告即明佛佛受持皆此行故五者佛佛放光光光化佛現花供佛以明必修本因方得果故今第六者口放無量光明說諸菩薩心地戒品正明佛佛親口宣傳畢竟要依心地戒光為修行勝因然後得證心地戒光之勝果也是時百萬億大衆者總標戒光所攝人天凡聖有緣衆也諸菩薩者內凡外凡地上諸菩薩也十八梵天即色界中初禪三天二禪三天三禪三天四禪九天共十八位六欲天子即欲界中四王忉利夜摩兜率化樂他化之六天也十六大國王者西域大國共有十六既大國王秉受戒法其餘國王聽受戒法亦可知矣合掌至心二句明聽受戒法虔恭意合掌即身業誠至心即意業誠攝心諦聽言不亂發即口業誠以是三業虔誠於此心地戒光豁然通達二佛自敘說佛告諸菩薩言我今半月半月自誦諸佛法戒汝等一切發心菩薩亦誦乃至十發趣十長養十金剛十地諸菩薩亦誦是故戒光從口出有緣非無因故光光非青黃赤白黑非色非心非有非無非因果法是諸佛之本源行菩薩道之根本是大衆諸佛子之根本是故大衆諸佛子應受持應讀誦應善學諸佛子諦聽若受佛戒者國王王子百官宰相比丘比丘尼十八梵天六欲天子庶民黃門淫男淫女奴婢八部鬼神金剛神畜生乃至變化人但解法師語盡受得戒皆名第一清淨者此段正明世尊結戒誦持之緣因也佛告諸菩薩言至十地諸菩薩亦誦數句乃以己勵人也謂我是已成佛今尚半月半月自誦諸佛法戒況汝等初發心菩薩乎半月半月者每月二次誦戒以十六日至三十日為黑半月初一日至十五日為白半月若逢月小即二十九日為黑半月誦者謂誦十重四十八輕戒然此戒乃一切諸佛菩薩修證菩提涅槃之根本正因此是釋迦如來半月半月立誦諸佛所傳心地戒法萬古弘規誰敢違也言一切發心菩薩者此即圓該十信乃是發大乘心諸菩薩也既初發心亦當如我誦也謂不但汝等初發心者當誦即入理證真十住十行十向十地位諸菩薩此諸菩薩戒心既固戒行已圓如是菩薩亦如是誦其初心誦戒尤可知也是故戒光等者此舉勝緣明勝因也謂從舍那自誦而即千佛隨誦以千佛自誦故乃至新學舊學菩薩亦如是誦是故戒光之緣親從諸佛口中流出既言光從口出是有緣矣既有是緣必有其因以致此緣故云有緣非無因故光光等者破執情也恐凡外小乘聞有緣有因遂生執著不達自家本有戒光向外馳求故云此光非屬青黃赤白黑之色塵法非屬四大幻色之妄身法非屬六塵緣影之妄心法非屬外道為有為無之斷常邪見法非屬二乘修證因果等戲論法此心地戒光者乃超情塵離有無見絶修證心不可思議是一切佛所證無上菩提無餘涅槃本源之法是行菩薩道者之根本法既此戒光是一切根本法是故大衆諸佛子等應當受持應當讀誦應當善學善學者謂當於此心地戒光必能受持通達其義受而無受無受而受善用之也諸佛子諦聽者誡聽辭也謂此心地戒光實相大法若不息慮忘言默聽玄會則亦不能與之相應是故勸諦聽也若受佛戒等者舉能受之人也謂若國王王子百官宰相比丘比丘尼十八梵天六欲天子庶民黃門淫男淫女奴婢八部鬼神畜生乃至變化人如是等衆皆來受佛戒也國王等解見前言八部者即天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽之八部鬼神也金剛神者即護法大力士畜生即六畜等變化人者是即天龍鬼神禽畜等類有大神通力者故能化人形也言但解等者此明戒師不得揀擇義也形雖有別性本無殊無論貴賤人鬼但能解得法師說戒法語即不得揀擇一一盡得與他傳授菩薩心地戒法而去莫作分別而留難也皆名第一清淨者者字牒定謂諸衆生於諸佛淨戒未受之先背覺合塵染污梵行故不清淨今受戒時一切懺悔洗滌淨器返妄歸真梵行具足非同聲聞次第清淨故云皆名第一清淨者二說戒相貌二初總說戒相二別說戒相初總說戒相佛告諸佛子言有十重波羅提木叉若受菩薩戒不誦此戒者非菩薩非佛種子我亦如是誦一切菩薩已學一切菩薩當學一切菩薩今學我已略說菩薩波羅提木叉相貌應當學敬心奉持此承上言既受佛戒為成佛因地心當誦佛戒明佛戒行為成佛果也佛告諸佛子者呼告能受人也有十重波羅提木叉者明所受戒本法也若受菩薩戒不誦此戒者二句牒明違法之人非菩薩非佛種子二句斷定違法之過謂波羅提木叉是菩薩本業今既不誦即棄本業本尚不得云何利益衆生而名菩薩故云非菩薩也此光明金剛寶戒是成佛之真種真種既失即佛果皆失矣故云非佛種子何以故以不肯誦佛戒不明戒性故也我亦如是誦者舉自果人以勸因人誦也一切菩薩等者舉同因人以勸誦也謂我乃果人尚如是誦況因人乎且過去一切菩薩已誦未來當誦現在今誦三世一切菩薩同修因人是已成熟菩薩亦如是誦況汝等新學而不誦乎是故勸汝亦當誦也我已略說菩薩波羅提木叉相貌者謂聲聞戒執身以墮限量而菩薩戒持心離限量故今於無限量中表舉一二故云我已略說言相貌者謂波羅提木叉戒體本無形相不妨有持戒者得持戒之相貌而毀戒者獲毀戒之相貌所謂心持呪印顧盻雄毅等是也應當學者勸習學也謂上既知戒有持毀相貌應當時時勤學不可怠也敬心奉持者謂敬奉此戒當要尊重刻刻行持切勿忘失成佛種子故云敬心奉持二別說戒相二初說重戒相二說輕戒相初說重戒相二初別說十重二總結十重初別說十重十第一殺戒佛言佛子若自殺教人殺方便殺讚歎殺見作隨喜乃至呪殺殺因殺緣殺法殺業乃至一切有命者不得故殺是菩薩應起常住慈悲心孝順心方便救護一切衆生而反恣心快意殺生者是菩薩波羅夷罪此釋第一殺戒相也聲聞四棄淫戒為首聲聞志出三界無望成佛唯斷續生故以淫戒居首菩薩化利衆生以慈為本是故一切衆生皆知貪生畏死若斷彼命便失本慈且令生銜苦怨恨不忘纍生酬報無已是以殺戒在先故楞嚴經云佛告阿難又諸世界六道衆生其心不殺則不隨其生死相續汝修三昧本出塵勞殺心不除塵不可出縱有多智禪定現前如不斷殺必落神道故戒之也佛言佛子下正明殺事乃至一切下以輕況重例明不當殺也是菩薩下正明佛子戒所當持而反恣心下舉不持之過是菩薩下結不持之罪也佛言佛子者呼其人而告之言為佛子受持佛戒常依戒修不可輕違佛制以下倣此言自殺者是自己行殺乃身心所造殺業也教人殺者雖不自己行殺而使他人行殺乃心口所造殺業也或不自殺亦不教殺假以巧設方便令其致死是名方便殺乃意地所造殺業也讚歎殺者謂以竦踊語令彼殺者快意而行亦屬心口所造見作隨喜者謂見他行殺雖亦不教不讚然其心念隨而喜之此屬意業乃至呪殺者謂殺法甚多不悉繁舉故超略之以西域有惡呪呪之令死亦屬心口所造以上所殺之相或只有殺因若殺緣不至則不成殺或因緣會合而前起殺念不復相續亦不成殺必因緣法三事成就方成殺業也言殺因者謂諸衆生從無始來具有貪等種子十惡業因初心菩薩見思等惑諸煩惱障未空殺等習氣不忘忽起一念現行故名殺因殺緣者謂所殺人畜等宿世怨家聚會為緣殺法者謂刀杖網惡呪方便等斷彼命根為法繇是三種和合任運成殺為業以致當來互相殺害也菩薩紹隆佛種上弘下化求解脫道必以慈心為六度本是故戒殺為第一事又不但人與大身衆生而不得殺乃至一切凡有命者如草如木但有生長義者俱不得無故而加折損況生靈耶問菩薩冤親普度是殺皆遮但戒故殺似非等慈答一切遮者為出家菩薩言也如國王宰官殺一救多興善滅惡正權乘菩薩大慈悲心故有遮有開但戒不得無故為名為利以私心成殺也是菩薩等者正明佛子所修之道而勸其當行也慈悲心者是菩薩根本心乃於此心應當常恆安住而莫忘失故云是菩薩應起常住慈悲心常住二字貫下孝順心也以慈悲心愛衆生如赤子恆與之樂而拔其苦以孝順心敬衆生如父母不敢違忤而常恆奉事之方便救護一切衆生者此方便救護四字乃是慈悲心孝順心中救護衆生善巧學處使一切衆生安樂永離刀砧等苦而返恣心快意殺生者者字斷定非為之詞謂修菩薩行者若見衆生有苦如不能救護者尚缺慈悲已乖本行況復恣縱其心快逞其意以殺衆生者乎其殘害已甚正所謂斷大慈悲心故當結罪是菩薩波羅夷波羅夷者華言極惡亦云棄罪謂犯此罪永棄佛海之外不得入於清淨衆中共同說戒羯磨一切僧事皆無有分故云棄罪當墮惡道故云極惡云是菩薩波羅夷罪者表其分位當然是自失其分位故曰是菩薩波羅夷罪也自從上若自殺下至不得故殺一節此即攝律儀戒謂無惡不止也從是菩薩下至救護一切衆生一節此即攝善法戒謂無善不修也既斷一切惡自不令其至於苦地既修一切善自然令其得至樂處是為饒益衆生戒所謂無生不度也繇滅一切惡而惑盡障除以諸惡盡淨故名為斷德因斷成功當來果上證法身佛繇修一切善而智顯慧開以諸善集聚故名為智德因智成功當來果上證報身佛以斷惡修善饒益衆生故名為恩德以恩成功當來果上證應身佛如是三德身相總在三業六根斷惡修善而得成就是名菩薩波羅提木叉反此即波羅夷餘皆倣此第二盜戒若佛子自盜教人盜方便盜呪盜盜因盜緣盜法盜業乃至鬼神有主物劫財物一切財物一針一草不得故盜而菩薩應生佛性孝順心慈悲心常助一切人生福生樂而反更盜人財物者是菩薩波羅夷罪此釋第二盜戒相也盜者謂不與者不得故取若強取者皆名偷盜所謂偷心不除塵不可出縱有多智禪定現前如不斷偷必落邪道故應戒也若佛子下至一針一草不得故盜一節此名攝律儀戒而菩薩下至生福生樂一節名攝善法戒以上斷惡修善即饒益有情戒也言自盜者謂親手竊取人之財物名為自盜令他行竊名教人盜假設方便善巧而取使彼自然而與名方便盜念誦邪呪以幻術力令彼財物自然而來是名呪盜盜因者謂無始熏習賊貪種子為因或暫起盜念也盜緣者謂金銀等寶現前助成盜心為緣盜法者即設巧計盜人財物為法盜業者謂因緣法三事俱備任運成盜以致當來為畜為奴世世償還苦報不但人民財物不得行盜乃至鬼神之物亦是有主如祠廟中供具等物亦不得盜也劫賊物者謂劫盜所得之物也一切財物下以輕例重明決不得盜也謂毋論貴賤輕重一切財物而不得強取即若至微至賤一針一草皆不得不與而取若取即犯盜戒故曰不得故盜而菩薩下勸其當行也而為菩薩者應觀一切衆生皆有佛性亦如父母是故當生孝順心供養如佛如父如母若盜彼物即名盜佛物也應生慈悲心者即菩薩本行心此心能與其樂能拔其苦當觀衆生如子如女不以忍心令其饑凍故云應生佛性慈悲心也常助一切等者承上既是恆具孝順慈悲之心是故應當常助一切人生彼身中之福生彼心中之樂可也而反更盜人財物者有是理乎是故結成不應之過是菩薩波羅夷罪第三淫戒若佛子自淫教人淫乃至一切女人不得故淫淫因淫緣淫法淫業乃至畜生女諸天鬼神女及非道行淫而菩薩應生孝順心救度一切衆生淨法與人而反更起一切人淫不擇畜生乃至母女姊妹六親行淫無慈悲心者是菩薩波羅夷罪此釋第三淫戒相也淫者謂與男女身心流逸污淨行故此即三界四生六道衆生輪回生死根本法也淫根不斷永無得出生死輪回所謂淫心不除塵不可出縱有多智禪定現前如不斷淫必落魔道故當戒也自淫者謂自身與男女作纏縛故教人淫者亦即使彼不解脫故乃至一切女人不得故淫者淫類甚多指一例餘示所戒也淫因等者謂成淫事單根不就獨境不成必具因緣法三故成淫也言淫因者無始貪淫習氣為因淫緣者男女合會助成為緣淫法者撫摩憐愛情術為法以是因緣法三和合任運成淫為業而感六道輪回不得解脫苦果等報也乃至畜下以異例常謂不但人女不得生染乃至畜生之女諸天鬼神之女亦皆不得淫也非道行淫者謂於妻妾正淫中犯其非道之處或非其時也於出家者一切全斷在家之人惟制外淫及與非道非時淫也已上所戒斷一切惡向下所勸修一切善其中斷修即恩及衆生也而菩薩應生孝順心者牒定為菩薩者不同無智慧人應當觀察一切男子即是我父一切女人即是我母不敢犯之故云應生孝順心也救度一切衆生淨法與人者此是人己兩利謂以一己清淨之法而并與所不犯之人令斷愛欲根本救度一切衆生脫離三界纏縛方是菩薩慈悲教導淨法與人若不能生如是教益之心已非菩薩而反更起一切人淫不擇畜生乃至母女姊妹六親行淫而使一切衆生入愛見坑無慈悲心者是菩薩波羅夷罪第四妄語戒若佛子自妄語教人妄語方便妄語妄語因妄語緣妄語法妄語業乃至不見言見見言不見身心妄語而菩薩常生正語亦生一切衆生正語正見而反更起一切衆生邪語邪見邪業者是菩薩波羅夷罪此釋第四妄語戒也言妄語者即虗誑不實也乃即未得言得未證言證自非聖人而言我是聖人非實得上人法而言我得上人法欺誑愚夫亦是自欺若究其情是乃希求名聞貪圖利養此罪不善故戒之也自妄語者即自己說我是聖人我已悟了道我是第幾祖故云自妄語教人妄語者或命弟子或使朋友互相傳言亦如我說故云教人妄語方便妄語者以巧語言合彼機宜自然而信故云方便妄語妄語因者謂無始誑貪種子虗妄習氣為因妄語緣者謂有可欺之人現前助成為緣妄語法者欲惑人心取信必有架言之法則也妄語業者以因緣法三事和合任運成妄為業以致將來拔舌犁耕等苦果報也所謂大妄語成墮無間獄者此也乃至不見言下以輕明重言妄語者不但重者不得故犯乃至最輕者如不見言見見言不見皆不得也不見言見者謂本不曾見他作惡以順人意而言見故見言不見者謂實見他人行善以嫉妒心而言未見其善也身心妄語者謂上不見言見等已出於口口本屬身口不自言因心而發故云身心妄語已上所戒即攝律儀戒向下勸其當修即攝善法戒既言出真實即攝衆生戒也而菩薩常生下正明饒益衆生語也謂菩薩者凡所出言常生正語亦生一切衆生正語正見可也言正語者即語不偏邪故正見即見不顛倒故謂語正者而見自正繇是自己說誠實語方能取信於人是故亦使一切衆生而得正語正見皈依佛教為正人也若為菩薩自無正語正見已非菩薩智行況反更起一切衆生邪語邪見造邪業者其罪何辭是故菩薩得波羅夷罪惟除救人急難方便權巧凡有益者不但無過更有功德第五酤酒戒若佛子自酤酒教人酤酒酤酒因酤酒緣酤酒法酤酤業一切酒不得酤是酒起罪因緣而菩薩應生一切衆生明達之慧而反更生一切衆生顛倒之心者是菩薩波羅夷罪此釋第五酤酒戒也言酤酒者謂釀酒賣人也以酒與人所害者廣能使飲者多起非心敗國亡家喪身失命種種過惡無所不至皆因飲酒故戒之也自酤酒者謂自貪利而貨賣也教人酷酒者其義有二一謂教人造作貿易之語二謂以本與他瓜分其利酤酒因者無始貪利之心為因酤酒緣者米麥工人等具助成為緣酤酒法者謂醞釀糱等為法酤酒業者以上三事和合營運成酤為業致受當來癡熱無知果報等苦也一切酒不得酤者謂不但米麥等酒不可造乃至甘蔗葡蔔楊梅棗子等物一切俱不可造所以然者以一切酒皆起一切罪業因緣故也四分律云酒有三十六失始於不孝父母不敬三寶終於落水凍死熱亡又智度論云酒有三十五失始於現生虗乏終於來世愚癡真乃世間狂藥烈於砒鴆古有優婆塞以一飲酒諸戒俱破故云起罪因緣已上所戒斷一切惡下明佛子所行之正行即修一切善其中斷惡修善即饒益衆生戒也而為菩薩行者應生一切衆生明達之慧可也明達即智慧照了義菩薩應依般若以大智慧光明自覺覺他曲盡方便開化衆生必致發生各各本有大智慧明於諸事理了然通達如或不能猶失菩薩方便之行況反以酒酤賣與人發生一切衆生顛倒之心耶故結過云是菩薩波羅夷罪第六說四衆過戒若佛子口自說出家在家菩薩比丘比丘尼罪過教人說罪過罪過因罪過緣罪過法罪過業而菩薩聞外道惡人及二乘惡人說佛法中非法非律常生慈心教化是惡人輩令生大乘善信而菩薩反更自說佛法中罪過者是菩薩波羅夷罪此釋第六說四衆過戒也說者謂快心談說總有二種一者正理立量二者非理論量此是非理論量也說四衆過者謂妄議出家二衆在家二衆過失既為菩薩於同行友無過不可謗訕設彼有過當以慈悲善言勸諭令彼知過必改懺悔為門胡得向外人說自辱法門使聖道不行此罪非細故戒之也口自說者謂謗出自口也出家在家四衆乃是發大乘心稟受大乘戒者故云菩薩比丘比丘尼者別開出家二衆乃是內祕外現受聲聞戒人也教人說罪過者其義有二一者己有私忿令人宣說彼過以快自心二者他人之忿即令彼所忿者說之乃就中取事也言罪過者罪謂重垢輕垢等罪過謂七逆十惡等過以過定罪故云罪過如是緇白四衆俱是住持三寶弘通佛法之人為佛子者不得口自宣說彼之罪過亦不得教他人說彼罪過應善護口其福無量罪過因者無始以來惡口習氣為因罪過緣者謂彼少有形迹可以藉口為緣罪過法者粧點罪過巧說方便欲人取信為法罪過業者三事和合巧運成說為業致使當來受截舌地獄苦果等報也已上所戒即斷一切惡而菩薩下即修一切善斷惡修善即攝衆生戒也聞外道惡人者謂外道顛倒惡見斷佛慧命使諸衆生墮坑落塹故名惡人二乘亦名惡人者以不能續佛慧命故亦名惡人也說佛法中非法非律者謂外道小乘不達大乘逆行順行境界見其所為說言非法非律為菩薩者聞此惡說應當生慈愍心教化是惡人輩使外道改惡從善反邪歸正令二乘捨小知見發起大乘善信可也如或不能如是開化尚缺慈悲豈有反更自說佛法中罪過者耶故結過云是菩薩波羅夷罪第七自讚毀他戒若佛子口自讚毀他亦教人自讚毀他毀他因毀他緣毀他法毀他業而菩薩應代一切衆生受加毀辱惡事自向己好事與他人若自揚己德隱他人好事令他人受毀者是菩薩波羅夷罪此釋第七自讚毀他戒也口自讚毀他者謂讚自己能行六度欲人恭敬供養而常毀訾他人令彼道法不能流通致使喪名失利此非佛子所為故戒之也口自讚毀他者謂自口讚自己之長而毀他人之短亦教人自讚毀他者謂教他人亦讚我有德而毀他無德也毀他因者謂無始來貪嫉習氣常懷自讚毀他之心為因毀他緣者謂欲毀人境現前為緣毀他法者謂毀人善德令取信于人為法毀他業者以此三事和合作運成毀為業以致當來受苦果報也已上所戒即斷一切惡而菩薩應代下勸其當行即修一切善也既為菩薩倘見他人有過尚應自代一切衆生受加毀辱以惡事自向己好事與他人以如是心行如是行如來方名此人為真實菩薩若自揚己有德隱覆他人好事而反令他人受毀辱者此非佛子心行故結過云是菩薩波羅夷罪第八慳惜加毀戒若佛子自慳教人慳慳因慳緣慳法慳業而菩薩見一切貧窮人來乞者隨前人所須一切給與而菩薩以惡心瞋心乃至不施一錢一針一草有求法者不為說一句一偈一微塵許法而反更罵辱者是菩薩波羅夷罪此釋第八慳惜加毀戒也謂慳吝財法見求不與反加打罵也慳惜屬貪分加毀屬瞋分貪瞋二法繇無智慧即癡分攝性貪墮餓鬼加毀墮地獄愚癡墮畜生三毒不善故戒之也自慳謂即自己吝惜財法不惠人也教他慳者使他吝惜以遮自己慳貪心也慳因者以無始來常懷吝惜之心為因慳緣者見求財法之人不相契合遮護為緣慳法者以巧設種種遮護不施為法三事和合作意成慳為業致受當來餓鬼果報等苦也已上所戒即斷一切惡而菩薩下勸其所行即修一切善也言為菩薩者若見一切貧窮之人無論遠近親怨來乞求者應當平等隨其前人一切所須悉給與之勿吝惜也貧窮人者有二種人一身貧窮謂乞衣即與之衣乞食即與之食如乞安身之所即施安身所也二心貧窮謂乞法即與法如大乘根即以大乘法施如小乘根即以小乘法施隨其所須一切不吝如是之施是名菩薩慈悲道行而為菩薩若以惡心故自私自利以瞋心故厭人乞求不但不肯多施乃至一錢一針一草總不施與又或有求法者不為說一句一偈一微塵許法如是之心尚失菩薩慈悲之道墮慳吝罪何況反更加罵辱乎是菩薩波羅夷罪律云見乞不施有二不犯一者如乞財作惡乃害人害生命不施不犯二者如乞法已還歸外道助外道法不說不犯即加訶責亦俱不犯第九瞋心不受悔戒若佛子自瞋教人瞋瞋因瞋緣瞋法瞋業而菩薩應生一切衆生中善根無諍之事常生慈悲心孝順心而反更於一切衆生中乃至於非衆生中以惡口罵辱加以手打及以刀杖意猶不息前人求悔善言懺謝猶瞋不解者是菩薩波羅夷罪此釋第九瞋心不受悔戒也瞋者謂含毒在心發於面目身心不寧之相前人偶爾相觸轉向求悔而不受其懺謝即上違佛教下乖接引中失本心以是根本煩惱有六後第六之惡見乃斷衆生慧命比慢疑二尤重前三中之瞋心即捨衆生悲仰比貪癡二尤重所謂一念瞋心起八萬障門開障菩提心障菩提願乃至一切障礙無過於瞋故戒之也若佛子下明瞋事也言自瞋者自己之恨發為瞋怒教人瞋者有三義一者借他瞋彼以雪己恨二者教他瞋彼於中取利三者是他人之所恨使其兩相瞋害於中取樂令二家不得解脫故也瞋因者謂無始來含恨習氣為因瞋緣者所瞋人境現前為緣瞋法者謂即心起計較令彼受辱為法瞋業者以此三事和合造作成瞋為業致受當來三塗果報等苦也經云不斷瞋心縱有福德多智禪定感修羅報如無福德智定之人即感虎狼蛇蝎等報以上所戒即斷一切惡而菩薩下即修一切善也而修菩薩行者應生一切衆生心地之中平等善根無所諍鬬之事常生一種慈悲之心視諸衆生如子女等應撫育之以是不忍瞋也又當常生一種孝順之心亦觀衆生如父母等應奉事之以故不敢瞋也若具如是心者是真佛子平等觀門如或不能已非佛子平等方便何況反更於一切衆生中乃至於非衆生中以惡口罵辱加以手打及以刀杖意猶不息者耶非衆生者即佛乃至賢聖或及變化人也以惡口罵辱者即口業不善也加以手打即身業不善也意猶不息即意業不善也以是三業齊犯罪為自作或所瞋之前人來求悔過又以善言懺謝下氣解瞋猶然揚眉怒目瞋恨不解即非菩薩心行故當結過是菩薩波羅夷罪如不犯者類無厭足王等具此三毒乃真菩薩行也第十謗三寶戒若佛子自謗三寶教人謗三寶謗因謗緣謗法謗業而菩薩見外道及以惡人一言謗佛音聲如三百鉾刺心況口自謗不生信心孝順心而反更助惡人邪見人謗者是菩薩波羅夷罪此釋第十謗三寶戒也謗者謂於理不明無有實見妄加非議也三寶乃是一切衆生良祐福田謗則自失菩薩善芽亦失彼衆生善芽其過非小故戒之也自謗三寶者謂自己未具正見未解深法或見外道典籍或聞外道人言或順有勢位人意即自口語亦隨而非議也教人謗者謂使他人謗訕欲同黨也謗因者謂無始來好邪論議習氣為因謗緣者遇有空隙湊合其語為緣謗法者謂以巧詞僞辨俾愚癡邪見取信為法謗業者即此三事和合造作成謗為業致使當來三惡道中不見三寶不聞三寶受惡苦果也已上所戒即斷一切惡而菩薩下勸其所行即修一切善也而為菩薩道者若見外道及以惡人以一惡言謗佛音聲一入其耳即如三百鉾鎗攢刺心中其痛難忍等無有異所以者何以斷一切衆生佛種故一言如此何況多言耳聞如此何況自口而出謗言佛為天人大師開我迷雲導出三界當生信敬而不生信敬心佛為大慈悲父能拔我苦而與我樂正當孝順而不生孝順心如此已非佛子而反更助惡人邪見之人謗毀三寶以滋快議此如獅子身中蟲自食獅子肉者是菩薩波羅夷罪二總結十重善學諸仁者是菩薩十波羅提木叉應當學於中不應一一犯如微塵許何況具足犯十戒若有犯者不得現身發菩提心亦失國王位轉輪王位亦失比丘比丘尼位亦失十發趣十長養十金剛十地佛性常住妙果一切皆失墮三惡道中二劫三劫不聞父母三寶名字以是不應一一犯汝等一切諸菩薩今學當學已學如是十戒應當學敬心奉持八萬威儀品當廣明此段總結十戒得失之相奉勸堅持此戒法也善學下舉人讚德也是菩薩下舉法以明戒法當持不應毀也若有犯下明毀戒之過失汝等下勸生生學持不可忘也八萬下引廣以明略言善學諸仁者是佛讚美詞也謂於此戒善能受持其人具足慈悲孝順之德故稱善學仁者既稱仁者於此十波羅提木叉清淨戒品應當勤學而於其中自不應一一犯如微塵許以微塵許尚不得犯何況具足犯十戒乎此決言不可犯也若有犯下假設斷定犯戒得失之相謂於十重戒中微塵不犯是能發菩提心可保固國王位轉輪聖王寶位比丘比丘尼位亦可保許進入三十心十地因位可許希冀佛性常住妙覺果位如或不然設若少有違犯是即不得現身發菩提心所以者何菩提心者即是清淨光明金剛寶戒妙覺心也今既背覺合塵染污梵行即失此心故云不得現身發菩提心此心乃是福慧二種根本今根本已失即佛花果從何而生故國王位轉輪王位亦失比丘比丘尼位亦失以國王位金輪王位是為世間最勝福位比丘僧位比丘尼位為出世間賢聖慧位今既世出世間福慧之位已失則十發趣十長養十金剛十地因位亦失也因位既失而於妙覺果位豈可得乎是以佛性常住妙覺果位亦皆失也戒如大地萬善從生今無其地則佛聖種無可安處佛種未植佛芽何生故云一切皆失問既福慧因果一切寶位皆失未審此人復居何地答墮三惡道中極苦處也言二劫三劫者示極苦處長遠時分也不聞父母三寶名字者此示地獄三途罪障深重不似人間受生福報與得受佛法處是故父母三寶名字皆不聞也以是當知不應一一犯此戒也向下結勸當持不當毀義若毀戒者失大利益得大苦趣以知十重戒中不應犯如微塵許法是故汝等一切三世菩薩於是十戒應當敬心奉持乃至終身不可忘也此處略說若廣明者具大部八萬威儀品中已上十重戒中隨犯一戒即依本罪治之若犯七逆極重罪者報屬無間若犯餘輕罪者攝後四十八戒如是罪品但在人人念頭起處入重入輕故耳噫毫𨤲繫念三塗業因可不慎歟二說輕戒相二初結前起後二別釋文義初結前起後佛告諸菩薩言已說十波羅提木義竟四十八輕今當說此乃吾佛世尊召告現前在會三賢十聖等諸菩薩言也已說下結前十重已說竟也四十八輕起後輕戒今當說也二別釋文義四十八第一不敬師友戒若佛子欲受國王位時受轉輪王位時百官受位時應先受菩薩戒一切鬼神救護王身百官之身諸佛歡喜既得戒已生孝順心恭敬心見上座和尚阿闍黎大德同學同見同行者應起承迎禮拜問訊而菩薩反生憍心慢心癡心瞋心不起承迎禮拜一一不如法供養以自賣身國城男女七寶百物而供給之若不爾者犯輕垢罪此釋第一不敬師友戒也師以開導友以切磋世出世間法器全賴師友所當敬重倘存憍慢一生福慧消滅故戒之也若佛子下舉人以明其位應先受下乃明福慧二位基本既得戒下明受戒者染法獲益當酬恩也而菩薩下明背恩忘本者以結罪也國王乃各之仁君輪王有四金銀銅鐵四轉輪王統攝四三二一天下主也百官是文武大臣也如是聖君賢臣欲受王位官位之時必應先受菩薩戒何也謂受菩薩戒人必以慈悲利濟孝順為懷如為君者受菩薩戒即為仁德聖君為臣者受菩薩戒即為忠良賢臣感一切鬼神救護王身永保其位救護百官之身高進其爵不但鬼神救護而已亦感十方諸佛歡喜護念何者護法金湯全賴之也金光明云若國王受菩薩戒廣行十善法教化衆生者身心快樂永無三災遠離八難國界安寧人民樂唱云云所以先受菩薩慧戒後受王臣福位獲鬼神救護諸佛歡喜如此利益若非師友教誡何繇能得是故應當知恩報德生孝順心敬重戒師如敬父母不敢少違生恭敬心而敬善友如敬兄長不敢有慢若具如是心者方名念戒入道人也見上座下正明孝順恭敬之義上座以對中下而言謂已上無人故毗婆沙論云上座有三一者生年上座即尊長耆舊是二者世俗上座乃即知法大財大位大族大力大眷屬是三者法性上座即阿羅漢果位是也和尚唐言力生即受戒本師也阿闍黎者唐言軌範師也即羯摩教授依止尊證諸師是也言大德者謂此諸師居臘長德勝故亦貫下義同學同一師所學出世道故同見同一見又解中道理故同行同一清白梵行門故如是師友若來毋論遠近應起承迎致敬禮拜復應問訊起居此謂孝順恭敬心也為菩薩者應當起孝順心而反起瞋嫉心應當起恭敬心而反起褻越心憍心亢己名位憍倨自尊故名憍心慢心藐視前人慢彼有德故名慢心癡心見賢不親見聖不敬而無智慧故名癡心瞋心恨彼師友嚴訓故名瞋心有此四種之心故見師友來而不迎至而不禮亦不問訊起居也憍心等四屬意業也不起承迎禮拜屬身業也亦不問訊起居屬口業也以是三業不善乃至飲食衣服臥具湯藥等物一一皆不如法供養也以自賣下緊承如法說來言既為佛子應當重法輕身命財求出世道內而己身外而國城親切男女貴重七寶以及衆多百物一切可賣應如此供養也言賣身者如常啼賣心肝而學般若如世尊因地中為半偈捨全身乃至身然千燈此亡身為法樣子略引一二乃為有名位者報恩之盛節也不如是承迎禮拜供養諸師友者是菩薩犯輕垢罪此罪比前十重僅減一等非輕細之謂也第二飲酒戒若佛子故飲酒而酒生過失無量若自身手過酒器與人飲酒者五百世無手何況自飲亦不得教一切人飲及一切衆生飲酒況自飲酒一切酒不得飲若故自飲教人飲者犯輕垢罪此釋第二飲酒戒也言飲酒者非造酒也造酒賣者所害甚廣而飲酒者惟害己身故微分重輕耳律云飲酒之人墮燒煮地獄中五五百世初五百世在鹹糟地獄中二五百世在沸屎地獄中三五百世在曲蛆地獄中四五百世在蠅蚋地獄中五五百世墮在癡熱無知地獄中業報如此故戒之也故飲酒者律中開有重患醫師言瘥以酒引藥權用不犯無故而飲或借病而飲者是為故飲而酒生過失無量者辨明不得飲酒之義意謂酒乃米汁何故不得飲耶以飲酒者迷心亂性無量過失從飲酒故而生是以不得飲也不但自飲酒者得無量過失也且若自身手過酒器與他人飲酒者亦招感五百世中無手足報何況無故自飲自飲尚且不得豈得教人飲耶是故不得教一切人飲酒及教一切衆生飲酒教尚不得何況自飲是故凡一切酒不得飲也言一切酒者酒有多種楊梅棗子甘蔗葡萄等酒但能醉人并有酒氣酒味一切皆不得飲也已上明戒向下結罪若故自飲教人飲者是菩薩犯輕垢罪第三食肉戒若佛子故食肉一切肉不得食夫食肉者斷大慈悲佛性種子一切衆生見而捨去是故一切菩薩不得食一切衆生肉食肉得無量罪若故食者犯輕垢罪此釋第三食肉戒也一切衆生皆有靈覺之性俱有貪生畏死之心皆有恩愛情識之念與我不異所謂血氣之屬必有知凡有知者必同體奈何有一類人邪見覆心為己口腹食彼衆生身肉強言只要明得大事因緣食肉無礙若大事已明則逈脫舌根味塵得言食肉無礙若其未明豈食肉無礙耶豫乃晒之曰如果大事已明食肉無礙則於鎔銅熱鐵亦當無礙能吞鎔銅熱鐵者自可食肉矣如宋濟顛募裝佛金盡以其資食酒食肉向後從口吐金得裝佛相是真無閡志公食鴿一日從口盡吐活鴿齊飛而去是真無礙若此未能則所謂明大事者何獨親於肉而喜近於口疏於鎔銅熱鐵而畏近於身也又豈得復云無礙耶楞嚴經云羊死為人人死為羊汝負我命我還汝債以是互相食噉不已故戒之也言若佛子故食肉者故字對權設而言昔佛在世時年逢饑饉草菜不生佛神力故以五指端化五淨肉實非生血一時權現安有實是衆生身肉者為佛子而故食乎是故一切衆生身肉不得食也夫食肉者斷大慈悲佛性種子斷大慈悲佛性種子者其義有二一者是斷菩薩大慈悲心佛性種子所以者何菩薩發菩提心願為令諸衆生離苦得樂是為成佛等一因行今無慈心食衆生肉是斷自己成佛因種因種既斷無上佛果安可希冀二者是斷衆生佛性種子謂諸衆生從無始來輪回六道雖然改頭換面而彼貪生畏死之性即我所發慈悲佛性今欲食彼身肉令生恐怖見而捨去失彼受化緣因是斷大慈悲佛性種子也行願品云一切衆生而為樹根諸佛菩薩而為花果以大悲水饒益衆生則能成就諸佛菩薩智慧花果今佛樹根既失則佛花果又從何處生耶一切衆生見而捨去者殺氣相迎毒於戎狄如鷗去海翁機鴿搖羅漢影也是故一切菩薩不得食一切衆生身肉若故食者得無量罪楞伽經云有無量因緣故不應食肉為一切衆生從本以來常為六親故不淨氣分所生長故衆生聞香悉生恐怖如栴陀羅及談婆等狗見驚吠故今修行者發悲不生故臭穢不淨無善名稱故令諸呪術不成就故諸天所棄故令口氣臭故夜多惡夢故乃至空間林中虎狼聞香是故不應食衆生肉若故食者犯輕垢罪第四食五辛戒若佛子不得食五辛大蒜茖葱慈葱蘭葱興渠是五種一切食中不得食若故食者犯輕垢罪此釋第四食五辛戒也五辛者即五葷非五腥也言五辛者一大蒜亦名葫即葫葱是二茖葱即他經云革葱乃薤菜是三慈葱即葱是四蘭葱即小蒜五興渠即蒠蒺所言不得食者以是五種熟食發淫生噉增恚更有五不應食一生過二天遠三鬼近四福消五魔集西域記云家有養辛之人驅令出郭是故不獨單食不可大凡一切食中相雜佐用亦不得食若謂無所殺害而故食五辛者犯輕垢罪第五不教悔罪戒若佛子見一切衆生犯八戒五戒十戒毀禁七逆八難一切犯戒罪應教懺悔而菩薩不教懺悔同住同僧利養而共布薩同一衆住說戒而不舉其罪不教悔過者犯輕垢罪此釋第五不教悔罪戒也教即教誡悔即悔過罪即罪咎謂為菩薩師者凡見人設有過得教令懺不教則得罪所以者何昔迦葉佛世時有一比丘多作三師多度弟子而不教誡其弟子者因不持戒死墮龍中龍法受罪七日一受時對火燒肉盡骨在尋後還復則復燒之不能堪苦龍具五通自思何罪所致觀知因本師不教多作非法遂恨其師欲加毒害後時有五百賈客入海採寶其師在內龍便出水捉船衆人大怖詰問龍故何以捉船龍曰今此船內比丘是我本師因不教誡於我今受苦痛故爾捉之汝等若將比丘下水便放其船衆人見事不止欲捉比丘而比丘便自投水身亡佛言以此驗之凡度弟子不可不教誡也若佛子下舉人以明犯相見一切衆生者總指在家出家大小七衆乃受持戒法之人犯謂干犯也八戒五戒即優婆塞優婆夷二衆之戒相也八戒但受一日一夜不同五戒終身守持十戒有二一沙彌沙彌尼十戒二菩薩十重戒毀者破壞也禁者止滅也如來所制比丘二百五十戒比丘尼三百四十八戒名為禁戒如若受而不持持而不誦違背聖言越其所制故云毀禁七逆者弒父殺母弒和尚弒阿闍黎破羯磨轉法輪僧惡心出佛身血弒阿羅漢是也佛在世時出佛身血佛滅度後賣佛菩薩形像及賣佛經律名為出佛身血弒比丘僧即名弒阿羅漢八難即下冒難遊行之八難也菩薩見此一切犯戒之人當生慈悲心教其懺前愆尤悔後莫作是為自利利人如不教懺悔者已得不教悔罪何況同住一處同僧利養而又同共布薩同一清淨和合僧衆安住其中而說佛戒竟不舉其犯戒罪過使其懺悔如是不教彼悔過者是菩薩師犯輕垢罪第六供給請法戒若佛子見大乘法師大乘同學同見同行來入僧坊舍宅城邑若百里千里來者即起迎來送去禮拜供養日日三時供養日食三兩金百味飲食牀座醫藥供事法師一切所須盡給與之常請法師三時說法日日三時禮拜不生瞋心患惱之心為法滅身請法不懈若不爾者犯輕垢罪此釋第六不供給請法戒也修菩薩行者凡見大乘法師應備香花諸供養具如供諸佛等無有異請轉法輪使其道法流通慧命不絶若不供給請說法者是菩薩人則墮慳貪我慢焦芽敗種等流有失大利故戒之也若佛子下標明可供之師友也言大乘法師者揀非小乘獨善乃是具大信解發大道心趨大道果智悲雙運自利利人之師故名大乘法師大乘同學下此舉友人亦大乘也同學謂同一師稟受大乘心地戒學同見同一見解究竟實相心地戒見同行同一菩薩心地戒法清白梵行若見如是師友行無緣慈來入僧坊舍宅城邑等處無論遠近若乃百里千里來者為主菩薩應起致敬來即迎來去即送去其中禮拜供養之事俱必一一如法周旋勿生懈怠如供養者應當日日三時不乏言三時者即初中後三時也何等供養每日所食用三兩金以作百味飲食供養又不止此更敷牀座而為安止廣備醫藥而為調理將此四事以供法師凡此法師一切所須盡給與之當盡心如禮供養不應吝惜以上修福是滿檀波羅蜜常請等下乃即修慧是般若波羅蜜也常請等者承上所言日日三時恭敬禮拜供養之者非為求人天小果福報而已正為常請法師日日三時演說妙法以續一切衆生慧命故也此表能供請者口業虔誠義也日日三時禮拜者申請法威儀以表身業虔誠義也言不生瞋心者釋請法開示中不瞋師友規矩嚴訓尊高言不生患惱之心者釋供養中不患我供養繁費此之二心總表意業虔誠義也為法滅下總申上義以勸為菩薩者應當如是為法滅身其義有二一果真為法者尚不惜此身命何況資具而不供養二果真為求解脫道當捨不堅固身易金剛不壞身捨不真實世命易法身智慧命如佛因中為求大法身為牀座布髮掩泥半偈然燈種種苦行皆是為法滅身榜樣修菩薩行者亦應如是請法而勿懈怠可也若不爾者少有怠惰此句斷定若不如是供養心者犯輕垢罪第七懈怠不聽法戒若佛子一切處有講法毗尼經律大宅舍中講法處是新學菩薩應持經律卷至法師所聽受咨問若山林樹下僧地房中一切說法處悉至聽受若不至彼聽受者犯輕垢罪此釋第七懈怠不聽法戒也此戒承前所言不但師來我所乃供養聽法但有說法處應當至彼聽受不可懈怠而不聽也懈怠即八大隨之一繇此懈怠即生放逸放逸即失念失念則多散亂散亂即不正知不正知則生愚癡造諸惡業所以始繇懈怠不聽終則無惡不造是故凡有講法之處宜應往彼聽受如不往聽即是慢法以慢法故福慧消滅罪惡增長所謂若非法味滋神終無解脫故戒之也言為佛子必上求下化為本因心廣學多聞為勝方便若非廣學多聞豈堪住持三寶是故凡有一切講法處應往聽受言毗尼經律者正明滅惡生善之法寶也梵語毗尼此云調伏謂調三業治伏六根滅一切惡生一切善也亦云善壽謂此毗尼住世即佛法住世毗尼若滅佛法即滅故也又以經中攝律律中攝經又經詮性相理律止性業遮業二義俱含故云毗尼經律大宅舍中等者別明講法處也佛在世時諸比丘等常受王臣諸大檀越請在家中安居說法是為大宅舍中講法處也是新學下誡應聽也謂凡所有一切講法毗尼經律處凡新學菩薩戒者應手持經律卷至法師所至心聽受如不解義須一一咨詢請問而決疑也若山林等者以遠況近言不但在居士家而常隨聽即若在山林下僧地房中乃至一切說法遠處悉應至彼而聽受也昔者童子南詢百郡衲僧遍歷千山乃至投子三登洞山九上皆為大事不憚劬勞安得不往聽法律開有病年老足力難行或所說者是常所聞或自具大智慧具大辨才或修深禪大定或知彼所說者是外道法此不往聽俱為不犯除此即於四十里內若不至彼聽受法者是新學菩薩犯輕垢罪第八背大向小戒若佛子心背大乘常住經律言非佛說而受持二乘聲聞外道惡見一切禁戒邪見經律者犯輕垢罪此釋第八背大向小戒也上謂凡一切處悉至聽受惟恐心背中道大乘之理而向偏小邪外之道此道乃是斷佛種性障菩提道因緣故戒之也若佛子下明背大義言非佛下明向小義所言心背大乘常住經律等者謂佛所說大乘道法其中所詮不生不滅常住實相心地法身體相之戒乃是諸佛所師菩薩之母故云常住經律於此心懷狐疑反言非佛所說而受持二乘聲聞權小之法反受外道惡見一切禁戒邪見經律故云向小以是背大向小之故犯輕垢罪昔天親菩薩造五百論讚小斥大後遇無著悔悟己過欲自截舌無著菩薩教令以舌還讚大乘天親受教尅心向大弘傳廣演卒成聖果改過不吝是為菩薩第九不看病戒若佛子見一切疾病人常應供養如佛無異八福田中看病福田第一福田若父母師僧弟子病諸根不具百種病苦惱皆供養令差而菩薩以瞋恨心不看乃至僧房中城邑曠野山林道路中見病不救濟者犯輕垢罪此釋第九不看病戒也衆生五蘊身命皆屬四緣六塵妄想假合難免生老病死等患如來三界醫王四生慈父恆以大慈悲心善調衆生身心病惱既為菩薩若見一切疾病之人不興大慈大悲心念緣念苦衆生者即是自失成佛根本故戒之也言見一切疾病人者上自父母師長下至子女徒衆中至兄弟六親外至冤家毋論一切常應供養也問不作救濟而言供養者何答具此供養心念自然看病心田得恆久也言如佛無異者申明供養義謂佛以衆生身為身以衆生病為病故凡見諸病人當視如佛也昔嚴老躬處癘坊吮洗無忌寬公輿歸病者僧俗不分可謂供養如佛又供養如佛者蓋以八福田中看病福田為第一也八福田者一諸佛二聖人三父四母五和尚六阿闍黎七衆僧八病人此八者中惟病為患能救苦患之因自受安樂之果故看病者為第一福田也若父母師僧及弟子病者槩及上下俱以平等心看言諸根不具者即六根殘缺也百種病苦惱者即風寒暑濕四百四病舉略以該廣也如是殘苦皆應慈悲供養令瘥豈有為菩薩者瞋恨不看之理言嗔恨不看者或若父母師長平時督誨或為弟子平時忤慢或病中時煩瑣求等遂有瞋恨在心而不肯看乃至等者此即從疏況親不但父母師長弟子等病而不看也乃至僧地房中城邑曠野山林道路之中一切病人應當盡心救濟何況父母師僧弟子等病而不看乎五百問云如行路時若見病人不往瞻視不作方便付囑所在而捨去者得罪是故若見病人不救濟而去者犯輕垢罪第十畜殺具戒若佛子不得畜一切刀杖弓箭鉾斧鬬戰之具及惡羅網殺生之器一切不得畜而菩薩乃至殺父母尚不加報況殺一切衆生不得畜殺衆生具若故畜者犯輕垢罪此釋第十畜殺具戒也殺具有二種一鬬戰具二取殺諸物具皆是害命傷慈殺心易起故戒之也為佛弟子應行佛行應畜截魔斬愛大智慧刀勇猛杖大勢弓精進箭忍辱甲定力斧及張大法羅網以羅三界衆生拔出愛河如是具者可也又德山護生棒石鞏救死弓者正當畜也而不應畜一切刀杖弓箭鉾斧鬬戰凶殺之具不但此具不得畜也及惡羅網殺生器者以皆凶物易動殺機非佛子所宜有是故一切不得畜也而菩薩下申明不得畜義謂既為菩薩雖或弒我父母尚不得加報此乃極言殺具決不可畜如寧有盜臣意又或不報此仇衆生承其攝受回心向化遂以得度正為菩薩偶現之大權也此見必當殺者尚有不殺之時況無故而殺一切同生同命無仇無罪之衆生乎菩薩若故畜此鬬害衆生具者犯輕垢罪如是十戒應當學敬心奉持如是一句總結前十戒也應當二句總勸修學此戒應當頂戴敬心奉持勿忘失也第十一國使戒佛言佛子不得為利養惡心故通國使命軍陳合會興師相伐殺無量衆生而菩薩尚不得入軍中往來況故作國賊若故作者犯輕垢罪此釋第十一國使戒也上言不應畜殺生具此言不得軍中往來總為初心菩薩防難故耳言國使者謂於兩敵國中作其命使人也言為佛子應作佛使傳佛心印興智慧師帥勇猛將殺煩惱賊當與諸魔共戰如鄧隱峯飛錫解鬬又陳尊者擲鞋解圍若果如此能為衆生却冤敵止鬬諍息兵戈弘聖道正是菩薩應世大慈悲心所行若為利名兩國作使賊害衆生故戒之也佛言佛子不得作者正明圖功受賞非為傳法化導故言惡心者揀非善心解鬬即是主於興兵以殺人故通國等者釋明為利養意通者傳事致彼此也言使命者謂作報戰日期及約結與國也軍陳等者軍約萬二千人為軍師旅成列為陳合者合其戰也會者會其兵也興師相伐等者申明惡心之意興者舉也師者衆也二千五百人為師彼此征討名相伐也殺無量衆生者謂此兩國相爭殺戮多故為菩薩尚不得入軍中往來豈容作國使耶所言不得者正乃以迹況心謂此凶殺事處非佛弟子所宜身親何況故為利養身作國賊殺害衆生是故不得作也若故作者犯輕垢罪問作而不殺何犯答雖非自手殺人人皆繇我興舉而殺故獲罪也第十二販賣戒若佛子故販賣良人奴婢六畜市易棺材板木盛死之具尚不應自作況教人作若故自作教人作者犯輕垢罪此釋第十二販賣戒也販賣非佛子職業也言既為佛子當以慈悲而為生涯孝順乃為德業應觀一切衆生如己父母子女等親豈得無慈悲心販賣人畜使他分離受苦故戒之也若佛子下釋販賣之事也以賤為貴曰販出物得財曰賣良人好人家子女也六畜即牛馬猪羊雞犬也棺材板木盛死具也如販賣者亦是不仁之心其於慈悲心念有大乖損所以不得賣也尚不應等者防轉計也倘云自家不得教人市賣者或亦無妨不知自作乖乎一己教人作損及他人所以若故自作教人作者犯輕垢罪第十三謗毀戒若佛子以惡心故無事謗他良人善人法師師僧國王貴人言犯七逆十重父母兄弟六親中應生孝順心慈悲心而返更加於逆害墮不如意處者犯輕垢罪此釋第十三謗毀戒也無根訕說曰謗壞人名德曰毀其謗毀人罪過獲報不善故戒之也若佛子者標定其人以惡心故明謗根也謂謗雖出於口乃意地使然所以或忌或貪或嗔皆名惡心也無事謗下正見惡心既彼無事即使耳有妄聞以口妄言悉名為謗故名無事良人等者此明不當謗宜當敬重之人也良人即溫良人善人即善柔人法師即依教法自師為人之師也師有三師七師僧者五德六和之僧國王貴人即是有名有位之人如是聖主賢臣好師好友不惟世人之所敬仰亦乃三寶藉以金湯而反無事作是謗言說犯七逆十重且夫師僧國王有父母義良人善人有兄弟義貴人有六親義如在上者應生孝順之心如在下者應生慈悲之心孝順慈悲必當成彼名德且亦自成現生名德及致當來受用無盡彼此一一如意而反逆情害意使彼壞名敗德墮不如意處者是故結過犯輕垢罪第十四放火焚燒戒若佛子以惡心故放大火燒山林曠野四月乃至九月放火若燒他人家屋宅城邑僧房田木及鬼神官物一切有主物不得故燒若故燒者犯輕垢罪此釋第十四放火焚燒戒也放火因緣不一罪同歸於損人害物故戒之也以惡心故等者正明放火念頭或屬忌瞋或逞情見不興仁慈愍物之心故名惡心放大火者以燒山林曠野故名大火以大火故多傷蟲類所以四月乃至九月不得故燒唯言此時不得燒者謂夏秋月間多諸蟲類故不得燒內開九月後或可燒者佛制臘月放火必率衆持呪繞山告報令蟲遠避然後縱火若不告報恐損蟲類故也若燒他人等者以近況遠謂因放火以防惡獸不意延及城邑雖不損命尚不可為何況損命是以屋宅城邑僧房田木鬼神官物凡一切有主物無論物命有損無損皆不得燒若故燒者犯輕垢罪第十五僻教戒若佛子自佛弟子及外道惡人六親一切善知識應一一教受持大乘經律教解義理使發菩提心十發趣心十長養心十金剛心於三十心中一一解其次第法用而菩薩以惡心瞋心橫教二乘聲聞經律外道邪見論等犯輕垢罪此釋第十五僻教戒也僻者偏也謂不以大乘圓頓正法教人失彼大乘根性其過非細故戒之也自佛弟子是三寶內衆也及外道惡人者乃是心遊道外之邪見人此輩能令衆生入斷常坑故名惡人也六親即父母兄弟子女也一切善知識者是相知相識中有大乘根性之好友也如是若內若外一切親友應當一一皆以大乘經律教彼受持不但教之受持而已更令解其義趣甚深道理不但令彼知解而已又使從所教中發菩提心從菩提心中趣十發趣心起行修行入十長養心回向十金剛心於此三十心中一一解其先後次第觀行法用如先修十信心以信決定於理無違次修十住真解信解成就於摩訶衍堪任不退故又次修十種妙行回向中道以信解行三賢位滿萬行周圓即登十地證佛道果故名次第法用如是教誡是名菩薩正教利己利人同歸至道是為菩薩若以惡心嫉妬藐視他人不以大乘道法期許或以瞋心懷恨或以教之未從而生棄捨或以橫教二乘聲聞經律一切外道邪見論等宛轉率意不用條理是以不當教小而教以小不當教邪而教以邪所謂良材匪匠美器惡用遺誤學人斷佛慧命如是橫教實非大乘心行因斬結過犯輕垢罪第十六為利倒說戒若佛子應好心先學大乘威儀經律廣開解義味見後新學菩薩有從百里千里來求大乘經律應如法為說一切苦行若燒身燒臂燒指若不燒身臂指供養諸佛非出家菩薩乃至餓虎狼獅子一切餓鬼悉應捨身肉手足而供養之然後一一次第為說正法使心開意解而菩薩為利養故為名聞故應答不答倒說經律文字無前無後謗三寶說者犯輕垢罪此釋第十六為利倒說戒也為利說法如來不聽何況倒說佛藏經云佛言我則不聽為利說法我聽清淨持戒比丘高座說法是故凡對新學菩薩說法時必先堅其志願然後盡其宗旨此乃前後次第如法盡教之說如或不然則為倒說謗說為利養說得罪非細故戒之也言好心者謂以大乘正教清淨法行自利利人為心故名為好心也先學等者明先自利堪利人也大乘威儀經律揀非小乘毗尼教法乃是大乘菩薩戒藏嚴範身心之法故於此法應先學也先學者行也廣開者解也行解雙備堪為後昆師範此乃好心自利見後新學等者明利他也言我既為先學當知後昆若遠若近百里千里為求大乘經律而來我應如法先為其人說大乘菩薩一切苦行其苦行者或若燒身燒臂燒指供養諸佛即如喜見菩薩然身藥王菩薩然臂乃至世尊然燈求偈悉皆可證若不燒身臂指以供養諸佛者即為墮業著相凡夫身相未空人我宛然非出家菩薩解脫道行且不但燒身等供養諸佛所應力為乃至見餓虎狼獅子一切餓鬼悉應捨此身肉手足而供養之何況供養諸佛又存我身相乎以此勘驗求法者心切與不切必其能依教受乃可傳道然後一一次第為說大乘正法甚深理趣使彼心開而無所拘意解而無所縛如是為說是名正說是名好心次第而說乃不負先學初心而菩薩若為利養故為名聞故或於名利無所得故於彼所求應答不答設或答之當順理說而反倒說經律文字或教以大乘而又不說苦行是為無前又倒說經律文字而令義無所歸是為無後如是說者上違佛慈下失悲仰中覆好心是即與佛共諍與法共諍與僧共諍此即名為謗三寶說者犯輕垢罪第十七恃勢乞求戒若佛子自為飲食錢財利養名譽故親近國王王子大臣百官恃作形勢乞索打拍牽挽橫取錢財一切求利名為惡求多求教化人求都無慈愍心無孝順心者犯輕垢罪此釋第十七恃勢乞求戒也自為等者有二義一者揀非為衆故云自為飲食錢財利養也二者揀非為求護法故云自為名譽也親近等者謂於國王王子大臣百官以為親厚恃作形勢仗彼有力之勢以形無力之人所須財帛亦得容易或若乞索不得則行打拍捶打拍不得則乃牽引挽轉以相橫逼取人錢財如是一切所求俱名不善是為惡法求是為多貪求不但自己不得若教他求亦都無慈愍心都無孝順心也都無慈愍心者謂為菩薩者當一心觀衆生如己兄弟六親眷屬一一使其衣食饒足安隱無畏而反以勢乞求以名利歸己缺少卑微歸人故云都無慈愍心也都無孝順心者應觀衆生如己父母一切師長應奉侍供養之而反以勢乞求使其窮苦怨恨不已故云都無孝順心也者字斷定無慈缺孝犯輕垢罪第十八無解作師戒若佛子應學十二部經誦戒日日六時持菩薩戒解其義理佛性之性而菩薩不解一句一偈及戒律因緣詐言能解者即為自欺誑亦欺誑他人一一不解一切法不知而為他人作師授戒者犯輕垢罪此釋第十八無解作師戒也謂凡能作師者必自有智慧處世無礙方堪為人師範豈有以己昏昏而能使人昭昭者乎如庸醫不識病原不諳方脈妄醫人病亦如盲人引路俱有墮溺之患故戒之也既為佛子上弘下化必須先藉般若學解內具慧心外識機緣如是師者如來方許為後昆模範也習學般若有三一者文字般若即十二部經是二者觀照般若即持菩薩戒是三者實相般若即解佛性之性是也此數句中攝盡如來所說大藏教義以諸聖師判門有四一教二理三行四果此中十二部經即教持菩薩戒即行佛性之性即理所以依實相理而建文字之教由文字教而起觀照行門因觀照行而入實相理果是故若非明了文字般若聖教云何能得觀照行解相應若非大乘行解相應何以得入實相理果是故初學般若菩薩必當先學十二部經而起解慧解慧雖起若無行資徒成狂解如拾他券於己何有是故應當誦戒以固定慧基本而其所誦之戒勿誦小乘必須日日六時持誦菩薩大戒修行菩薩行也言日日六時者恐持戒人少有怠惰即失菩提心也言解其義理佛性之性者謂受戒人雖然持誦大乘戒律若不明戒歸指亦不能究竟無上佛果故當解其義理解其義者即解佛性之性言佛性者即覺性也即是一切衆生本覺自性此性在聖不增處凡不滅在聖不淨居凡不垢明得此性本無垢淨增減即終日看經無經可看終日持戒無戒可持終日參禪究心無心可究如是看經如是持戒如是參禪其人方可為人天師範也而菩薩以下釋明無解不堪為師範也言不解一句一偈者即不知十二部經中之義及戒因緣者是不知持菩薩心地戒中之義既已經義不通戒義不明性理不徹如是則自利未能應生慚愧況乃無知詐言能解豈不即是以己詐己者乎既自欺自誑復欺誑他人可謂冒昧無恥者也一一不解此即結上不解佛性二句一切法不知者結上不知十二部經二句以是不解不知妄為他人作師授戒者犯輕垢罪第十九兩舌戒若佛子以惡心故見持戒比丘手捉香爐行菩薩行而鬪搆兩頭謗欺賢人無惡不造者犯輕垢罪此釋第十九兩舌戒也言兩舌者謂向彼說此向此說彼翻覆兩頭於中起事所以如來因地說誠實言乃感廣長舌相此之兩舌不善必招將來拔舌等報故戒之也以惡心故有二一者嫉忌心故見持戒者或與己異二者障礙心故或見他人稱讚供養故見持戒比丘鬬搆兩頭使彼此不安也持戒比丘揀非名字沙門乃是有德有行賢聖僧寶手捉香爐行菩薩行者正明賢聖僧也香爐乃十八種法器中一其義有二一者以表信根深入法界信為首故二者以表淨行圓五分身皆繇行故言行菩薩行者揀非小乘之行既是行菩薩行即與己行合同而為菩薩者正當成人之美共轉法化可也豈得鬬搆兩頭於中取樂或復取利是乃自家壞法門也鬬者交興惡也搆者引是非也兩頭即兩邊語以此鬬彼以彼鬬此搆使兩家成惡故也言謗欺賢人者正出兩頭語義謂比丘本皆賢聖乃以妒忌之心而起無根之謗反說無惡不造以使彼此不安如是毀謗賢人犯輕垢罪第二十不行放救戒若佛子以慈心故行放生業應作是念一切男子是我父一切女人是我母我生生無不從之受生故六道衆生皆是我父母而殺而食者即殺我父母亦殺我故身一切地水是我先身一切火風是我本體故當行放生業生生受生若見世人殺畜生時應方便救護解其苦難常教化講說菩薩戒救度衆生若父母兄弟死亡之日應請法師講菩薩戒經律福資亡者得見諸佛生人天上若不爾者犯輕垢罪此釋第二十不行放救戒也放者釋放救者護救不行放救則失菩薩慈悲心行故戒之也以慈心故者謂修菩薩萬行以慈心為根本所以恆用此心與衆生樂欲與其樂先拔其苦以離苦故方能受樂是故常行放生而為業也應作是念等者承上所云既行放生為業應當作觀堅其放生念頭作何等念應觀一切男子即是我父一切女人即是我母何以知然以我生生無不從之而受生故既生生從之受生一切男子女人豈不是我多生多劫之父母乎若推而廣之即六道衆生皆是我之父母今若殺而食者非即殺我多劫多生之父母乎言殺我故身者上即從疏至親此即從親至切而切不過己身亦是殺我故身益以見放救之心當急急耳亦乃可見我與衆生同此一身無差別也一切地水是我先身者釋上殺我故身義謂昔投胎之始先以父母赤白二種水土和合凝結為一以是妄識而生妄見觀見父母情愛不已即投其中故云先身一切火風是我本體者火即暖風即息以是識息暖三而為其體若非識息暖三連持赤白而此色身即時敗壞所以云本體也既是先身本體猶是切於父母所以作念常行放生為業不但此生行放生業即生生受生若見世人殺畜生時皆應方便善巧救護解其苦難或假財寶或以好言種種轉彼行殺者意以解受殺者之苦也常教等者上明以財方便救度衆生此明以法方便救度衆生財之方便有限止救現前一生之苦法之方便無窮能救生者死者生生世世永脫輪回多生之苦故也若父母下正明救度死後衆生苦也氣絶魂逝曰死于世無干曰亡謂於父母兄弟死亡日時果為孝子賢弟應請大戒法師講菩薩戒經律以此福資亡者得見諸佛生人天上云何知之以大乘毗尼法有生善滅惡之功除罪獲福之德以此資亡使彼障開慧發得見諸佛罪滅福生脫三惡趣得生天上人間故也如是救護衆生是名菩薩報諸佛恩若不爾者犯輕垢罪如是十戒應當學敬心奉持如滅罪品中廣明一一戒相此總結勸之大略也如是下結法也應當下勸修也如滅下引廣也謂諸佛子如是十戒應當於此一一修學敬心奉持刻刻珍重勿使忘失懈怠始為善戒法門中真子也以上十重二十輕戒乃出家菩薩全遮在家菩薩有開有遮凡為師者當深研之以下二十八輕亦復如是
