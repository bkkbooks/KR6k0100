body:
  text: 姚秦三藏法師鳩摩羅什奉詔譯明廣陵傳戒後學沙門寂光直解菩薩心地品之上直解大意五初釋經題目二釋譯人名三釋經品題四明分科義五正解經文初釋經題目佛説梵網經此一經之題也得此數字標題即知如來出世説法之本懷洞明全經之大旨矣直解經題有總有別總謂佛指説梵天宮中嚴飾身殿之網羅幢以喻心地法門之戒經別釋有五一明能説佛二明所説義三合明佛説四指喻表法五結歸其名一明能説佛者梵語佛陀華言覺者謂覺身心大幻究竟諸法性相故覺有三義一自覺異凡夫二覺他異二乘三覺滿異菩薩云何自覺異凡夫以凡夫墮煩惱網我見為網為因六根攬諸塵背梵行趣五欲縱三毒輪六道等衆目齊彰不能自覺惟如來從凡夫發心本佛性戒悟自性之真空了惑業之虗妄功成妙智逈脫根塵故異凡夫云何覺他異二乘以二乘愚無明網空見為綱則厭生死取涅槃憎三界惡四生惟自寂遠大心等衆目齊彰不能覺他惟如來離色數量證平等智得法性空運無緣慈入魔佛界廣化衆生離苦得樂故異二乘云何覺滿異菩薩以菩薩留識情網愛見為網則起大悲度衆生歷五位修萬行破無明分證理等衆目齊彰覺未能圓惟如來心色俱離根本智顯五住盡二死亡三覺圓萬德備在天為天中天在聖為聖中聖故異菩薩號曰究竟覺了之佛如來具足十號今舉一號則十號齊彰此佛即娑婆世界説法之教主也二明所説義者説者悅也有自他之別謂佛所證法生佛平等時以四辨應機而説暢悅所懷謂之自悅衆生聞者頓明佛性得受佛戒即入佛位心悅所聞謂之他悅故曰説者悅也三合明佛説者通論説法有五種人謂佛菩薩天仙化人皆能説法言佛説者以心地戒法乃覺皇金口親宣非餘者能説故又法報化佛皆能説法此經屬何佛説按義推之乃依法身根本智起後得智現報身為説法王報身化千釋迦千百億釋迦為聽衆舍那復敕千釋迦千百億釋迦於諸世界為説法主人天凡夫等為聽衆其本佛迹佛隨地隨時隨機所説傳無異詞唯一梵網法門五十八戒百千法門皆此梵網之衆目是知三身應機有異其體本同此梵網經乃三身佛同説也千臂經亦同此義四指喻表法者經云時佛觀諸大梵天王網羅幢因為説無量世界猶如網孔一一世界各各不同別異無量佛教門亦復如是梵網喻也喻無量等法也言大梵天王宮中之網羅幢名因陀羅網唐言天赤珠此網有千重而有千光其光各各相攝不相妨礙繇此天王因中修梵行果感梵天寄位因中修衆德果感梵網莊嚴時佛於彼天説法欲標題流布一觀此網光色重重有似法門理事互攝之象故以無量網孔喻無量世界喻無量衆生心喻無量佛教門喻無量菩薩差別階級喻無量諸佛受用境界以此一喻而攝多義故從喻立題也經文言世界法門正攝衆生心若無一切心何用一切法擴而推之無量大小橫豎網孔喻無量寬窄仰覆世界而無量世界繇衆生無量心行所成佛説無量大小乘教門無數賢聖差別階級皆隨衆生心垢輕重方便施設如是四聖六凡皆因緣所生之法了無實體繇衆生不了自性故勞一舍那千釋迦千百億釋迦佛出廣長舌橫説豎説塵説剎説熾然説謂之心藏地藏戒藏無量行願藏因果佛性常住藏與奪橫施皆本衆生心不出梵網一喻也若有宿根大力量人一聞此説即秉金剛光明寶戒耀定慧鋒裂諸見網則當下灼見梵網之珠象不同而光光互射世界各別而不壞一真衆生心異而性本無差業惑紛綸而各無自相聖賢科第等差而總一佛乘我佛教門雖殊而理無二致如是乃至胎卵濕化皆本清淨菩提之心了無妄境而色法心法常無常法一切衆生數量等法與夫空觀假觀中道智理觀行輕重開遮止作持犯無量權巧法門蕩然一空獨露戒光為自持用又何勞釋迦放光擎接玄通問果行因舍那詳答心地經家據旨立題羅什最後譯傳道影道融書布祖祖授受不絶與今直解發演其義哉雖然戒光圓攝至理無言當知世尊向無言説中説説而又説而直解向無解中解解而又解者不無歸宿如佛説二字乃果人所具之才辨梵網二字乃因人所具之莊嚴若能回真向俗始知佛佛説梵網以度人若能回因向果始知人人持梵網以成佛所謂因該果海果徹因源如是即以海墨書文不盡題意但撮其要只欲吾人初從凡夫持心地戒中而寄位梵天此天上鄰四空下接六凡菩薩居此天中上弘下化積劫修因後成佛果三身圓現亦於此天説梵網經也五結歸其名者世尊所説一大藏時教總名曰修多羅亦云修妒路亦云素怛囕華言契經者上契諸佛之理合道而言下契衆生之機逗根而説故曰契經亦云經者線也言理發於文如線貫花亦若梵網珠像有異繇線貫絡以成譬夫三十心十地十重四十八輕戒法有異繇一佛戒貫攝以成亦云經者徑也如人行正路直抵中堂譬夫持光明金剛寶戒徑成佛道亦云涌泉亦云繩墨此皆隨義立名扣其擊節總不出貫攝常法四字貫者貫串諸法之旨趣攝者攝持所化之機宜常者古今不變法者凡聖同軌上四字所詮之義下一字能詮之文能所合目為題故名佛説梵網經二釋譯人名姚秦三藏法師鳩摩羅什奉詔譯姚秦者秦國之主姓姚名興標明代氏揀非苻秦時也三藏等者乃譯師之名德三藏即經律論經詮一心常住不變之理律規三業體淨無為之道論核是非刊定邪正之規法師即佛法所屬也謂此大師學解三藏以法自師以法師人就德彰名故曰三藏法師鳩摩羅者華言童壽師童年而有耆德故云童壽什者謂善識此方文字知識七佛以來譯經師也奉詔者奉秦王之詔命而翻譯此經故譯者易也易梵國之語成華夏之言華梵並舉合目為題故云鳩摩羅什奉詔譯三釋經品題菩薩心地品之上此一經之品題菩薩二字半梵語具云菩提薩埵華言覺有情西域好廣此方喜略惟存菩薩義含提埵乃上弘下化之人也心地二字總有二義一當本經而言心即三十心地即十地二指法而言即是衆生本元心地謂此心地能攝世出世間法故世間法即六凡謂諸天世人修羅地獄餓鬼畜生出世法即四聖謂聲聞緣覺菩薩諸佛凡聖雖殊而此心地原無差別但以迷悟淺深有凡聖次第大小之殊如迷此心地造五逆十惡等因故有地獄如慳貪嫉妒等因故有餓鬼若亂倫理欺罔騙害等因故有畜生如受三皈五戒等因故有人道如瞋心作福剛強卒惡等因故感修羅道精修十善習學禪定故生天道聞四諦聲悟入故名聲聞作還滅觀了緣生空故名緣覺智理觀行自利慈悲喜捨利生故名菩薩歷三祇圓萬行空五住破二死故名如來如是四聖六凡之十法界皆本心地中迷悟差別若能一念不起頓契無生則凡聖迷悟當下銷殞故菩薩悟此心地現自受用而又以此心地教一切衆生現他受用蓋此心地乃一切衆生分上日用尋常六根門頭自受用境界繇無明封蔀不自覺知諸佛所證證此菩薩所修修此衆生所迷亦迷此如來愍念興慈運悲往來三界八千餘返秖為發明一切衆生本有心地唯欲衆生依此心地稟受金剛光明寶戒為本修因故下卷云一切佛本源一切菩薩本源佛性種子一切衆生皆有佛性一切意識色心是情是心皆入佛性戒中當當常有因故當當常住法身所以説衆生受佛戒即入諸佛位佛戒者即衆生心地光明金剛寶戒也世尊初從妙光堂終至首羅宮十處説法次第敷演結歸究竟心藏地藏戒藏無量行願藏因果佛性常住藏總而言之名曰心地法門故命品題曰心地品品者類也衆類相從之義此經大部一百一十二卷六十一品此當第十菩薩心地品此一品之文分為二卷上明菩薩理智觀行修證階級即三十心十地也下明菩薩心地戒法輕重開遮止作持犯即五十八戒也卷有上下之分此卷居上故曰品之上四明分科義凡經皆有序正流通三分序分者序一經之來源彰説法之繇致正宗者明一經之宗旨逗衆生之機宜流通者繼遐芳於萬古俾化導之不絶也序分有通有別通謂諸經通用以諸經之首皆有如是我聞一時佛住某處與某大衆俱一切經初同有此序故名通序別謂當經發起以諸經繇致各有緣起不同故名別序此經心地品既在大部六十一品中當第十品唯屬正宗通序居首品流通居末品故無如是我聞等句若唯約本品首尾文義之中而分序正流通者一序分從爾時釋迦牟尼佛在第四禪地中起至問此光光為何等相止二正宗分從是時釋迦即擎接此世界衆起至下卷四十八輕止三流通分從諸佛子聽十重四十八輕戒起至於卷終此一經大科之義也五正解經文三初明序起分二明正宗分三明流通分初明序起分四初化佛説法二放光現瑞三覩光生疑四玄主集問初化佛説法爾時釋迦牟尼佛在第四禪地中摩醘首羅天王宮與無量大梵天王不可説不可説菩薩衆説蓮華臺藏世界盧舍那佛所説心地法門品此敘説心地法門品之由致也爾時者即無量天人菩薩大衆集會之時釋迦牟尼佛者標能化之主梵語釋迦牟尼義翻能仁寂默釋迦譜淨梵王云我子釋迦以能仁表姓德寂默顯理致又能仁不住涅槃寂默不住生死又名能忍仁者忍也以聞善不即喜聞惡不即怒能含忍於善惡故又於無生寂滅忍可忍證故云忍也又名能儒更有多義文繁不録雖有多義總之隨行隨德以彰名也在第四禪地中者標所住之處以顯法最勝也在者住也謂以如法安住而住所謂應如是住也第者次第謂三界共九地欲界為一地名五趣雜居地色界有四地初禪名離生喜樂地二禪名定生喜樂地三禪名離喜妙樂地四禪名捨念清淨地無色界有四地一空無邊處地二識無邊處地三無所有處地四非非想處地此當色界第四禪捨念清淨地中乃摩醯首羅天王所住之處亦名有頂天又名色究竟天法雲地菩薩多寄住於此處説法摩醯首羅華言大自在又云威靈或云三目此天為三界尊極之至輔行記云色界天王三目八臂騎白牛執白拂有大威力居菩薩住處能知三界雨滴之數統攝大千世界於色界中此天獨尊即統諸大梵天王之主也佛欲顯此心地道戒甚深祕密清淨大法獨尊無上故在此大梵天王宮中內庭而説也與無量等者標聽法之衆顯佛威德也與無量大梵天王者以一四天下有十八梵天百億日月等有百億大梵天王故曰無量大梵天王也不可説不可説菩薩衆者言法會聽衆非是算數所知以表此法惟大根人堪當與説故説蓮華臺藏世界者指受法之處盧舍那佛所説者明授法之人説法有宗傳其本也梵語盧舍那此云淨滿諸惡淨盡衆德悉滿此即圓滿報身佛下卷廣明其義心地法門品者心地品解見上文法者軌持之義門者通達之義謂依法修行直至佛地所謂十方婆伽梵一路涅槃門又圓覺云有大陀羅尼門等故下卷云汝諸佛子轉我所説與一切衆生開心地道次第説我上心地法門品受持讀誦一心而行又千釋迦千百億釋迦受持而去各各放光光中化佛獻華供佛又從定而入復從定而出或次第説或頓圓説蓋謂得此門者若隱若顯若出若沒隨心開合權實自在故云法門也二放光現瑞是時釋迦身放慧光所照從此天王宮乃至蓮華臺藏世界此敘發起之緣也如法華欲説諸佛一乘實相故世尊先從眉間放一道白毫相光光中圓現法界事相生佛始終為發起之緣此經欲説心地希有妙法世尊必現希有瑞應故先身放慧光為開發之緣也此光全身顯露是本有如如智慧果德光明繇戒定力而生然此智光非諸佛獨有一切衆生皆具但以無明執著不能證得故世尊以種種方便放種種光明説種種戒法無非發明人人本有心地戒光若能會得此光非從外來者即獲自己無明窟中戒定慧光與三世諸佛等無差別矣從此天王宮乃至蓮華臺藏世界者示慧光所照之處顯情與無情無非一光所攝盡也三覩光生疑其中一切世界一切衆生各各相視歡喜快樂而未能知此光光何因何緣皆生疑念無量天人亦生疑念此正敘明發問之端也其中一切等者總舉依正二報即指天宮華藏之兩間中凡係佛光所照一切世界所有一切衆生莫不各各相視其光歡喜快樂也類數無量故名一切衆法相生故名衆生此光昔無於此忽覩故各各相視既覩其光必獲饒益故曰歡喜快樂而未能知此光等者寶光雖覩塵相未空肉眼凡夫徒被其照故未能知此光因緣豈惟博地衆生皆生疑念即有身光之無量天人心慧昏蒙於佛身光莫知所出亦生疑念也上敘人天不達佛光因緣之所以竟四玄主集問二初起定放光二衆集發問初起定放光爾時衆中玄通華光主菩薩從大莊嚴華光明三昧起以佛神力放金剛白雲色光光照一切世界爾時者即人天生疑作念之時衆中等者此舉衆明當機也衆有四一當機衆二發起衆三影響衆四結緣衆此菩薩是華藏海會不可説不可説四衆之中當機首領大菩薩衆也佛放此光甚深微妙難解難知非具大智慧者不能曉了惟此菩薩具大行華智慧明妙通達此光之道能為衆中作唱導之主以德彰名故云玄通華光主菩薩從大莊嚴華光三昧起者此明因依果起義大即體大莊嚴即相大華光明即用大乃法報化三身之圓果也又莊嚴表果華光明表因謂因果齊彰主伴重重義莊嚴法身果海有三一六度萬行二一切智慧三第一義諦其中華乃行華即福德莊嚴光明乃智慧即智慧莊嚴三昧乃正定亦名正受即第一義諦莊嚴此三克備故名大莊嚴此菩薩住是定中即從是定而起又大莊嚴三昧即大定之別名如來妙定有百千萬億恆河沙等三昧總之無量三昧皆從此一三昧流出而一切法身大士咸住此三昧法性土中應緣即現故云從大莊嚴華光明三昧起也菩薩請問大法必仗如來神力加被放光召衆方能發起智問是故以佛神力放金剛白雲色光者正顯心地光明金剛寶戒照用之義言此戒光能破性障故曰金剛淨智如幻故曰白雲色又菩薩在因惟素法身故曰白雲色也光照一切世界者顯此光照處周遍圓融而無障礙又顯聖凡依正總是一光所攝蓋釋迦如來身放慧光即舉果以明因今華光主菩薩全身所放白雲色光即因中境界舉因以該果所謂因該果海果徹因源也此菩薩正欲令諸衆生知因識果冀果修因必以本光明金剛寶戒為因地心方證本法身智身功德身之慧果也向下釋迦請問舍那酬答正顯即果即因即因即果因果不二之義二衆集發問是中一切菩薩皆來集會與共同心異口問此光光為何等相此敘問果明因義也是中等者謂因玄主放光光照十方世界是十方世界中一切諸大菩薩以此光明皆來集會不約而同法華云尋光共推之亦此義也與共同心者因光悚動同示一疑而問故異口者人各有身口隨身異故問此光光為何等相者即問釋迦如來全身所放慧光之相此光即果中境界前衆生未發菩薩心秖疑因緣故曰何因何緣此諸菩薩是因中人只問果中之事故曰光為何等相何因何緣即下釋迦請問舍那云一切衆生為何因緣得成菩薩十地道等文之案光為何等相即下請問當成佛果為何等相之案此序分竟二明正宗分二初明心地道二明心地戒初明心地道四初化佛代請二舍那酬答三華光請釋四舍那酬釋初化佛代請二初攝生還本二正請決疑初攝生還本是時釋迦即擎接此世界大衆還至蓮華臺藏世界百萬億紫金剛光明宮中見盧舍那佛坐百萬億蓮華赫赫光明座上此敘攝用歸體生佛無差之義是時者即此人天大衆諸菩薩請問之時釋迦是能化之迹佛即擎接此世界大衆者乃所化之生也在上曰擎在下曰接即擎接此光光所照一切世界中生疑集會有根性之大衆也言還至者謂此釋迦與諸菩薩一切衆生元從華藏世界舍那本迹心地戒中一光流出今復還歸本體故蓮華臺等者即舍那本迹之處蓮華臺藏世界詳在後文億有四億百億千億萬億萬萬億此乃四億中百萬億也紫金剛光明表菩提智境宮中表涅槃理境謂理因智明智繇理發以理冥智以智契理理智圓融法報無礙報化圓融迹本不二故見盧舍那佛者釋迦旋歸本界覿面相覩親見本師法身智身境界回光返照即本來面目自己舍那不從外得坐百萬億蓮華赫赫光明座上者即舍那所坐之座此座以蓮華者蓮之開敷表權實雙彰義在後詳釋赫赫光明者赫赫即光𦦨熾勝之貌光明乃智慧照用之相謂智能破惑表如來於因地中以智慧𦦨燒煩惱薪障惑盡淨智理全彰故感果中報德住此蓮華赫赫光明之座自安安人也俱名百萬億者即千釋迦千百億釋迦光明蓮華圍繞舍那宮座故云百萬億赫赫蓮華光明之座此明三身圓會之相華嚴廣明百萬億相二正請決疑時釋迦及諸大衆一時禮敬盧舍那佛足下已釋迦佛言此世界中地及虗空一切衆生為何因緣得成菩薩十地道當成佛果為何等相如佛性本源品中廣問一切菩薩種子此釋報化假設問答以顯説法之本旨也時釋迦至釋迦佛言數句敘請法之儀則表三業虔誠也禮佛足身業之誠釋迦佛言口業之誠身口并致意業之誠諸佛請法尚具此儀餘請法者自當尊重也此世界中者即娑婆世界中也地及虗空者地即人間虗空即天上一切衆生即釋迦如來擎接人間天上一切世界中覩光生疑根熟衆生也為何因緣得成菩薩十地道者因緣即因行道即佛果意謂一切衆生發菩提心返妄歸真欲修佛道畢竟以何因行方至佛果此第一問即前天人疑何因何緣之意當成佛果為何等相者意謂當成佛果之時畢竟何等境界是第二問即上華光主放光集衆同心異口問此光光為何等相之意請問因緣并何等相向下舍那一一領答詳明此是略問在大部內如佛性本源品中廣問一切菩薩種子佛性即菩提心乃本覺義言此覺體曾未還改在衆生分中名曰佛性在非衆生分中名曰法性今舉在因故名佛性菩薩種子即因地心也此化佛代問文竟二舍那酬答二初總答心地二廣答釋名三結答問義初總答心地四初顯示定相二誡聽思修三陳自因行四舉自果相初顯示定相爾時盧舍那佛即大歡喜現虗空光體性本源成佛常住法身三昧示諸大衆前釋迦身放慧光為發問之端是果中明因次玄主身放白雲色光集衆興疑是因中明果今舍那答釋心地之道不在別處就是我與釋迦菩薩衆生若凡若聖若因若果總是一道光明無二無別故將自己一段受用境界滿盤托出示與諸人面前要令人人直下承當返本還源識得自己本有光明金剛寶戒菩提涅槃真如佛性圓滿具足無欠無餘故將定光示諸大衆也爾時者即釋迦請問時也即大歡喜者謂宣説此心地法門能令一切衆生永離諸苦得究竟樂正是世尊本懷故大歡喜現虗空光體性者光即本體智光言智體即法身法身本無形相本無來往本無遷改猶若虗空無動無搖萬象森羅於中顯現以智性即色故能現於色然以華光任運若隱若顯不離法身故曰虗空光體性也本源成佛常住法身三昧者如木之有本水之有源一切諸佛一切菩薩修因證果無不依此本源智定為因地心成佛常住法身道果以顯三身圓現一光也示諸大衆者即以此本定光示諸衆生使悟入也二誡聽思修是諸佛子諦聽善思修行此舍那如來詔告當機法會大衆誡聽勉進思修意也是諸佛子者佛為慈父紹佛曰子諦聽等者即聞思修三慧諦者審也聽者領也謂諸大衆佛子若不審諦誠信而聽則所聞之法心不相應心法既不相應心慧妙行何繇發起故曼殊大士於楞嚴會上獨選耳根圓通為妙耳門所謂此方真教體清淨在音聞欲取三摩提實以聞中入故先誡聽也善思修行者謂善能體會所聞之法如聽而思如思而修也若不如聽而思聽則無益不如思而修思亦徒勞所謂如人數他寶自無半錢分於法不修行多聞亦如是故復誡思修也必須如是諦聽如是善思如是妙修方契如如實相心地法門光明金剛寶戒三陳自因行我已百阿僧祇劫修行心地以之為因初捨凡夫成等正覺此繇化佛初問一切衆生為何因緣得成菩薩十地道故報身佛述己過去所修所證為答也阿僧祇華言無數梵語劫波此云分別時節又云時分我已百阿僧祇劫即佛已修因證果之時分長遠也修行是心地即下文所明三十心十地也以之為因者正謂欲得道果無有別法即以此本心地法門而為因也前問中雙請為何因緣答中不言緣者乃因中具有緣義故其義有三一本有光明金剛寶戒乃正因心二依教法起觀修行心地法門是緣因心三無明淨盡真如理圓究竟無上菩提歸無所得即了因心初捨凡夫即始覺破滅相無明百阿僧祇劫修行三十心即漸次覺破異相無明修行十地即隨分覺破住相無明成等正覺即究竟覺破生相無明我佛時歷百僧祇方得五住究盡豈今妄誕之人一朝一夕微因微緣小功小行一知半解無明煩惱貪瞋我慢一毫未除而言頓超佛道者也瓔珞經云一切諸佛不經三大阿僧祇劫得成無上正覺無有是處仁王般若亦同此義先悟毗盧性海後行普賢行門旨哉言乎四舉自果相二初總明果相二別明果相初總明果相號為盧舍那住蓮華臺藏世界海此繇第二當成佛果為何等相之問故以己初捨凡夫時修習心地乃至成等正覺以如是等因如是等緣如是等果而成如是等相以答之也言號為者因中自有師佛記莂其名因行未滿只名菩薩覺行既圓成等正覺故號為盧舍那佛也住蓮華臺藏世界海者華藏世界大香水海中有一華臺世界如蓮華形故名蓮華臺藏世界海華嚴經云有二十重華藏世界海皆在無邊妙華大香水海中此世界種乃是毗盧遮那如來往昔於此界中微塵數劫修菩薩行親近微塵數諸佛時所嚴淨今感果住此也而此娑婆世界正當華藏第十三重有十三佛剎微塵數世界圍繞問據華嚴云即是毗盧遮那如來出現之處此經所云盧舍那佛住蓮華臺藏世界海二經何別答毗盧遮那法身也盧舍那報身也法身托報顯報身因法成若非法身無以有報身非報身無以顯法身乃知法報不分三身圓現不即不離非一非異二經不別是故盧舍那佛住蓮華臺藏世界海即毗盧遮那佛住蓮華藏莊嚴世界海也海有十德總而言之淵深廣大包含萬物無德不備無相不現流出一切融攝一切即千釋迦千百億釋迦依報正報無不從此華藏世界盧舍那佛心海中流出此上二節總答因果二問問何等因即最初悟此心地光明金剛寶戒為因問何等緣即依法修行三十心十地為緣問何等果即成等正覺為果問何等相即依正莊嚴二報為果相也三別明果相二初從體起用二攝用歸體初從體起用其臺周遍有千葉一葉一世界為千世界我化為千釋迦據千世界後就一葉世界復有百億須彌山百億日月百億四天下百億南閻浮提百億菩薩釋迦坐百億菩提樹下各説汝所問菩提薩埵心地其餘九百九十九釋迦各各現千百億釋迦亦復如是上總示果相明依正之體此別示果相明依正之用也其臺即大香水海中之一大蓮華華中有一蓮臺臺上有一佛佛即舍那本佛乃正報身佛也臺即舍那所居華臺乃本迹佛身依報國土也其本華臺周遍有千葉圍繞而每一葉為一世界故成千世界此顯本迹依報又現為迹佛依報之世界也我化為千釋迦等者我即舍那自稱揀非權小凡外之我此顯本迹佛身又化迹佛之身現為迹依界中教主此一一界中佛皆舍那化身故曰我化為千釋迦據千世界後就一下顯迹依土又化為迹迹佛身依報國土也言後就一葉等者即千葉中拈最後一葉而例言之此一迹華又現為百億之華每一一華為一一世界故有百億世界每一一世界中有一一須彌山故有百億須彌山梵語須彌此云妙高以衆寶所成出過諸山故每一一須彌山有一一日月繞須彌盧故有百億日月每一一日月一日一夜遊四天下故有百億四天下每一一四天下有一一南閻浮提故有百億南閻浮提梵語閻浮此云勝金以樹流金汁河出金沙故百億菩薩釋迦者此又顯迹佛之身而又現迹迹佛身即千釋迦一一化現百億釋迦為當機故云百億菩薩釋迦坐百億等此總結顯如來婆心示現受生出家成道轉法輪度衆生義一一釋迦皆示現八相成道二始同時皆不離菩提樹而升四王忉利乃至梵天皆説舍那所傳心地法門皆放身光鼓動人天故曰坐百億菩提樹下各説汝所問菩提薩埵心地也其餘九百等者上拈千華中一華示現千佛中一佛示現其餘九百九十九釋迦又作云何其一華一佛既如是示現則餘九百九十九釋迦依正亦皆各各示現乃至請問心地法門亦復如是無二無別二攝用歸體千華上佛是吾化身千百億釋迦是千釋迦化身吾以為本源名為盧舍那佛此舍那知凡小不能通達即體之用而謂實有本迹應迹之分故言千百億釋迦是千釋迦之化身千釋迦是舍那之化身也上其臺等是明從體起用即即體之用此明攝用歸體即即用之體正明體不離用用不離體體用不二故曰吾以為本源名為盧舍那上廣答果相竟二廣答因相二初標牒問詞二釋心地名初標牒問詞爾時蓮華臺藏座上盧舍那佛廣答告千釋迦千百億釋迦所問心地法品爾時者當爾發明本迹遍現攝用歸體之時廣答者對上略答而言上只略答我已百劫修行心地又恐法衆不知是何等心地故標牒問詞下詳答之二釋心地名四初釋十住名二釋十行名三釋十向名四釋十地名初釋十住名諸佛當知堅信忍中十發趣心向果一捨心二戒心三忍心四進心五定心六慧心七願心八護心九喜心十頂心此釋十住心名德位也諸佛當知者謂千釋迦千百億釋迦今為當機故詔告之堅信忍中十發趣心向果者地持經云十住十行名種性住種即種子有發生之義性為性分乃自分不改之義以初住位即中道種成就安住其中無有退失數數增進故名種性住瓔珞經云三賢十地等妙諸菩薩分為六位各具性觀慧堅忍五法每一法隨六位分為六種此十住位於六性中此名習種性習謂習學研習空觀破見思惑故於六觀中此名住觀住即安住謂心會於理名住觀即觀照謂觀察諦審一切諸法緣生性空名觀即修習空觀之理蕩一切法二義合言故名住觀於六慧中此名聞慧達耳曰聞分別曰慧因聞中道之理而生一切無漏智慧能了一切法離二邊相旋轉聞根故堅信忍中者乃有二義堅者於六堅中此名信堅信即信心堅即堅實謂信一切法皆即真諦無毀壞故忍者於六忍中此名信忍信即信心忍即安忍謂信一切法皆悉空寂能於空法忍可忍證以二法合言名堅信忍也中者言此堅信忍中有十種人俱發上弘下化廣大之心趣向佛海無能退轉起信論云分別發趣道相者謂一切諸佛所證之道一切菩薩發心修行趣向義故略説發心有三種一信成就發心二解行發心三證發心此信成就發心者依不定聚衆生有熏習善根力故信業果報起厭離心求菩提道得值諸佛親承供養修經萬劫信心成就或佛菩薩教令發心或以大悲願力或因護法因緣能自發心如是信成發心入正定聚畢竟不退名住如來種中正因相應故名信成就發心又發心有三種一者直心正念真如法故二者深心樂集諸善行故三者悲心欲拔一切苦故如是發心皆得不退故云堅信忍中十發趣心向果何名十心一者捨心捨即施捨無所悔惜之義謂以內法外法一切皆捨通達無為無相入空三昧故二者戒心戒即戒律護善遮惡之義謂以一切善惡諸法無集無受一切性離一道清淨故三者忍心忍即忍可安忍不動之義謂以無相慧忍入一切空空忍一切法如忍相不可得故四者進心進即精進趨向無退之義謂以四威儀中登無生山入空入假亦無二相進分善根故五者定心定即禪定不昏不散之義謂以心念寂然滅一切罪生一切善故六者慧心慧即智慧照了無礙之義謂以不可説觀慧智入中道一諦理無明障破皆為慧用故七者願心願即願樂上求下化之義謂初發求心中間修道行滿願足佛果便成故八者護心護即護持善能隄防之義謂以無相護護使諸外道八倒不嬈正信以護根本法體集散不可護故九者喜心喜即歡喜離苦得樂之義謂見他人得樂常生喜悅靜照樂心緣一切法故十者頂心頂即人頂無過於上尊貴之義謂以最上頂智滅無我輪斷除十使不受六道果住頂三昧正定發行趨道性實不離正信故自此十心圓明空觀成就理性漸顯真諦不立從此解脫趨進行位也瓔珞經云以銅銀金琉璃水晶瑪瑙之六輪對住行向地等妙之六位以輪對者具有二義一運轉二摧輾謂佛菩薩運轉於大法輪則能摧輾衆生之惑業故因斷惑證真各有淺深次第不同故以六輪對六位也問此十住位以何輪對答以銅寶輪對何故以銅蓋似金色不具金用雖無鐵之塵垢而獨有渣滓在若乃煉磨攻治則能成諸器皿濟用於世謂十住諸菩薩惟修空觀斷見思惑如離塵垢四十二品無明之中十住位人斷前滅相一品異相十品若前異相十品未能斷盡如銅之有渣滓惑既分斷德亦分顯故能隨體起用隨類現形化諸衆生如器成濟世故以銅寶輪對十住位二釋十行名諸佛當知從是十發趣心入堅法忍中十長養心向果一慈心二悲心三喜心四捨心五施心六好語心七益心八同心九定心十慧心此釋十行心名德位也此位於六性中此為性種性謂乃雖證本性真空而不沈住空理即能分別諸法開化衆生使令入佛道故於六觀中此為行觀行為修行以修習假觀行立一切法二義合言故名行觀於六慧中此名思慧思謂審思勝思決定思慧即擇法覺慧以思惟中道理發生無漏智慧開化衆生二義合言故云思慧諸佛當知二句結前入堅法忍中等起後前住云堅信忍此行云竪法忍何也即前所修理法理繇信入信繇理起是故前云堅信此云堅法於六堅中此名法堅謂知諸法皆即俗諦無毀壞故於六忍中此名法忍雖知諸法皆空無所有相而能假立諸法以化衆生於假法中忍可忍證以此二法合言故名堅法忍也此位以前十住真理深入玄妙菩提妙行依理而起運四無量之心行四攝法饒益衆生長養聖胎成就聖德向佛果海故云十長養心向菩提果何名十長養心一者慈心愛念衆生化被一切能生正性不繇魔教使得樂果故二者悲心愍念衆生以悲空空無相自滅一切苦與一切衆生平等一樂起大悲故三者喜心慶他得樂空空喜心令諸衆生入正信捨邪見背六道苦故喜四者捨心周給無吝無造無相空法中如虗空自他體性不可得而無生心常修其捨五者施心普惠無惜身施口施意施財施法施教導一切衆生無心行化達理達施一切相現在前行六者好語心所説皆善慈愛語言攝化衆生常行如心發起善根七者利益心勝行化生實智體性廣行智道現行六道不以為患但益人為利八者同心隱同攝化以道性智同空無生法中以無我智同生無二入諸六道身相行業一切事同以入同法三昧九者定心印持無亂以一念靜慧觀空無能擾動了見一切衆生我人種子皆無合散集成起作不可得故十者慧心照徹無礙觀諸邪見結患等縛無決定體性是心入起空空道發無生心自此十心行行無違定慧圓明空假不立以中道智觀增進向位也此位功行於六輪中以銀寶輪對位謂銀體性瑩潔不受塵垢雖經鎔煉性恆不變此十行菩薩惟修假觀以加功用任運分斷中十品異相無明惑業顯發本然清淨之性如銀體瑩潔鎔煉不變故以銀寶輪對十行位也三釋十向名諸佛當知從是十長養心入堅修忍中十金剛心向果一信心二念心三回向心四達心五直心六不退心七大乘心八無相心九慧心十不壞心此釋十回向心名德位也回向心者因前二位所修所證一切智行不墮不退不住空假不立心心回向真如平等法界理中名回向心諸佛當知二句結前入堅修忍中等起後言從是等者繇前十行如苗增長華果敷實將華落果成時更加堅勇其心不被魔外侵損此位於六性中名道種性因修中道通達佛法能起一切衆生菩提道種故於六觀中此名向觀謂向法界真如實際故於六慧中此名修慧謂修中道理發生無漏智慧故前云堅法忍此云堅修忍者具有二義於六堅中名為修堅謂修中觀了知諸法皆即中諦無毀壞故於六忍中此名修忍謂即修習中道知一切法事理和融於中道理忍可忍證二義合言名堅修忍此十向位即解行發心也前十住心繇信滿故而入此十向心繇行滿故而入以是菩薩於第一阿僧祇劫將欲滿故即於真如法中深解現前於是心心實相念念真如行行圓融修金剛三昧定集一切行法門深入理觀轉更增明入佛果海故云從是十長養心入堅修忍中十金剛心向果也何名十回向心一者信心但信自心決定成佛永無疑執故二者念心念念不失一切諸佛正智於大乘六念常覺常施一合相故三者回向心回即不住向即不退於此無上金剛菩提心心入空而無去來幻化受果深深心解脫故四者達心達即通達照徹無礙內外清淨空空如如相不可得故五者直心直即正直直照平等入無生智無明神我空於空三界生者結縛而不受故六者不退心不退入凡夫地不起新長養諸邪見常空生心心入不二為不退一道一照故七者大乘心解解一空以一空智智乘行乘任載任用令諸衆生同入佛海故八者無相心即心無相妄想解脫照般若波羅蜜無二相故九者慧心無量法界無集無受生生生煩惱而不縛光明照性入一切法故十者不壞心八魔不壞入佛威神出沒自在動大千界於虗空平等地心無二無別故於此十心圓滿二空理顯感諸佛加被得摩頂三昧證入虗空平等總持法門即入十地也此十向位於六輪中以金寶輪對位謂金體貴重濟用極大土理火煉其色不變此菩薩惟修中道功行加深教化亦廣雖混衆塵不為衆塵所染雖居五欲不為五欲所燒以斷盡後十品異相無明故以金寶輪對十回向位也此上三賢觀行雖各修一觀乃瓔珞約本分位而言其實三觀圓修即一而三即三而一也四釋十地相諸佛當知從是十金剛心入堅聖忍中十地向果一體性平等地二體性善慧地三體性光明地四體性爾炎地五體性慧照地六體性華光地七體性滿足地八體性佛吼地九體性華嚴地十體性入佛界地諸佛當知一句標牒舍那對千化佛答説十地名德位也從是一句結前入堅聖忍中等起後前三賢修習聖行功德圓足得入正等地總持法門自此稱聖故云從是十金剛心入堅聖忍中十地向果問前三賢位名心十聖名曰地者何答三賢位未證真如非所依處此十聖位乃佛界地為一切所依性一切功德生一切功德故易心名地也此地於六性中性為正覺性謂即正與佛體等無別故於六觀中觀為地觀謂能生萬物因修中道觀理一切佛智功德從此生故於六慧中為無相慧謂正知中道之理惟空無相而能發生一切無漏智慧故言堅聖忍者其義有二於六堅中地上菩薩名為德堅謂修中道觀智破一分無明等障顯發一分真如三德無能毀壞故名德堅於六忍中此名正忍謂正破無明於中道理忍可忍證故名正忍二義合言故名堅聖忍也此即名證發心謂證真如法故唯為開導一切衆生不依文字起信廣明已上總明十地義向下別明十地義何名十地一體性平等地謂此菩薩證入諸佛法身平等大慧真實法門攝受衆生凡所作為其慧平等故二體性善慧地此菩薩善修法身平等大慧清淨明達一切善根故三體性光明地此菩薩證發無邊妙慧光明以三昧解了智能知一切三世諸佛法門入神通光明故四體性爾炎地此菩薩以智慧𦦨燒煩惱薪以入善權方便教化一切衆生能使見佛體性故五體性慧照地此菩薩以十力智照知善惡有無二性起一切功德行轉不可説不可説法門故六體性華光地此菩薩以大智行華一時開敷十神通明智品現身示衆種種變化百千萬劫説不可窮盡故七體性滿足地此菩薩具足十八聖人智品於一切國土中隨諸衆生心行示現作佛成道轉法輪故八體性佛吼地此菩薩入法王位三昧其智如佛而以法藥施諸衆生為大法師破壞四魔法身具足説法無畏如大獅子吼故九體性華嚴地此菩薩得佛華嚴善能守護法身以佛威儀如來三昧自在王定王定出入無時於百億四天下一時成佛現無量身口意説無量法門品而能轉諸魔界入佛界轉佛界入魔界於一念中一時示現如是事故十體性入佛界地此菩薩以獲一切種智得入金剛三昧其大慧空空復空如虗空性具足十功德品復有不可説奇妙法門奇妙三昧門陀羅尼門非下地凡夫心識所知惟佛佛無量身心口意可盡其源故自此十地圓滿等入如來妙覺果海此地菩薩功德於六輪中以琉璃寶輪對位以琉璃寶出須彌山一切衆寶皆不能壞此十地菩薩所證真實不為外魔之所動壞故以琉璃寶輪對十地位此十聖地觀行斷證初地斷上品惑證下品智自二地至七地斷中品惑證中品智從八地至十地等斷下品惑證上品智此即轉前五識相應心品成成所作智轉第六識相應心品成妙觀察智轉第七識相應心品成平等性智轉第八識相應心品成大圓鏡智四智圓明三身圓現所謂大圓無垢同時發普照十方塵剎中以上答釋心地名相竟向下結答以勸修也三結答問意二初舉法陳因二作勸修證初舉法陳因是四十法門品我先為菩薩時修入佛果之根源是四十法門品者總舉心地軌則以勸修也我先為菩薩時者此舉果明因也修入佛果之根源者此舉因明果也若非勝因不得勝果若非勝果焉顯勝因舍那自指根源以為衆生修入榜樣二作勸修證如是一切衆生入發趣長養金剛十地證當成果無為無相大滿常住十力十八不共行法身智身滿足此總答前二問以明修證之義如是二字承上自已成佛根源在斯一切衆生當亦如我往昔行菩薩道修人發趣長養金剛十地四十賢聖之行為因地心得證當成果無為無相大滿常住法身智身滿足相好無為無相即顯法身大滿常住即顯報身十力十八不共行即顯化身法報不分三身圓現是為法身智身滿足以此三身繇因地中修習心地是以得果證身宗鏡録云由轉根本之心得證法身根本心者即第八識謂善惡等法本此出生若迷此識即為生死悟此識者即得涅槃此識轉時一時煩惱斷滅已盡得證法身故二轉依本之心得證報身依本心者即第七識謂依八識而起如迷此識即起一切愚癡悟此識者即起一切智慧是故此識轉時一切愚癡解脫即證得報身故三轉起事之心得證化身起事心者即第六識謂對六塵而起分別以迷此識即起一切貪瞋癡等惱害衆生悟此識者即修一切戒定慧等品饒益衆生是故此識轉時即證得化身故是以如來出世説諸心地法門無非要令一切衆生斷惡修善轉識成智證三身圓十號故也十力者一知是處非處智力二知過現未來業報智力三知諸禪解脫三昧智力四知諸相勝劣根智力五知種種解智力亦名欲力六知種種界智力亦名性力七知一切至處道智力八知宿命無漏智力九知天眼無礙智力十知永斷諸習氣漏盡智力十八不共法者一身無失二口無失三意無失四無不定心五無異想心六無不知捨心七欲無減八念無減九精進無減十智慧無減十一解脫無減十二解脫知見無減十三身業隨智慧行十四口業隨智慧行十五意業隨智慧行十六知過去無礙十七知現在無礙十八知未來無礙此十八行云不共者以是諸佛自覺聖智境界非權小菩薩所共更非凡夫境界可知故云不共三華光請釋二初總標報化二別明當機初總標報化爾時蓮華臺藏世界盧舍那佛赫赫大光明座上千華上佛千百億佛一切世界佛此總標明體用不分報化無二之義言爾時者即本舍那如來舉因明果勸修時也此之華臺舍那赫赫大光明座千華上佛千百億佛俱已解見前文言一切世界佛者是千百億化身釋迦如來展轉化化無量無盡智慧如來居一切世界中説法利生以表從心地戒法中出生無量無盡智慧佛也下卷文云微塵菩薩衆由是成正覺者此也二別明當機是座中有一菩薩名華光王大智明菩薩從座而立白盧舍那佛言世尊佛上略開十發趣十長養十金剛十地名相其一一義中未可解了惟願説之惟願説之妙極金剛寶藏一切智門如來百觀品中已明此一節文總承前義而來自從是時釋迦身放慧光人天生疑玄通光主放光聚衆請問光相釋迦擎衆至舍那所代前二問請決其疑舍那領答從凡至聖即以心地為因當成佛果果中境界一一發明又恐大衆雖聞心地為因不知是何心地故又廣開名相為三十心十地既有如是之名如是之相必有如是之義若不發明義趣將使行者莫知趣向執相迷心執事迷理故華光王菩薩請解其義正謂涅槃心易曉差別智難明也是座中有一菩薩者即上千佛座中之果位菩薩也華光王大智明者前云玄通華光主此云華光王大智明正顯此心地戒法門非具大智慧者不能通問所以斷惑證真必以智慧為首故也從座而立身業之誠白盧舍那佛言口業之誠身口如如心契實相則意業之誠也佛上略開十發趣十長養十金剛十地四十法門名相名相雖多以相求之則名相又為略故云略開名相且略其義尚廣其中一一義趣修斷觀智未曾解了必請詳明故曰惟願説之惟願説之重敘請意以表翹誠之至也言妙極金剛寶藏一切智門者此請正觀乃起方便觀行以期佛果故也妙極即妙覺果海金剛即堅利之智謂若至果海非金剛智不能此智一起諸物不能壞而能壞諸物一切雜染諸惡種子斷盡無餘故云妙極金剛此智具足一切功德故云寶藏能為一切賢聖修斷方便觀智根本故云一切智門如來下引證以明此處文義在大部內如來百觀品中已更詳明矣四舍那酬釋四初釋十住義二釋十行義三釋十向義四釋十地義初釋十住義二初總標牒問二別解其義初總標牒問爾時盧舍那佛言千佛諦聽汝先言云何義者發趣中此牒大智明菩薩請釋其義誡聽許説十住進修地位觀行之義二別解其義十初釋捨心位若佛子一切捨國土城邑田宅金銀明珠男女己身有為諸物一切捨無為無相我人知見假會合成主者造作我見十二因緣無合無散無受者十二入十八界五陰一切一合相無我我所相假成諸法若內一切法外一切法不捨不受菩薩爾時名如假會觀現前故捨心入空三昧初釋捨心之義即檀波羅蜜也別經名發心住謂於諸劫之中行十信心不作邪見廣求智慧而行捨心捨有十種總即唯三財法竭盡捨也問心地法門位有四十初明捨心者何也答欲令趨佛道人一切解脫始望無上菩提無餘涅槃若於身心世界不能盡捨縱能修行居然全體凡夫入道何繇以故首示真為生死志求佛道應當漸漸從外捨去以至內捨內外俱捨捨亦復捨如是之人名為肉身菩薩乃可入道自利因此檀度則能廣攝衆生而諸衆生亦易從化若夫三賢位人惟捨二執粗惑還有微細我法二執亦要盡捨方證佛果是故一切菩薩位中必以捨位居先故初明捨心也若佛子者標能修之人堪當大法代佛化導故稱佛子一切捨者標所修之法理智觀行三輪體空內而根身外而器界一切諸有為相無所顧惜俱能捨之無有追悔故云一切捨也下凡佛子二句倣此國土城邑至一切捨一節正明佛子捨心體用觀照之義言國土等者釋上一切捨事以顯空觀門也謂乞寶位即捨國土城邑不作主宰想如乞安養即捨田宅金銀明珠不作貴重想如乞奴婢即捨男女乃至己身不作情愛想盡其所有悉無一毫貪戀但凡有為諸物一切盡捨何以故以滿檀波羅蜜莊嚴無上菩提故也無為無相至不捨不受一節申明一切捨觀之義國土城邑等外物屬於疏分捨之猶易男女己身屬於親分己捨之甚難且己身視男女尤親云何難捨能捨以此菩薩了達身世一切皆空本來無為無相實無有法悉繇無明不覺展轉現起於是我相人相人我之間情之所知目之所見妄認為實遂爾假借衆緣合會而成主宰稱我稱人千臂經云假會合成立名生者主字念作生字亦可謂即不識緣生如幻執我執人造作我見種種取捨繇是我見造作故受生滅流轉無有休息輪回不絶十二因緣等者正名假會合成立名生者以顯緣生性空之義十二因緣者蓋以無明為因行即為緣行為因識為緣識為因名色為緣名色為因六入為緣六入為因觸為緣觸為因受為緣受為因愛為緣愛為因取為緣取為因有為緣有為因生為緣生為因老死憂悲苦惱為緣所謂因緣和合虗妄有生因緣別離虗妄名滅故法華云無明至老死皆從生緣有既從因緣有亦從因緣滅也無合無散無受者釋上因緣如幻法體本來靈明絶待之義蓋此因緣之法緣會而生法體本來不生以本無生死流轉之法故云無合緣盡而滅法體本來不滅以本無解脫轉流之法故云無散既無生滅合散其中亦無受彼生滅者故云無受者十二入等者上言十二因緣是即總舉三世生滅因果此下別釋現在之法而欲一切衆生在此六根門頭薦取不致向外馳求楞嚴所云輪生死證涅槃皆汝六根故於六根薦取十二入者六根六塵互攝入故亦名十二處謂眼為色入處色為眼入處耳為聲入處聲為耳入處乃至意為法入處法是意入處所謂單根不立獨境不生根境相對自無體性之義十八界者界是分位六根六塵六識分位之疆界也五陰亦名五蘊即色受想行識質礙曰色領納曰受緣慮曰想遷流曰行了別曰識其云陰者以此五種蓋覆吾人本有真性故其云蘊者繇此五種集聚蘊藏而成妄身妄心受無量生死故此五蘊十二入十八界如來於諸經中處處演説為迷心者開心説蘊為迷色者開色説處為俱迷者開蘊説界此之三科五蘊開合之法者無非要令一切衆生知此虗幻猶如空華若能於此空華了知是妄則當下永無生死輪轉矣一切一合相者此明菩薩觀智即妄以明真義謂觀身心世界一切諸有為法當體全空之性本來無為無相不繇假合而成故曰一切一合相也一合二字正説無為無相之處與上假會合成之合字不同既曰無相又曰一合相者總無相中而妙言之無我我所相者此句總結上義所言五蘊十二入十八界等一切有為法既一合相誰有我者推一我相終不可得既無有我誰有我所究一所相終不可得以是故知因緣和合諸法皆是假成也是故所言若內一切法五蘊身心等若外一切法國邑男女等此內外一切法悉皆空故是以雖捨不見有我為能捨之人亦不見有物為我所捨之法二性空故其中自亦不見有受施者以是三輪體空故云不捨不受菩薩爾時等下結承捨觀之益謂如上三輪空捨菩薩當爾之時是名如假會幻化觀照現在前故而令捨心證入真空三昧正定正受之利益也如假會觀現前故者謂此十住菩薩修習空觀蕩一切法無所有相今既於假法上而修捨心似同假觀故名如假會觀現前也此義千臂經中廣明如是捨心如是捨行是名佛子無相捨心體用觀照也二釋戒心位若佛子戒非非戒無受者十善戒無師説法欺盜乃至邪見無集者慈良清直正實正見捨喜等是十戒體性制止八倒一切性離一道清淨此釋戒心之義即尸羅波羅蜜也別經云治地住謂乃常隨空心行諸法門以嚴戒品此戒總有三聚十無盡戒則則三千八萬無量戒也非非戒下至無集者一節正明佛子戒心體用觀照之義千臂經中於此非非戒上有非戒二字言非戒者謂佛子之大戒不同諸小乘人有戒相可持但束其身而於戒性不能究竟明了經云戒性如虗空持者為迷倒惟以菩薩大乘佛戒體如虗空受而無受持而無持乃為非戒而不墮常見故非非戒者謂佛子之大戒又不同諸魔外道分別有無其言有戒即持牛狗等戒望生天上其言無戒即不受戒妄談無戒可持説淫怒癡皆是梵行惡罵捶打無非佛事縱貪瞋癡恣殺盜淫未得言得未證言證疑誤衆生自迷迷人大妄語人師及弟子俱墮惡道以是菩薩大戒無受而受無戒而戒雖則了知性戒體如虗空本無垢染不妨隨順性戒修行是故云非非戒不同斷滅見也言無受者者字牒定佛子於小乘魔外諸所有戒皆不受行故云無受者十善戒者正明佛子大戒謂此菩薩所以不受行諸不善戒者以但自精進奉持三世諸佛所説十無盡藏波羅提木叉清淨妙戒故也言無師説法者千臂經云名無師説法戒此即光明金剛寶戒言十善戒固為諸佛菩薩修行法門乃即一切衆生本體性中各具足者非從師説而有故曰無師説法戒欺盜乃至邪見無集者此明惡戒體空欺謂欺誑盜謂盜竊俱從邪魔外道之戒而言非泛指者乃至二字是超略言謂此惡法之多不能枚舉假此二言以該淫殺貪瞋癡等諸惡法也邪見即不正惡知見具該六十二種言無集者謂小乘善戒尚且無持無受豈況欺等惡法反可集聚於心耶故云無集者也慈良清直至是十戒體性一節申明佛子戒心體用之義所云慈者哀愍一切則無殺生之念良者溫和善熟則無盜竊之事清者體湛澄潔則無染汙之行直者正直無私則無虗誑之語正實者邪妄虗浮盡遣則無沽酒之事正見者絲毫邪僻皆除此一攝三即不説四衆過不自讚毀他不訕謗三寶捨謂能捨而不吝則無慳惜加毀之心喜謂喜而不恚則無瞋心不受悔之意等者統餘法言謂此八者是前十善妙戒之全體性故云是十戒體性制止八倒三句結明佛子戒心體用之益謂此十戒全體本性大用之力即能禁制止絶凡外八種顛倒言八倒者凡夫四倒即無常計常無樂計樂無我計我不淨計淨小乘四倒常計無常樂計無樂我計無我淨計不淨此之八倒總不達如來真常四德故耳言一切性離者菩薩了達自性本源之戒謂不但惡戒體空即善戒亦體空何以故以屬對待故善惡俱性空於何有其於正戒性離邪戒性離有戒性離無戒性離持戒性離毀戒性離得戒性離失戒性離乃至一切依他偏計顛倒等性俱永遠離故云一切性離一道清淨者謂此顛倒之性既已遠離唯證一道無師所説清淨體性光明金剛寶戒獨露顯現以不思議業用饒益衆生如是受持方名佛子戒心體用之觀照也三釋忍心位若佛子忍有無相慧體性一切空空忍一切處忍名無生行忍一切處得名如苦忍無量行一一名忍無受無打無刀杖瞋心皆如如無一一諦一相無無相有無有相非非心相緣無緣相立住動止我人縛解一切法如忍相不可得此釋忍心之義即羼提波羅蜜也別經名修行住謂能修行忍力長養衆善根故忍者謂於逆順諸境安然自如乃即造道之強力也忍有多種此中具六以該一切有無相慧體性至無無相一節正明佛子忍心體用觀照之義有無相慧體性一切空空忍者千臂經云此名無相慧忍有即本有不從外得也無相即如如理慧即如如智謂此菩薩忍心不在事迹之間亦不離事於此不離不即之處本乎無相慧體而起無相大智慧光觀察世出世間一切諸法悉如虗空無有色相無彼無此實無二法惟一體性性淨無物即以無相之能開化無相之所達入一切空空故云有無相慧體性一切空空忍也一切處忍等者千臂經中名曰普願行忍謂一切空空之忍凡一切處無所非忍以一切處所忍之心不見有少法生不見有少法滅以無生滅二俱離故即入無生故云一切處忍名無生行忍也言一切處得名如苦忍者千臂經云名耐怨忍菩薩因契無生行忍更為法界有情修持三種大忍每被他人妒害之處不見有苦可忍菩薩達境惟心心不自心因境有心境不自境因心有境心境一空得名如苦忍所謂不因訕謗起冤親何表無生慈忍力也無量行一一名忍者千臂經中名曰無量行忍此即推廣所忍之行總收上一切處能忍心智與夫所忍心法然雖無量行門種種不同是則皆依無相慧體而起照用是故所云無量行一一名為無相慧忍也無受無打無刀杖瞋心皆如如者千臂經中此名安受苦忍申明空上一切處如苦忍之事迹也謂上難忍易瞋之中分明以受刀杖所打菩薩了達三輪體空即其內心而推覓一受相了不可得則無受打之我相故即其外境而推覓一打相本不可得則無打我之人相故即其所中而推刀杖本寂則無所打刀杖之衆生相即其能中而推心本自如則無忍苦瞋心之壽者相故云無受無打無刀杖瞋心也所言皆如如者此句釋上三無字義以顯三輪空寂四相無從故示總相云皆如如也無一一諦一相等者千臂經中名曰諦察法忍此二句義釋明皆如如意問既曰受打刀杖瞋心根境歷然何故又曰無受打刀杖瞋心皆如如耶答所言皆如如者以無相慧體性忍中本無世出世諦真俗二法故云無一一諦此即不墮常見一相者實相也雖云無二諦相不墮常見惟恐又作斷見理會故揭一相示之不墮斷見十住菩薩作空觀時觀一切法當體皆空無中無假無不空惟空無相故云一相無無相者此句雙申上義問曰既有一相何名無一一諦既云無一一諦何有一相豈尚有一相可得而云無一一諦耶答曰云一相者即謂無相無相而相相即無相實無一相可得故曰無無相也有無有相至緣無緣相一節展轉釋破外道偏計之性以結忍中無相慧體性之義有無有相者乃總遣所忍之法相不可得非非心相者乃總遣能忍之心相不可得緣無緣相者此乃雙遣能所俱相亦不可得此三句義是緊貼上無字説來發明上無相亦無之義有相者下乘也無有相是所忍之法本空而有此無有相又非真空心相者下乘也非心相是能忍之心本空而非此非心相又非真空緣相者下乘也無緣相是忍智中本來能所一空而緣此無緣相又非真空惟菩薩能所心境俱空空亦復空方是無相真空實相法忍也立住動止等者總結顯忍心觀智破依他性令證圓成實性也立謂站立住謂安住動即行動止即臥止我乃對人相而稱人乃對我相而舉縛者不空之凡相解者能空之聖相於上有無有相等一切諸相菩薩二六時中四威儀處一一照破於立住動止其相無寂感之分於我於人其相無彼此之分於縛於解其相無聖凡之分諸相既無何有一切法耶忍法既無只有慧體自照自觀以為忍行又何忍相之有哉故曰一切法如忍相不可得所謂不見一法即如來此則名為觀自在金剛云若有我相人相即非菩薩又千臂經云於一切法悉皆無相了了分明忍性空寂不可得故皆此義也如是行忍是名佛子無相慧忍體性之照用也四釋進心位若佛子若四威儀一切時行伏空假會法性登無生山而見一切有無如有如無天地青黃赤白一切入乃至三寶智性一切信進道空無生無作無慧起空入世諦法亦無二相續空心通達進分善根此釋進心之義即毗黎耶波羅蜜也別經名生貴住謂生在佛家種性清淨故梵語毗黎耶此云精進謂精而不雜進而不退即前施戒忍三法勤䇿不怠乃智行無間之功力也若四威儀至亦無二相一節正明佛子進心體用觀照之義四威儀者即行住坐臥四行精進遍諸行故以行字表其象一切時者即二六之時也行伏空者即是空觀假會法性即是假觀登無生山即是中觀三賢菩薩名伏忍位初住位伏空二行位伏假三向位伏中雖分為三是各依本位得名實互融攝一而三三而一菩薩於此行住坐臥四行法門以有威可畏能折伏衆生有儀可表攝受衆生即於此四儀處一切時中進修菩提降伏其心而入於空無法可得如鏡中相無相可得此即行伏空也言假會法性者承上謂雖常入真空觀照諸法一切體性然而假合而成即假而真離真無假此即行伏假也於假法上當體明真故云假會法性言登無生山者謂此菩薩修無生理最高最顯在塵出塵逈超二邊得無所礙如登山頂高出無礙名登無生山也菩薩既蕩一切法空不見纖法可生復觀一切法假不見毫法可滅以無生滅空假皆真雙伏中道無生故以登山為喻也而見一切有無者申明登無生山之義菩薩於四威儀一切時中思惟真諦之理發生一切無漏智慧了見一切內外四大有無性相諸法性空空無所有故云見一切有無如有如無等者牒定所觀世出世間染淨諸法先觀世間之法以無生心見天地中包羅青黃赤白長短方圓若根若塵有質對待者名一切顯現色若根若塵無質對待者名一切無表色如四禪天定中果色并五根中一分淨色及緣想過未來種種境界現雖對待無可表示雖云無可表示總色像攝一切色相元無實體色法如此心法亦然無有一法不是如來藏心性淨明體故云如有如無一切入也乃至三寶智性等者此觀出世間法也三寶即佛法僧智性即法身般若解脫一切信進道即一切賢聖誠信進修之道空無生無作即三解脫門義謂此菩薩繇觀世出世間真淨體性之理性淨無物故得證入三解脫門也其空解脫門者菩薩觀照一切諸法皆從因緣和合而生其體本空即悟自性真空而不隨因緣生故得解脫也無生解脫門者即無相解脫門也承上既觀諸法一切皆空無相可得既無有相即悟自性常生而不隨因緣滅故得解脫也無作解脫門者即無願解脫門也菩薩既觀諸法空無有相則無願求既無願求即不造作生死之因以無生死因故即無有果故得解脫解脫即自在義門即通達義以三解脫得至涅槃故云三解脫也無慧者承上所觀諸法既不可得能觀智慧豈可得哉故云無慧起空入世諦法者謂向以觀凡聖有無諸法體空即證入空定矣此空不同聲聞緣覺沈空滯寂之空乃觀實際理中纖塵不立今世門頭一法不捨故雖證於空忍而不住著即從伏空定忍而起入世諦法雖然入真入俗亦無二相無二相者謂入真不著真而入俗不著俗故云無二相續空心通達等此二句者結顯無相精進之心體用觀智之益續空心者乃即從假入空從空入假空假圓融通達無礙以是通達實相心故名續空心通達也進分善根者善根即菩提本妙心為衆善根本故即此無相心發起種種精進心心相續念念無間分分增進永無退轉趨向佛位故云進分善根千臂經云佛子於四威儀進修菩提之時即得證入一切三寶智性真淨體性常得現前則得生生值佛見法見僧世世精進學佛威儀於伏空忍之理亦不見四威儀證無生空是以不進而進道也又法句云若起精進心是妄非精進若能心不妄精進無有涯如是精進是名佛子進心體用之觀照也五釋定心位若佛子寂滅無相無相無量行無量心三昧凡夫聖人無不入三昧體性相應一切以定力故我人作者受者一切縛見性是障因緣散風動心不寂而滅空空八倒無緣假靜慧觀一切假會念念寂滅一切三界果罪性皆繇定滅而生一切善此釋定心之義即禪波羅蜜也別經名具足方便住謂修習無量善根力故寂滅無相無相至空空八倒無緣一節正明佛子定心體用觀照之義寂滅者此標定體梵語禪那此云寂滅即指一心而言亦云靜慮即攀緣如禪亦云寂靜謂根境如如不即不離若鏡現相故云寂滅無相無相此二無相釋寂滅義上無相明能定之心下無相明所定之境以是心境二皆無相故云無相無相無量行無量心三昧者明菩薩動靜一如義繇入定時以無能所二相故能契合無量心行總成三昧此即四威儀中常明禪觀所謂那伽常在定無有不定時也凡夫聖人無不入三昧者此言定體平等不惟聖人入此三昧凡夫亦入此定既爾何故説名凡夫以被一切識情垢染故不自覺亦如衣裏明珠不自覺知貧苦他方終無濟益所謂終日圓覺而未嘗圓覺者凡夫也何以故以體性不相應安能得定菩薩不見一法當情境空心寂智理一如故恆與諸佛體性相應繇證體性三昧則一切時中以聖定力故得照見一切微細我人作者受者之妄惑也我即我見人即人見作者自心施為即衆生見受者領納好惡堅著不捨即壽者見繇此四見生一切執縛邪見種性皆是障道因緣被此散亂境風鼓動心海隨波逐浪流轉生死無窮無盡無有休息故云一切縛等言不寂而滅者謂此障惑若不假修寂滅觀照三昧正定之力而能滅者終無暫止之日意謂必以寂滅定力故而得此滅故云不寂而滅千臂經云不得寂靜定力而能滅者無有是處空空八倒無緣者承上謂此定力既止我見生滅之因即小乘凡外八倒生滅之緣自空故云八倒無緣假靜慧觀至而生一切善一節結顯定力照用功能之義假靜止動假慧照昏假此二者為觀定慧圓明靜照一切我人假會幻化合成妄想因緣之法念念從此寂滅矣生滅顛倒之念既空則一切三界異熟苦果諸惡罪性亦皆繇此定力而滅苦果罪性既已滅盡則本不生不滅無漏功德智慧亦悉繇此定力而生故云而生一切善也所謂生滅既滅寂滅現前如是修禪是名佛子定心之體用觀照也六釋慧心位若佛子空慧非無緣知體名心分別一切法假名主者與道通同取果行因入聖捨凡滅罪起福縛解盡是體性功用一切見常樂我淨煩惱慧性不明故以慧為首修不可説觀慧入中道一諦其無明障慧非相非來非緣非罪非八倒無生滅慧光明𦦨為照樂虗方便轉變神通以智體性所為慧用故此釋慧心之義即般若波羅蜜也別經名正心住成就第六般若法門故梵語般若此云智慧以是智能照境慧能了境於境分明無惑能轉物也空慧非無緣至體性功用一節正明佛子慧心體用觀照之義言空慧非無緣者謂此真空體性本源妙慧非是無緣而生又非即緣而生是即本有空慧靈明知體名之為心不假他緣故也以是真知覺體本無分別而言分別一切法者惟是真心照用不同二乘灰心泯智不緣一切生法亦不同諸凡夫外道分別識心繇假因緣會合而成假名主者假立其名實無主宰雖曰是妄皆即依真而起如水之波依水而有菩薩依般若智照於諸妄心了然無二實與至道通同一味體無差別故曰假名主者與道通同也取果行因等者釋明慧心照用之義謂此菩薩直超佛果惟以本源平等空慧修因地行即可入聖捨凡滅罪起福凡夫以我相分別處處不得解脫故縛聖人無我能以般若智照處處皆得自在故解即此凡聖迷悟縛解菩薩視之盡是體性功用所謂從凡夫中來者用其識心從聖性中來者用其智慧識智元無二體惟在用處有差殊耳一切見至所為慧用故一節申明空慧觀照之益問一切見者凡聖縛解何處差別以凡夫二乘一切倒見皆由不知如來常樂我淨無餘涅槃真如德相是心佛與衆生三無差別平等具足乃於真常真樂真我真淨心上而起倒見故也常者無暫改動之義性體虗融歷三際而不遷混萬法而不變故名常德樂者安隱寂滅之義離生死逼迫之苦證涅槃寂滅之樂故名樂德我者自在無礙之義外道凡夫強立主宰執之為我乃是妄我若佛所具八自在為我者即是真我故名我德淨者離垢無染之義諸惑盡除湛然清淨如大圓鏡了無纖翳故名淨德而凡夫人迷而不知反以非常計常常計無常非樂計樂樂計無樂非我計我我計無我不淨計淨淨計無淨是名八倒非常計常者世間一切諸有為法故悉無常虗幻不實執為實有故非樂計樂者世間五欲之樂皆是受苦之因諸凡夫人貪著不捨不求解脫故非我計我者四大假合之身本非有我於此幻色身中強作主宰妄執為我故不淨計淨者自身他身三十六物五種不淨之身本非是淨反生貪著以為是淨故如是四見增長惑業名為凡夫四榮倒見常計無常者法身常住本無遷改而於如來常住法身之中妄計有變異故樂計無樂者涅槃大樂離諸苦故乃於如來涅槃樂中妄計是苦故我計無我者無生真我即是真常不了無我法中佛性真我於真我中妄計無我故淨計不淨者體性真淨離諸垢染不了無惑無障之淨乃於如來真淨法中妄計不淨故如是四見乃二乘人觀察無常苦空無我等法俾煩惱有朽滅不生之義名為四枯倒見此八倒見凡夫之人凡所作為皆是煩惱業力將此慧性障覆不開不得真實識知用故所謂煩惱慧性不明故名為煩惱無明二障煩惱事障障理無明理障障事其煩惱障者謂此昏煩之法惱亂心神因貪等惑障蔽正道故名煩惱障無明障者謂諸衆生從無始來種種顛倒而於一切法上無所明了名無明障此惑是業識之種子為煩惱之根本以二乘人慧性不明不能斷去此障惟菩薩斷之欲破煩惱必以智慧為首欲破無明必修不可説觀慧為助細審細察智慧德相本來無遷無變是如來常德無生無死是如來樂德無罣無礙是如來我德無障無惑是如來淨德如是種種觀慧相續相連無間無斷方乃證入中道第一義諦智起惑亡即無明惑障頓破而本有慧性頓開向之無明煩惱為障者即障慧性故曰無明障慧今者了知無明障慧當體全空何有形相故曰非相既非形相安有去來故曰非來既無去來則非心所緣故曰非緣若有所緣是為心境不空成顛倒想起惑造業則有生滅因緣之罪法今既非緣則亦非罪矣又何八倒生滅之有哉故曰非八倒無生滅此惟菩薩慧光明𦦨為照為樂虗徹靈通無量方便無障無礙無量轉變種種神通種種妙用皆以平等智為體性一切所為所用無非空慧為用故若不依此平等智體本源空慧以為照用則凡所為所作皆是無明業力使然學者知之當修此慧是名佛子慧心體用之觀照也七釋願心位若佛子願願大求一切求以果行因故願心連願心連相續百劫得佛滅罪求求至心無生空一願觀觀入定照無量見縛以求心故解脫無量妙行以求心成菩提無量功德以求為本初發求心中間修道行滿願故佛果便成觀一諦中道非陰非界非沒生見見非解慧是願體性一切行本源此釋願心之義即願波羅蜜也別經名不退住入於無生畢竟空界故願者願要乃即發諸大願成佛度生者也願大求至得佛滅罪一節正明佛子願心體用觀照之義願大求者即上求佛果一切求者即下化衆生也以果行因故者釋上發願成佛度生之疑經云自未得度先度人者菩薩發心自覺已圓能覺他者如來應世今先自利次乃利生何以故欲以果地之覺而行因地心故謂凡世出世間有漏無漏善惡因果必有決定誓願如地藏菩薩地獄未空誓不成佛觀音大士度盡衆生方證菩提彌陀如來四十八願願願結云不得是願終不作佛乃至閻羅天子誓願治諸罪人一一隨願而生所以要度衆生先當發願成佛也願心連者承上以果行因之願心故須當念念不忘心心無間相連相續百劫修行難忍能忍難捨能捨外捨國城妻子內捨頭目髓腦乃至無量世界無有如芥子許非是菩薩捨身命處如是心無能所人法雙忘忘亦復忘始能得見本佛滅無量罪故云得佛滅罪求求至心至佛果便成一節申明願心始終因果究竟之義求求至心者上求字即求佛果下求字即求化衆生至心二字謂求佛果及化衆生之心必須聯續增進乃至大願成就求無所求即以無生空智而契無生空理智理一如一願平等生佛無二故云無生空一願也觀觀入定照者雙明二觀惟顯中道以空觀入假觀故照以假觀入空觀故定如是二觀俱遣空假不立定慧圓融是即照而常定定而常照即此觀觀之照照照之觀是故無量見縛皆以上求下化之大願心平等觀照之定慧力故得解脫即上滅罪之義不惟無量見縛因求心故而得解脫即無量妙行亦以是願求求至心故得成就阿耨菩提即上得佛之義乃至無量恆沙稱性功德亦皆以求心故而為根本即無生空一願之義言初發下勸必行也如是求心非是空發願樂之心而或不行願樂之行故必初發求心中間修道行滿願足是故佛果便得成就初發求心即始覺也中間修道即漸次覺及隨分覺行滿願故即究竟覺三覺果滿萬德周圓方能得成佛果稱兩足尊觀一諦中道至一切行本源一節此結願心中道觀慧為願體性為一切行本也觀一諦中道者承上謂於佛果位中觀中道一諦之理不見立一切願本無佛道可成本無衆生可度本來無縛無解菩提本具功德本圓本如來藏妙真如性所以觀五陰非五陰觀十八界非十八界觀生滅非生滅觀諸見非諸見故云見見非解慧是願體性者乃即華嚴信解行證四法之一菩薩初發願心繇信起解繇解發願繇願起行繇行證果非初解慧無繇能入如是妙慧為一切願心本體一切萬行本源是故發願成佛度生必以無生空一願之中道智解無生空一願之中道理即依此起一切無相妙行而即證佛無相菩提涅槃妙果若他觀他願者即為狂慧即為狂解矣學者知之八釋護心位若佛子護三寶護一切行功德使外道八倒惡邪見不嬈正信滅我縛見縛無生照達二諦觀心現前以護根本無相護護空無作無相以心慧連慧連入無生空道智道皆明光明光護觀入空假分分幻化幻化所起如無如無法體集散不可護觀法亦爾此釋護心之義即力波羅蜜也別經名童真住謂不生邪倒破菩提心故護者護持不使魔外侵壞菩提心故護三寶至於護根本一節正明佛子護心體用觀照之義三寶即佛法僧佛者覺照義法者執持義僧者和合義此有世間住持三寶有出世間常住三寶有大乘小乘一體別相如是三寶皆一切衆生法身慧命父母良友福田若不護持即法身慧命斷滅一切功德無從而生故當大力護持護三寶者無他即護自己所修六度萬行一切所行功德何名功德即於行門無怠無惰有始有終是名為功無人無我無取無捨是名為德故云功德仁王經云以護佛果護十地行若此使外道不嬈者正明護三寶義外道有多種凡不達心地道戒向外馳求俱名外道其八倒者即諸凡夫小乘外道妄想倒執此諸倒見不善不正斷佛種故名惡邪見言正信者翻邪名正除疑曰信正其所信名曰正信所謂護功德者正在使諸外道凡小八倒惡邪知見不能嬈我如是護三寶之正信也云何能令惡見不嬈正信亦無他法但滅我縛見縛而信自正蓋此顛倒邪見繇依我見而生因執我故則被我縛繇我縛故而起諸見則被見縛我見相縛所信不正所信不正則諸魔外得入魔外一入則壞一切功德一切功德破壞致令佛種法種僧種俱被破壞故護三寶實無別法唯護自行功德則滅我縛見縛我見不生即入無生即以無生理智而起觀照照空即不沈空照有即不滯有空而不空不墮斷見有而不有不墮常見是以不滯空有不墮斷常二諦圓融互攝無礙故云無生照達二諦即此觀心倏然現前以護根本其根本者即正信也以是正信一立直超無上佛果而無障礙一切功德從此生長是故正信而為根本以是護持無有窮盡故云觀心現前以護根本所謂心性不迷即是佛寶心體離念即是法寶於理不違即是僧寶也無相護護至皆明光明光一節申明無生觀照工夫之益蓋上以無生智觀照現前以護信根即此能護觀照所護信根一一無相從無相護心中行無相護行故曰無相護護以是無相護護則所護之正信處處解脫以是處處解脫即證無相真空以證無相空故而無所造而無所作以無所造作故名為無相故云空無作無相以心慧連等者承上既云入空無作無相之三解脫理慧不同小乘住著解脫即此真空無作無相之慧心中相續相連無間無斷即得深入無生空道無生智道皆明光明光矣無生空道即是無餘涅槃理果無生智道即是無上菩提智果皆明光明光者智理互照之象繇智契理因理冥智智理如如互發圓照故云明光明光也護觀入空假至觀法亦爾一節乃即結遣觀法以顯無相護心之義言護觀入空假等者承上既以無相護心深入智理即以如理平等大慧光明從護心中而起觀照觀入於空即遣真相觀入於假即遣俗相空之真相既遣則空中之分分許多幻化所滅何有假之俗相既遣則假中之分分幻化所起何有以是生即如生滅即如滅生滅皆如故云如無如無法體集散不可護者菩薩既以無生妙慧觀照諸法幻化起滅如無故知諸法緣會而集法體本自不生緣滅而散法體本自不滅既諸法體本無集散則無實法可護故云法體集散不可護也言觀法亦爾者謂所護法體既不可得豈有能護智觀而可存耶故云觀法亦爾是則境智俱遣了不可得如是觀行如是正信方能護持三寶功德是為佛子護心之體用觀照也九釋喜心位若佛子見他人得樂常生喜悅及一切物假空照寂而不入有為不無寂然大樂無合有受而化有法而見云假法性平等一觀心心行多聞一切佛行功德無相喜智心心生念而靜照樂心緣一切法此釋喜心之義即方便波羅蜜也別經名法王子住謂從佛正教而生於解當紹佛位故喜者即歡悅義乃快自他得樂之謂見他人得樂至大樂無合一節正明佛子喜心體用觀照之義見他人得樂者即喜境也常生喜悅者即喜心也何謂常生菩薩喜悅之心非因暫有亦非暫無從久遠來發菩提心元為令諸衆生離苦得樂今見得樂之人適其所願故心常生喜悅及一切物者明菩薩喜心廣大之義言不惟見人樂而生喜心并見一切有情物類凡得樂者亦常生喜悅也假空照寂等者正明菩薩三觀圓修以顯無相喜心之義假即假觀空即空觀照即是慧寂即定也菩薩喜心不同凡夫情見之喜亦不同二乘空執之喜二乘自喜得出三界苦惱之患得證三解脫門於菩薩法遊戲神通及見衆生有苦樂時不起悲欣菩薩不然如觀入假時照而常寂而不入有為離此有相故不同凡夫情見之喜如觀入空時寂而常照而不入無為離此無相故不同二乘空見之喜既不空不假不有不無是何等境界即寂然大樂無合此等境界非塵勞衆生所受用事亦非二乘滯寂境界惟是菩薩定慧圓融乃能寂然大樂又能樂及衆生其所樂者二邊不住中道不立故曰大樂無合也有受而化至心心生念一節申明喜心寂照之義以其無合於有不妨有受而化受即喜心化者不留之意有定力故不被物轉以其無合於無不妨有法而見法即喜境見者透徹之意有慧力故即能轉物故云有受而化有法而見其云假者謂以種種諸境本無實體當體如如法性平等一觀照之法性即法性身諸佛以法為身既觀諸法之相云假復觀諸法之性本真此法性身不隨生滅等虗空界在聖不增處凡不減各各具足是為平等一觀所謂先悟毗盧法界也心心行等者乃復行普賢行門也謂此菩薩雖然智照諸法體性平等而法身理果尚未究竟更當心心發大願起大行一心一行皆從多聞一切佛行功德而行是即佛行不落小乘功行所謂盡行諸佛無量道法也無相喜智心心生念此二句者承上菩薩思惟諸佛功德本乎無相以無相智契無相理以為喜心如空合空不相妨礙故云無相喜智即此無相喜智起行長養永永無失不敢怠惰故云心心生念而靜照樂心緣一切法者此二句義結前謂此喜心既以無相常生於念是則在在利生不妨常靜常照即以靜照不二之樂心緣一切已得法樂未得法樂之諸衆生令其同證無相喜中寂然大樂無合之道是為佛子喜心體用之觀照也十釋頂心位若佛子是人最上智滅無我輪見疑身一切瞋等如頂觀連觀連如頂法界中因果如如一道最勝上如頂如人頂非非身見六十二見五陰生滅神我主人動轉屈伸無受無行可捉縛者是人爾時入內空值道心心衆生不見緣不見非緣住頂三昧寂滅定發行趣道性實我人常見八倒生緣不二法門不受八難幻化果畢竟不受惟一衆生去來坐立修行滅罪除十惡生十善入道正人正智正行菩薩達觀現前不受六道果必不退佛種性中生生入佛家不離正信上十天光品廣説此釋頂心之義即智波羅蜜也別經名灌頂住謂觀空無相得無生心法水灌頂故是人最上智至可捉縛者一節正明菩薩頂心上智體用觀行破惑義也若佛子是人最上智者先舉能滅之智謂此十住菩薩智超前九位觀智故云最上智也滅無我輪等者次舉所滅惑相顯能滅智用也滅者除也無者空也我即我見凡見皆繇我起故從我滅而無之也輪即車輪具有二義一者法輪謂佛菩薩轉此法輪於衆生心海中摧輾一切煩惱無明令盡無餘得成佛故二者衆生我輪因執我故起貪瞋癡殺盜淫等諸惡業輪流轉三界無休息故菩薩因修頂心智定破除我相將三界十使等煩惱輪去故云滅無我輪見等見身即五利使之二疑瞋即五鈍使之二一切等者該餘惑也如頂觀連觀連如頂此二句者即智觀察連絡無間因諸衆生我慢山高非以高大智慧觀照不能破除故以頂心妙智作觀而起觀照以此智觀相續不斷始能超出我慢山輪方得明見四聖六凡十法界中因果皆如如一道也是故此智為最上最勝頂智首出庶物如頂之象如山之有頂也如人頂者人身唯頂最尊喻此菩薩頂心觀智高顯而無上也非非身見至可捉縛者此申所破之惑非非二字貫下前一非字是能遣之觀智後一非字乃所遣之惑業言非外道身見可捉可縛亦非六十二種斷常邪見可捉可縛亦非五蘊妄身妄心和合因緣可捉可縛亦非神我主諦動轉屈伸種種計量種種幻相可捉可縛何以故如是諸見皆有受有行可捉可縛云捉縛者即執著義謂凡有執著俱屬生死不能解脫菩薩以是頂心智觀超出一切情見如太虗空無有邊表今盡諸見是則無受無行無可捉縛者矣是人爾時至寂滅定一節乃明菩薩頂心寂定體用觀行破惑證真之義言是人者即當位之人也爾時二字即當入觀之時謂菩薩人當爾最上頂心智照而人觀行觀外之時空却諸塵世界因果一道觀內之時空却五蘊身心內外空時當值空道一切妄想顛倒永不復行心心平等智以度衆生而為進修之念故云心心衆生然雖度生為念而不見有能緣之心所緣之境能緣所緣二性空故是則終日度生無生可度終日説法無法可説不但無能所緣度生之相亦無非能所緣理智之相故云不見緣不見非緣以是心境雙泯智理全空爾時倏然安住最勝頂心三昧寂滅正定故云住頂三昧寂滅定也發行趣道性實至正智正行一節申明頂心智定破惑證真起智利生之義謂此智定不同二乘住於空智寂定不肯前進以饒益衆生菩薩雖住智定而不貪著故從此正定中發起慈悲喜捨廣大之心修行妙行趨向佛道是為自利以是所起之道體性真實不為魔外所侵而即我人四相八倒妄見生滅因緣於此真實不二法門永無受行滅盡無餘生滅因緣既然無受無行即當八難幻化異熟業果即亦畢竟不受其報八難者地獄餓鬼畜生邊地下賤生不見佛諸根不具生長壽夭世智辨聰之八難也蓋此八難無而忽有有而忽無幻化不實菩薩覺破故云八難幻化果畢竟不受所謂因窮而果喪也唯一衆生等者釋上心心衆生之義謂此菩薩雖得解脫不受輪回而即思惟一切衆生不知是幻現前輪回是故示現去來坐立於三界中四威儀內示作精進修行衆行集福滅罪種種方便令諸衆生除滅十惡而生十善使人佛道為佛法中正信之人具足正智而起正行故也所言正人等者知因識果滅惡生善反邪皈正即是正人了達善惡體空即具正智是以深明空而不空有而不有起行而修即正行也如是所修自利利他即入佛道為佛真子菩薩達觀現前至不離正信一節總結頂心智定現身益物之義菩薩通達實相觀無生於現前雖然往返三界示同凡夫實非業繫故永不受六道果報亦即不退於佛種性中生佛種不退即生生世世入佛法家不離菩提正覺正信如是智觀是為佛子頂心之體用觀照也上十天光品者乃大部內別品之中更廣説之二明十行義二初標牒問辭二正解其義初標牒問辭盧舍那佛言千佛諦聽汝先問長養十心者此牒問誡聽許説十行修進地位觀行之義二正解其義十初釋慈心位若佛子常行慈心生樂因已於無我智中樂相應觀入法受想行識色等大法中無生無住無滅如幻如化如如無二故一切修行成法輪化被一切能生正信不由魔教亦能使一切衆生得慈樂果非實非善惡果解空體性三昧此釋慈心之義於四無量心中即慈無量行也別經名歡喜行謂入法界不為邪動故也常行慈心至得慈樂果一節正明佛子慈無量心體用觀行之義前十住修十度為被自利以能自利後利人也此修十種利他法行饒益衆生又前十住位人發心修行即以檀波羅蜜為首此十行人接物利生以慈為本是故常行慈心慈有三種一者有情緣慈謂佛菩薩觀諸衆生猶如赤子運大慈心而弘濟之令其皆得受安樂故二者觀法緣慈謂諸菩薩觀一切法皆從因緣和合而生了無自性運大慈心以弘濟之令其皆得受安樂故三者無緣大慈謂諸菩薩無心攀緣一切衆生而於一切衆生自然各各獲利益故菩薩如是恆常修此三種慈心使諸衆生獲離苦得樂之因故云常行慈心生樂因已於無我智中樂相應觀者此正釋上三種慈也其無我智即根本智於此智中觀諸衆生實無苦境本來自樂是故自樂樂他皆以此智是所謂相應也入法受想行識色等大法中者釋承樂相應義入即能入觀行法即所入觀法受想行識即心蘊法菩薩繇入觀時以觀五蘊身心四大法中本無生住異滅法相如幻如化一切皆空本來平等以如如無二故所謂照見五蘊皆空度一切苦厄也即有情緣慈義一切修行成法輪者謂此菩薩修行六度萬行無非成就大法自利利他故先修行種種妙行成就無上法輪用以自利而又化被一切衆生能生正信不繇外道邪魔所教既得正信不受魔教是獲離苦得樂之因也即法緣慈義亦能使一切衆生得慈樂果不但令得樂因而已亦能使諸衆生乘此樂因得至無上菩提覺法之樂無餘涅槃寂滅之樂果也即無緣慈義非實非善惡果等者結示觀體照用之義所得慈樂果者非權小實法亦非人天善惡有漏因果是何等果是如如智所解是如如理所空空解之中體性平等之道以此平等體性三昧自樂樂人如是修慈是真佛子慈無量心之體用觀行也二釋悲心位若佛子以悲空空無相悲緣行道自滅一切苦於一切衆生無量苦中生智不殺生緣不殺法緣不著我緣故常行不殺不盜不淫而一切衆生不惱發菩提心者於空見一切法如實相種性行中生道智心於六親六怨親怨三品中與上樂智上怨緣中九品得樂果空現時自身他一切衆生平等一樂起大悲此釋悲心之義即悲無量行也別經名饒益行謂常化衆生使得法利故以悲空空無相至發菩提心者一節正明悲無量心體用觀行之義即有情緣悲也言以悲者以大用也上位慈能與樂然而衆生現在苦中必須離苦方能得樂是故佛子恆用悲心令諸衆生離苦得樂故云以悲也其空空無相者上雖恆以悲心實非愛見之悲乃是空空無相大悲無能無所無自無他雖云空空無相而即自然任運以拔諸衆生苦衆生苦為所悲菩薩智為能悲繇所悲之緣發起菩薩悲心而行悲道故云悲緣行道以是所行悲道即自滅一切苦又滅他一切苦故於一切衆生無量苦中生大悲智拔其衆苦令得樂也無量苦者總即凡夫二乘分段變易二生死苦如是諸苦起於三業三業之中惟殺盜淫三為根本以是因緣業果相續故得無量苦也二乘縱離分段難免變易菩薩今以無相悲智緣苦衆生故不為殺生之緣不為殺法之緣此二無緣繇是菩薩不著我相之緣是故常行不殺不盜不淫而使一切衆生不惱從此發菩提心也此有三義一者菩薩無殺盜淫而諸衆生見之心生歡喜不能瞋惱發菩提心二者菩薩以永無殺盜淫而教一切衆生乃得漸漸受化故使發菩提心三者菩薩既謂無殺盜淫而自他性衆生不生惱害故俱發菩提心如行願云一切衆生而為樹根諸佛菩薩而為花果以大悲水饒益衆生則能成就諸佛菩薩智慧花果菩薩今以大悲緣苦衆生不但不惱而已而復恆與之樂所謂怨親普度悲心廣大故曰一切衆生不惱發菩提心者也於空見下至九品得樂果一節申明悲觀平等觀照之義即法緣悲也上言一切衆生不惱使發菩提心者是以菩薩能於真空實相理中了見一切根塵諸法皆如實相本無衆生本無煩惱無一衆生不具實相但以自迷而不覺悟故於一切衆生種性行中隨諸種類發起大悲道智之心為諸衆生發明此義令生道種智心修行聖道故於父母兄弟姊妹六親六怨親怨順逆三品之中皆與最上菩提樂智也上怨親中九品得樂果者怨有上中下三等上等有上中下中下二等各三三三合為九品既於上怨三品緣中皆與上樂智者其餘中下六品亦盡與之樂果故曰九品得樂果也空現時下結承悲觀平等之義即無緣悲也菩薩今令九品衆生俱得樂果者乃繇無相真空觀照現前之時無論自身眷屬他身眷屬一切衆生俱以平等觀照一樂而起無緣大悲心智拔一切苦而與樂也如是行悲是名佛子悲無量心之體用觀行也三釋喜心位若佛子悅喜無生心時種性體相道智空空喜心不著我所出沒三世因果無集一切有入空觀行成等喜一切衆生起空入道捨惡知識求善知識示我好道使諸衆生入佛法家法中常起歡喜入佛位中復是諸衆生入正信捨邪見背六道苦故喜此釋喜心之義即喜無量行也別經名無違逆行謂常修善法謙下恭敬故悅喜無生心時至示我好道一節正明喜無量心體用觀行之義悅喜無生心時者悅以心言喜以事言佛子自喜得住如實空中而亦慶喜一切衆生得住如實空中以是自他離苦得樂其心暢快此悅喜心以從無相處生生即無生無相可得故云無生心也種性體相等者種即種子性即性分體即本體相即相狀道即中道智即觀智謂此菩薩以悅喜無生心發生一切智慧觀察分別十界依正種性體相皆如實相即從如是種性體相理發起道智説法利生應以何法而得度者即以何法而為彼説種種方便令離苦集而修道諦證滅諦理如是道智無能無所心境空寂空空喜心不同凡夫從憎愛諸境而生其心故不著我所也雖然往返三界出沒隱顯示同凡夫和光混俗而於三世因果等法本來無集無有罣礙但凡一切有所作為皆入無相真空觀行即此真空觀行成就毋論親冤皆以平等悅喜使入佛道證佛道果永離苦趣所謂四弘誓願未離苦者令離苦諦未安道者令安道諦未得滅者令證滅諦故云觀行成等喜一切衆生此謂喜心平等廣大則成喜無量也所言起空入道者謂即起於所成空觀修假觀行趣入佛道接物利生又不同二乘沈空滯寂安住化城不肯前進故曰起空入道言此所入之道非真知識不能通達事理是故捨惡知識而求善知識也惡知識者身居邪見斷佛慧命故善知識者知真本有識妄元無故如此知識求其指點示我好道言好道者即佛道也乃即諸佛所證衆生所迷不生不滅清淨覺道菩薩善修此道以自利即以此道能使衆生入佛法家法中而利他也所言入佛法家者即生如來家不生外道邪見之家入佛法中者謂生如來正法之中不生權小法中也以上明其體用向下結成喜觀之益常起歡喜入佛位中此二句者乃結自利復是諸衆生等者乃結利他也不惟自己墮在佛數而生歡喜又使一切衆生入於正信捨諸邪見生生世世背六道苦所以菩薩常生平等歡喜也如是修喜是名佛子喜無量心之體用觀行也四釋捨心位若佛子常生捨心無造無相空法中如虗空於善惡有見無見罪福二中平等一照非人非我所心而自他體性不可得為大捨及自身肉手足男女國城如幻如化水流燈𦦨一切捨而無生心常修其捨此釋捨心之義即捨無量行也別經名無屈撓行謂行大精進行能令一切得至究竟涅槃故常生捨心至平等一照一節正明捨無量心體用觀行之義從初發心歷無窮劫而行濟度故云常生捨心無造即無能也無相即無所也謂此佛子常生捨心之時是乃生即無生捨亦無捨故曰無造無造則無有相無相則空空即無物以是無造無相空法之中如虗空也言空法中如虗空者釋明常生捨心無造無相之義上文既言常生捨心是即有心可生有法可捨有造作有形相何以皆言無耶蓋此真空實相法中心境諸法一切皆空若立一塵即墮限量必也無造生心無相行捨是以頭頭解脫法法無礙故曰空法中如虗空不拒諸象發揮也未發心人於善事起有因果見招福果相於惡事起撥無因果見招罪業相今佛子捨心既如虗空則於善惡二因有無二見罪福二報中平等一照了然無二皆與實相不相違背故心如虗空也非人非我所心至為大捨一節申明捨無量心體用觀行之義非人非我所心者非者空也所心者執情也以是妙智平等一照是故人我二心內外執情當下頓空以是頓空自他體性俱如虗空不可得故如是之捨是為大捨即我空義從此心性俱空之處以及身肉手足之內財寶男女國城之外財寶菩薩觀之總皆如幻如化如水流如燈𦦨虗假不實故一切捨即法空義如幻如化喻內外財物不可得也如水流如燈𦦨喻自他體性不可得也而無生心常修其捨此二句義總結佛子無相捨心以顯三觀圓修之義無生心者乃無造無相無生無滅實相心也即空觀義常修其捨者謂此佛子雖然了知自他體性俱不可得亦不同小乘人不起方便説法度生正乃即此無相心中常生方便修行捨心攝受有情即假觀義二觀不立即中道義所謂應無所住而生其心如是修捨是名佛子捨無量心之體用觀行也五釋施心位若佛子能以施心被一切衆生身施口施意施財施法施教導一切衆生內身外身國城男女田宅皆如如相乃至無念財物受者施者亦內亦外無合無散無心行化達理達施一切相現在行此釋施心之義即施攝法也別經名無癡亂行謂不為無明所失亂故能以施心至教導一切衆生一節正明施心所攝體用觀行之義言能以施心者即能被之教被一切衆生者即所被之機言身施者以身擔荷執身負役乃至所捨頭目髓腦身肉手足口施者口無雌黃出言善熟乃至歡喜讚歎説誠實語意施者心無瞋恨貪癡嫉妒乃至常懷恭敬現柔和相財施者國城妻子珍寶田園乃至一切資生産業法施者權實方便大小諸乘乃至一切因緣譬喻是也教導一切衆生者上言被一切衆生是何能被之法耶謂以身口意三輪妙用財法二種被諸衆生隨所樂求令得如意教引開導攝受一切衆生使其解脫永離苦趣故內身外身至達理達施一節申明施心所攝體用觀行之義內身即內五蘊身命外身即外國土眷屬資具也菩薩教導之中雖以權智施心種種施與而必以實智照理了無施相反觀內身外身國城男女田宅等物當體全空皆如如相實無有法可施不但無財物施相乃至無念財物之念心境空也無受者之人無施者之我能所泯也亦無內之身命亦無外之財物以緣生如幻無有合相緣滅如幻無有散相故所以施受內外合散之間實無施心可起無施行可作無衆生可化不妨終日度生無生可度終日説法無法可説故云無心行化此上明空觀下明假觀達理深達施理即達三輪體空達施深達施法因人而用求財施財求法施法二皆不謬故一切相現在行者此總結明三觀圓修之義謂雖無心行化而起化導不妨修即無修無修中修化即無化無化中化不墮斷常不著空有以此施道歷歷明明達理達施一切諸相現在前行如是行施方是佛子施心體用攝受衆生之觀行也六釋好語心位若佛子入體性愛語三昧第一義諦法語義一切實語言皆順一語調和一切衆生心無瞋無諍一切法空智無緣常生愛心行順佛意亦順一切他人以聖法語教諸衆生常行如心發起善根此釋好語心之義即愛語攝也別經名善現行謂生生常於佛國土中生故入體性愛語三昧至皆順一語一節正明愛語心所攝體用觀行之義愛語攝者乃是至慈至悲親親切切叮嚀教誡和順語也亦名好語心攝好語攝者即是善好柔軟語也謂此語言非凡小情見偏執之語乃即依如來體性愛語三昧正定之所生故如來有五語一真語二實語三如語四不誑語五不異語今文具三以該中二第一義諦法語義者是為真語即以大乘中道了義之談不將不了義語為衆生説故云第一義諦法語義也一切實語言者是為實語不誑語也皆順一語者是為如語不異語也謂此佛子既以第一義諦而生語言故凡發言吐語無不真實而又事理明了皆順第一義諦之語如是五語為因當感如來果舌之相經云出廣長舌遍覆三千大千世界説誠實言是也調和一切衆生心至亦順一切他人一節申明愛語體用之義調和即上諸語為能調衆生心為所調無瞋即心和無諍即言和一切衆生固多佛子以諸好語調之亦皆心氣平和凡有言出自無所諍何者菩薩了達一切諸法皆空智亦無緣如空谷之答嚮所以不起佛見不與佛諍不起法見不與法諍不起衆生見不與衆生諍是則一切諸法皆空智亦無緣雖則舉無能所緣相不妨恆與一切衆生自然任運常生慈愛之心如保赤子使得安隱故云一切法空智無緣常生愛心此其所以能調和衆生心而無瞋無諍也行順佛意者即以愛心上合十方諸佛同一慈力亦順一切他人者即以愛心下合一切衆生同一悲仰所謂無緣慈力赴羣機明月影臨千澗水也以聖法語等者結顯佛子愛語之用謂此愛語乃依如來聖教法語種種方便隨機設化使諸衆生常行如心亦從如如心中發起善根本以自調而亦調和一切衆生如是愛語方是佛子好語心攝受衆生之體用觀行也七釋利益心位若佛子利益心時以實智體性廣行智道集一切明𦦨法門集觀行七財前人得利益故受身命而入利益三昧現一切身一切口一切意而震動大世界一切所為所作他人入法種空種道種中得益得樂現形六道無量苦惱之事不以為患但益人為利此釋利益心之義即利行攝也別經名無著行謂於我我所一切皆空故利益心時至震動大世界一節正明利益心攝體用觀行之義實智體性即自證之本智廣行智道即利生之權智若乃佛子欲行利益心時必依實智體性方能廣行智道之權智也集一切明𦦨法門等者緊承廣行智道而言明𦦨法門即是種種智慧因緣譬喻無量方便法門所謂開方便門示真實相也集觀行七財者觀行即空假中之單復圓二十五輪觀行法也七財即七聖財謂信戒聞捨慧慚愧七事此七事中戒攝進慧攝定此上即能被之教前人等者即所益之生也菩薩聚集此教法門為使前人洞曉資藉識路還家無乏中途得至涅槃彼岸之利益故言受身命而入利益等者此申明利行攝之義諸佛菩薩教化衆生必然隱聖現劣和光同塵以同衆生身相事業如影隨形久化方皈使其解脫是故假受四大幻身假受五蘊形命而入利益三昧此即三昧覺法正受意生身也如他經云初地菩薩方得此經七行便具此是圓頓法門故能現一切身現一切口現一切意之三輪也三輪以身為神通輪欲説法時必先現通驚動衆生機情令發正信然後説故以口為教誡輪若説正法先以方便開示引導令諸衆生反邪歸正改惡從善然後説故以意為記心輪如説法時必先以意鑑諸衆生根器利鈍然後説故而震動大世界者震乃六種震動即動起涌震吼擊是大世界者化境有大中小三千此舉大千該中小故言此佛子饒益衆生現身口意神通妙用説諸法門使未發心者令其發心已發心者令其增長繇此三輪業用故感大千世界六反震動也一切所為所作至但益人為利一節此申明利益心體用之義法種即聖教法種空種即真空理種道種即道種性種菩薩一切所為所作無不欲令一切他人發菩提心起大乘信而入如來聖教法種繇法資熏解二空理而入真空理種繇解空理起行修行所修善根皆如實際而入金剛道種性種之中得是法益永離苦趣證十地果得是法樂故也現形六道等者上言現一切身口意不知此形於何處現謂即於六道之中現也以六道中有種種苦如天有五衰相現等苦人間有生老病死等苦修羅有瞋心鬪諍等苦地獄有寒酸楚痛等苦鬼神有沈幽愁等苦鳥獸有懷獝狘等苦菩薩雖於六道衆生之中隨類現形而於無量苦惱之事不以為患下結所以衆苦不避者但專饒益法界中人為利耳智道所行智體且空衆生雖化生性無生如是之行方是佛子利益心攝受衆生之體用觀行也八釋同心位若佛子以道性智同空無生法中以無我智同生無二空同源境諸法如相常生常住常滅世法相續流轉無量而能現無量形身色心等業入諸六道一切事同空同無生我同無物而分身散形故入同法三昧此釋同心之義即同事攝也別經名難得行謂成就難得善根故以道性智至同生無二一節正明同心體用觀行之義以道性智者即菩提道性利生之權智也此智契同真空無生無滅無相法中智理無二圓融一切故以無我無人之智現身同生無二無我智者即根本智此智即無差別故依此智體乃能同生無二同即能同生即所同言無二者其義有二一者以物我無二相隱同一類種種方便種種神通攝受衆生無彼此故二者以物我無二體生即無生同即無同皆同於無生空是故同生體無殊故空同源境至一切事同一節申明同心體用之義空同源境者承上既云同生何名無二既是無二又何同生言同生無二者蓋謂生我皆本同於無生空理如一切水皆同本源一切根境皆同真境以是無二真空理境之中實無人我同異之相故云空同源境諸法如相既一切法皆如實相何有生住滅相本自無生無住無滅無生即無不生無住即無不住無滅即無不滅以無生住滅故所以常生常住常滅也世法等者辨明無生無滅之義問曰既云常生常住常滅云何又有生住滅相之遷流耶答曰繇是衆生不識常生常住常滅之法迷真逐妄起惑造業隨業受報輪轉三世生死無窮故云世法相續流轉無量菩薩因觀世間衆生隨業受報受無量苦不自覺知故以同體悲智起同事攝而能示現無量形身色心等業入諸六道一切事同應以何身得度者即現何身與諸衆生共處一處種種方便而為説法令得解脫如普門大士隨機赴感隨類現形故云入諸六道一切事同也空同無生等者此總結顯同心體用之義空同無生一句結上同空無生法中之意謂乃空無二空唯一真空以是無二真空故能現一切空其所現一切空皆同於無生空故云空同無生我同無物一句結上以無我智同生無二之義謂乃我本無我是故物即無物無我無物故能物物現形以我同無而無物也而分身散形故入同法三昧者此二句義結上能現無量形身色心等業之文謂得此三昧者方能入諸佛土現諸衆生身相同諸衆生事業因事彰名故名同法三昧如是智定是為佛子同事心攝受衆生之體用觀行也九釋定心位若佛子復從定心觀慧證空心心靜緣於我所法識界色界中而不動轉逆順出沒故常入百三昧十禪支以一念智作是見一切我人若內若外衆生種子皆無合散集成起作而不可得此釋定心之義即勝定行也別經名善法行謂説法授人為成佛軌則故復從定心至十禪支一節正明定心體用觀行之義復從定心者復又也謂前於欲界中所入三昧正定今又復從欲界定心而起入上二界現身益物故也觀者觀察慧者慧照觀慧即能證智空即所證理謂此菩薩以寂定觀慧心而證定中空理其所證空不同二乘寂滅解脫不能觀照根身器界無明種子當體全空菩薩是以證空而不住著空理能於真空理中心心靜緣於我所法皆悉如幻隨如幻境現如幻身於色界識界中為説如幻法門廣化如幻衆生雖然如是不為色識二界所能動轉不被物轉能轉物也識界即四空天色界即四禪天所云不動轉者謂於上二界中若逆出若順出若逆沒若順沒以是出入隱顯故常入百三昧十禪支法種種神通自在無礙不為下界欲惡所染亦不為上二界空禪所拘所謂逆行順行天莫測也華嚴經云童子身中入正定童女身中從定起童女身中入正定童子身中從定起等是也三昧名有無量略則百八今舉百三昧破三界衆生百法相生見故十禪支者一覺二觀三喜四樂五一心六淨七捨八念九慧十不苦不樂此十乃是禪天之定支也以一念智至而不可得一節申明定心觀慧體用心心靜緣之義以一念智作是見者即視定中一念無礙清淨智慧圓照如實了見一切我人若內根身若外器界衆生異熟業識無明種了皆無合散無集無成無起無作一切皆空俱如幻化了不可得所謂世界本無成住壞空衆生本無生住異滅如是觀者是名菩薩定心出入體用之觀行也問此行位定心觀智破惑與前生位有何差別答大略相似各有淺深不同前住位定破分別之粗惑此行位定破分別之細惑故不同耳十釋慧心位若佛子作慧見心觀諸邪見結患等縛無決定體性順忍空同故非陰非界非入非衆生非一我非因果非三世法慧性起光光一𦦨明明見虗無受其慧方便生長養心是心入起空空道發無生心上千海眼王品已説心百法明門此釋慧心之義即勝慧行也別經名真實行謂二諦非如亦非非相故作慧見心至三世法一節正明慧心體用觀行之義作慧見心即能照之觀智觀諸邪見等者即所破之惑也作者用也謂此菩薩大用依本所解寂滅理慧而起觀照照見自他妄心及審觀察無明所起諸惡邪見結患等縛如實了知無決定體性也諸邪見者即諸外道執常執斷執一執異種種執著等見言結患等縛者結謂眼與色結等患謂眼色等結使起諸業患致使生死纏縛不得解脫故云結患等縛無決定體性等者謂此等患繇迷藏識現起至七地後修道無間順忍解脫藏識一空轉成無生法忍此等諸患於彼順忍同時寂滅故云無決定體性順忍空同也所以觀五陰非五陰觀十八界非十八界觀十二入非十二入觀衆生非衆生觀一我非一我觀因果非因果觀三世法非三世法一切皆非本如來藏妙真如性所謂性真常中求於去來迷悟生死了無所得故非五陰等諸法也慧性起至發無生一節乃結慧心觀照功能以顯不住假觀而證入中道觀也慧性起者繇是無作妙慧見心所起逾發觀慧妙用故云慧性起也言光光一𦦨者光光即智一焰即慧智能照境慧能了境以智慧𦦨了緣境空幻也明明見者了了照見之義虗無受者言此慧照體性無障無礙虗徹靈通不受諸受故名虗無受其慧方便等者謂此佛子以般若智照了見無明體空是故心體虗通無礙繇虗通無礙故其慧益以種種巧妙無量方便長養法身成就慧命不繇他悟為成就故是心入起空空道發無生心如苗增長也是心即本慧心入即證入起即發起空空即是所證人法二空真理道即中道蓋以從前已來所用慧心至此已證二空不惟五蘊等法為空亦無能空五蘊等法於二空理亦無所住以無住故回向一乘中道法界海中發無生心任駕慈航故也無生心者以不見有毫法生滅故曰無生心惟發此心普載普運同證金剛不壞心故如是悲智雙運是為佛子慧心體用之觀行也此是略説於大部內上千海眼王品中已説此十心百法明門一一廣明不可思議言百法明門者即百八智慧門今言百者舉大數也菩薩將離兜率宣説此法留與諸天以作憶念然後下生亦是初地所證化導法門也
