body:
  text: 姚秦三藏法師鳩摩羅什奉詔譯明廣陵傳戒後學沙門寂光直解菩薩心地品之上三釋十向義二初標牒問詞二正解其義初標牒問詞盧舍那佛言千佛諦聽汝先言金剛種子有十心此聖主世尊告當機佛誡聽牒問詳說十回向心義謂前住行菩薩以起大悲度生必回住行所修善行向於三處一者所證真如實際二者所求無上菩提三者所度一切衆生以能回之心及所回善行向彼萬類圓滿梵行等入法界故又云回事向理回小向大回因向果以事理圓融小大無礙因果不二故又云回真向俗回智向悲以真俗互融智悲不二故此之二法即上三種回向之義言金剛種子有十心者謂此十回向心觀智妙行最堅最利一切煩惱所不能壞而能壞諸惑業所以十回向心名金剛種也二正解其義十初信心位若佛子信者一切行以信為首衆德根本不起外道邪見心諸見名著結有造業必不受入空無為法中三相無無無生無生無住住無滅滅無有一切法空世諦第一義諦智盡滅異空色空細心心空細心心心空故信信寂滅無體性和合亦無依然主者我人名用三界假我我無得集相故名無相信此釋信心回向義也別經云救護衆生離衆生相回向謂以無想心常行六道而入果報受而不受故若佛子標人信者標法一切行至第一義諦智盡一節正明佛子信心體用中道觀智回向之義言一切行等者謂始從初住終至妙覺時歷三祇修圓萬行一切衆德若非初具正信首立根本必為空有魔外所折以是信力堅忍而後發起種種妙行是以信為能起一切行為所起繇能起之正信發所起之妙行繇所起之妙行證無證之妙果所以信乃入道之源功德之母故云一切行以信為首衆德根本也不起外道邪見心者申明信空諸有為法也外道有九十六種六十二見此外邪見繇無正信乃於無名無相無我理中妄起種種顛倒今既立根本正信除疑捨執則諸邪見永無所起故云不起外道邪見心也諸見名著者出本邪見之義謂諸凡夫著有外道執常二乘著空外道執斷凡此諸見皆名為著凡有著處正難破除自然結集有漏之因造諸惡業而受惡業之果今此佛子既以正信植衆德本則所起空觀假觀中觀妙三觀門一照即使惑障頓空惑障既空業障從何而有業障尚不可得豈有報障可受故云結有造業必不受也入空無為法中三相無無者申明不受之義上言業障報障必不受者乃佛子信智現前了無能造業者無受報者故全身已入空無為法中不被有為法縛而能了生住滅三相無動無到故云三相無無言無無者三相是所破之無明無無是能破之觀智所破既無能破亦無也無生無生等者申明信空諸無為法也謂不但三相無無并無有為無為諸法即此無為法中諸無為法亦不可得重言無生等者上無生是空盡有為所證之理下無生即遣上能證無生重空之智言本自無生何假更立無生然後說名無生故云無生無生無生之義如是無住住無滅滅之義亦復如是無有一切法空者承上既有為無為一切諸法本自無有悉皆空寂是則無法可空故空亦不可得此總結遣真俗二諦之理無所得空故云無有一切法空世諦第一義智盡者此總結遣真俗二諦之智亦無世諦智能空有為諸法之智第一義智能空無為諸法之智盡者盡二智也謂不但所空有為無為二諦之理不可得即能空有為無為二諦之智亦盡無餘所謂無智亦無得也滅異空色空至和合亦無依一節申明信心回向之義滅謂除滅即能滅之觀智異空色空即所滅之色法所謂凡夫執色迷空二乘執空迷色分為兩橛是故十住修空觀破凡夫執色迷空十行修假觀破二乘執空迷色今十回向菩薩以修法界平等觀智圓照法界俱滅除異空色空有為無為同異見故此於五蘊中而空色蘊所謂色不異空空不異色色即是空空即是色此也細心心空等者此明所滅心蘊之法亦空謂上異空色空二相既空則能滅異空色空細心之心此心亦空故云細心心空又不但細心之心念亦空即空上細心之心其心亦不可得故云細心心心空也圓覺經云遠離為幻亦復遠離離遠離幻亦復遠離得無所離即除諸幻即此義也信信寂滅無體性者申明心境俱空智理雙泯之義上信是能信之心智下信是所信之理境以是心境智理二俱寂滅以無體性故云信信寂滅無體性也此寂滅心從無始來不與動對而寂不與生對而滅所謂寂滅性中莫問覓也和合亦無依者承上諸法既無體性是即能信所信以成和合了不可得彼此能所和合依誰而立故曰和合亦無依所謂皮既不存毛將安附也然主者下總結無相信心回向之義然之一字喚轉文勢謂諸凡夫外道皆從我與人安名立用以是我人名用之間自為分別為和為合和合之處立我為主以為我有得相我有集相今既佛子所信至於無依是則了知我人名用之相皆是三界假設和合妄立為我主宰其體不實豈無我無法中而有修證可得智聚可集哉故曰我無得集相故是以深信深入無得無集無我智理是名佛子無相信心體用所當回向者也二念心位若佛子作念六念常覺乃至常施第一義諦空無著無解生住滅相不動不到去來而於諸業受者一合相回向入法界智慧慧相乘乘乘寂滅𦦨𦦨無常光光無無生生不起轉易空道變前轉後變轉化化化轉轉變同時同住焰𦦨一相生滅一時已變未變變變化亦得一受亦如是此釋念心回向義也別經名不壞回向謂觀一切諸法有受有用念念不住故若佛子作念標定六念至入法界智一節正明佛子念心體用中道觀智回向之義言作念者作謂起作念謂明記不忘六念等者此申明作念意問言作念者作何等念答謂即念佛念法念僧念戒念天念施之六念也常覺乃至常施此舉首尾二念是超略義該中四也言常覺者即念佛也依涅槃經六念釋之念佛者謂念諸佛十功德品具足十力四無所畏大悲三念常樂我淨是故得稱如來常無變易名大沙門名大法師名大導師乃至婆伽婆是名菩薩摩訶薩念佛念法者謂念思惟諸佛所可說法最妙最上因是法故能令衆生得現在果惟此正法無有時節法身所見不生不出不住不滅不始不終乃至諸佛所遊居處常不變易是名菩薩摩訶薩念法念僧者謂念諸佛聖僧如法而住受持正法隨順修行不可覩見不可捉持不可破壞無能撓害不可思議一切衆生良祐福田雖為福田無所受也乃至常不變易是名菩薩摩訶薩念僧念戒者謂念諸佛菩薩思惟有戒不破不漏不壞不雜雖無形色而能護持雖無觸對善修方便可得具足無有過咎諸佛讚歎是大方等大涅槃因乃至諸佛妙寶勝幢若住是戒得須陀洹果我亦有分非我所欲何以故不能廣度衆生故若住是戒則阿耨多羅三藐三菩提我亦有分是我所欲何以故當為衆生廣說妙法而作救護故是名菩薩摩訶薩念戒念天者謂念四天王處乃至非非想處若有信心得四天王處我亦有分若戒多聞布施智慧得四天王乃至非非想處我亦有分然非我所欲何以故四天王處乃至非非想處皆是無常以無常故生老病死以是義故非我所欲譬如幻化誑於愚夫智慧之人所不能惑愚者即是凡夫我則不同凡夫愚人我曾聞有第一義天乃至常不變易以常住故不生不老不病不死我為衆生精勤求於第一義天能令衆生除斷煩惱猶如意樹若我有信乃至有慧則能得是第一義天當為衆生廣分別說第一義天是名菩薩摩訶薩念天念施者謂念深觀此施是菩提涅槃因諸佛親近我亦如是親近若不惠施不能莊嚴四部之衆施雖不能畢竟斷惑而能除破現在煩惱乃至諸佛菩薩修集是施為涅槃因是名菩薩摩訶薩念施也如是常覺乃至常施雖則名有六念而於第一義空中道理中實無有念可執著者實無有念可解脫者何以故有縛有解皆是生滅無著無解無生無滅以無縛無解故則無生住滅相之念法以無生住滅相之念法故是則本元不動本元不到既本元不動不到則亦無去無來無來則無動相覺其有生無去則無到相覺其有滅如是不動不到無去無來是故無有生住滅之三相作業受報一切皆空能於諸所作業并受業者為一合相回向入法界智也一合相回向者其為念心無能無所能所無二無縛無解縛解無二無生無滅生滅無二無動無到動到無二無來無去來去無二無業無報業報無二是為一合相回向也入法界智者入即趣向之義法界即十法界乃一切衆生本有之心一切諸佛所證之理所謂心佛衆生三無差別也智即能證法界平等之智回二諦理向入法界平等之理回二諦智向入法界平等之智以法界智契法界理以法界理㳷法界智智理圓融無有迹象入法界有三處因諸菩薩根有利鈍行有淺深以所入不同故一者十住初心以利根者能破無明即得證入法界平等之理得不退轉二者十向終心衆行純熟破除二障故得證入法界平等之理三者初地初心於前行向十功德品具處至於初地初心證入法界三德圓融三身自在是名三處證入法界此是第二終心入法界也慧慧相乘至生滅一時一節申明一合回向入法界義慧慧相乘即智乘乘寂滅即理由入法界智故轉六念之慧乘入法界之慧乘轉六念之理乘入法界之理乘所謂廣大如法性究竟如虗空窮未來際無有間斷故𦦨焰無常光光無無此二句者乃即智慧破惑之象𦦨焰光光即能滅之智慧無常無無即所滅之無明菩薩智慧如火之𦦨衆生煩惱如薪之燒以智慧𦦨燒煩惱薪淨盡無餘如火之𦦨能燒大地草木淨盡無餘又以菩薩智慧如火之光衆生無明如室之暗以智慧光照無明暗無幽不燭菩薩以中道觀第一義空破無明惑無障不除無理不顯也生生不起等者既是𦦨𦦨無常光光無無是則生而無生起而不起是以無生無起即轉易空道也言轉易空道者即回向義轉即轉回易即易向轉無明易真如轉煩惱易菩提轉生死易涅槃惟其轉易如此是以轉而不轉不轉而轉故能變前轉後等也變前轉後一句即轉滅相無明為不滅相變轉化化一句即轉住相無明為無住相化轉轉變一句即轉生相無明為無生相不云轉異相者正是本位所破故不言也同時同住等者釋承四相相依而有同一覺故所以𦦨𦦨一相生滅一時𦦨𦦨一相始本無二同一覺故生滅一時四相平等猶若交蘆相依而立也已變下等五句此又統結生住異滅四相平等三覺無二言已變者即過去生滅也言未變者即未來生滅也變變者即現前生滅也化亦得一者例上結之雖云三世迭遷以法界智照之實無動到去來四相平等故云化亦得一所謂才生即有滅不為愚者說也受亦如是者承上既三世所變生滅之法亦得一是則能覺生滅之心亦得一也故云受亦如是如是念心是乃佛子無相念心之回向也三深心位又云回向心位若佛子深心者第一義空於實法空智照有實諦業道相續因緣中道名為實諦假名諸法我人主者名為世諦於此二有諦深深入空而無去來幻化受果而無受故深深心解脫此釋深心回向義也別經名等一切諸佛回向謂三世佛法一切時能行故若佛子深心者二句標定第一義空至下深深入空一節正明深心回向言深心者非對淺而言也乃是最深之深故名深心第一義空者即一真法界大空之理於實法空智者即一真法界大空之智以法界智入法界理理智圓融法界無礙即以法界理智而起慧照照有實諦有即俗諦實即真諦然此真諦非離俗諦之外別有乃即業道相續無明老死十二因緣於其因緣和合法中本來不遷不變之道名為實諦業道即第八賴耶識名為業相相續即第七末那識名為相續總該三細六粗之法因緣即三細六粗生滅和合之稱所謂無明不覺生三細境界為緣長六粗又云業道即身口意所作善惡行業謂此諸業之因致受生死諸業之果道即道路能通之義謂此三道更互相通從煩惱通至業從業通至於苦從苦復通至於煩惱展轉相通生死不絶是為業道相續和合因緣之法繇是因緣和合假名諸法致使凡夫外道妄計我人執為主者名為世諦世諦遷流不實之謂菩薩於此二有諦深深入空二有諦者即上真俗二諦所言真諦亦名有諦者何對俗言真立真遣俗俱屬對待即非真真故亦名有諦所謂言妄顯諸真妄真同二妄也又二有者有即本有真常不變故亦名有所謂是法住法位世間相常住故又云因緣所生法我說即是空亦名為假名亦名中道義此也深深入空者申明深心回向之義承上菩薩以法界智照真了真照俗了俗於此二諦了無二法合為一理深深回向一真法界平等大空之理故云深深入空所謂真不立妄本空有無俱遣不空空者此也而無去來等者此總結承深心回向之義既於此二有諦深深入空而空理中自無生滅去來幻化受受果報而無受受幻化之果報故是名深深心解脫也又深深心解脫者聲聞修生滅四諦法證人空理名淺解脫緣覺修無生四諦法證法空理名深解脫菩薩以法界智即觀空假不二真俗互融深之又深故云深深心解脫也四達心位若佛子達照者忍順一切實性性性無縛無解無礙法達義達辭達教化達三世因果衆生根行如如不合不散無實用無用無名用用用一切空空空照達空名為通達一切法空空空如如相不可得此釋達心回向義也別經名為至一切處回向謂以大願力入諸佛土供養一切佛故若佛子達照者標定忍順一切實性至教化達一節正明達照體用中道觀智回向之義達即通達照即明照謂通達事理照了無礙二義合言故云達照此即能證之智忍順一切實性者此即所證之理忍即忍可忍證也順即隨順無違也以是忍證法界之理順隨法界之性故能了達一切諸法之性皆即法界真實之性故云忍順一切實性性性無縛無解三句承上既觀一切法性皆法界性即此一切法性之性本自如如本來無縛本來無解無縛即無生死無解即無涅槃經云一切衆生皆即涅槃本來自滅不復更滅以是情與無情一體無差本來清淨故云性性無縛無解無礙法達等者申明達照之義上明觀照諸法體性無差此明觀照諸法相用不異無礙二字貫下法達義達辭達教化達四種無礙智也法達者即法無礙智謂得此智即能通達世出世間一切諸法名字差別分別演說無滯礙故義達者即義無礙智謂得此智即能了知一切諸法差別名字義趣妙理隨順宣揚無滯礙故辭達者即辭無礙智謂得此智能於諸法名字義理隨順一切衆生種種根性殊方異語為其演說能令衆生各各得解辨說通達一切法性無滯礙故教化達者即樂說無礙智謂得此智即能隨順一切衆生種種根性所樂聞法而為說之通達圓融無滯礙故三世等者詳釋上義言三世因果者即釋上法達義謂此佛子於諸法中了達過現未來善惡之因即感過現未來苦樂之果是以三世因果相續無窮一一了故衆生根行者釋上辭達教化達二義謂諸衆生根行有貪瞋癡等業繫苦衆生有戒定慧等解脫樂衆生而諸衆生有利根鈍根者有非鈍非利者有善性惡性者有非善非惡者種種根性種子差別而起種種現行差別菩薩觀根逗教一一通達方便說故如如不合不散此三句者總釋上三種義謂即了達三世因果衆生根行世出世間生滅染淨一切諸法皆如如相本無三世因果本無衆生根行本來平等不合不散無生無滅不合即無生也不散即無滅也故名如如不合不散無實用等者展轉釋明無合無散之義謂既了達無合無散即一切法當體本空何有實用是故無實用也無用無名用用用一切空者蓋謂實以名顯名得其用其名其用依實而立既無實體則無實用既無實用則無有名名實二用皆是假立各無自性各無自相一切皆空本自如如何有其名何有其用所以用用一切空也空空照達空者謂以所照諸法既無實體無有實名則此能照觀智亦無照無達也名為通達一切法空者以是空空照達空故是故名為通達一切法空經云若人通達無我法者如來說名真是菩薩此也空空如如相不可得此二句者總結無相照達回向之義空空即法界理如如即法界智以是如理如智之道離諸名字言說心緣等相故云空空如如相不可得五直心位若佛子直者直照取緣神我入無生智無明神我空空中空空空理心在有在無而不壞道種子無漏中道一觀而教化一切十方衆生轉一切衆生皆薩婆若空直直性直行於空三界生者結縛而不受此釋直心回向義也別經名無盡功德藏回向菩薩恆以常住大法授與前人故若佛子直者標定直照至無漏中道一觀一節正明直心體用中道觀智回向之義所言直照謂正直照物而無私曲之義菩薩證入中道法界理智而起觀照直照諸法自他體性一切平等無委曲相是為直者之直照也取緣神我入無生智此二句者釋上直照之義取緣神我即第六識分別之我以能取能緣故名取緣六識名神我者以二乘人不知有七八識依六根門頭六識三毒建立染淨根本所以名此六識為神我也以阿賴耶人所難測故耳言入無生智者謂此十向菩薩以法界智觀察無明煩惱體性本空將登地時已離分別我法二執故云入無生智無明神我空者即第七識俱生所執自內之我此繇無明熏習所起微細難知至七地後方捨諸外道執此第八藏識謂之自性冥諦二十五諦以此藏識為冥初諦故此識非諸凡夫所知亦非二乘智慧所覺謂依菩薩從初正信發心觀察若證法身得少分知乃至菩薩地盡不能盡知唯佛窮了是以三賢菩薩起真觀解深觀藏識緣起雖未頓破無明亦了緣起體空故云無明神我空空中空者此釋無明體本空義謂此般若真空實相體中即無明空相尚不可得寧有無明相耶故云空中空也空空理心等者此釋照體不空之義謂上無明之空即空有也空中之空即空無也是空猶被有無可壞而此空空理心在有時不滯有不被有壞在無時不沉無不被無壞故云在有在無而不壞道種子道種子者乃即菩提道性金剛種子以此中道體性為成佛真種子常無變故無漏中道一觀至結縛而不受一節申明直心體用之功結顯中道觀智之益所言不壞道種子者謂以無漏中道平等一觀即以一觀圓照所以在有轉有在無轉無而能教化一切十方執有執無衆生離有無相皆轉一切衆生俱入薩婆若海平等大空無餘涅槃正直之道所以不被物壞而能壞物人不能轉而能轉人是菩薩皆以直性直行自成成人入薩婆若也於空等者釋直性直行義菩薩示現受生往來三界應緣而來應緣而去皆以直性而行直行不與法縛不求法脫不厭生死不愛涅槃無所罣礙猶若虗空所謂不如三界見於三界故云於空三界生者結縛而不受也六不退心位若佛子不退心者不入一切凡夫地不起新長養諸見亦復不起集因相似我人入三界業亦行空而不住退解脫於第一中道一合行故不行退本際無二故而不念退空生觀智如如相續乘乘心入不二常空生心一道一淨為不退一道一照此釋不退心回向義也別經名入一切平等善根回向謂行無漏善善而不二故若佛子不退心者標定不入一切凡夫地至亦行空一節正明不退心體用中道觀智回向之義不退心者謂不退入一切凡夫地故一切凡夫總舉三界衆生菩薩照破三界見思煩惱等惑將鄰聖地故此不入既以不入一切凡夫地故則不起新長養外道諸見不但不起長養亦復不起集因所謂因窮而果喪也雖然示生三界實非業繫似有我人而三界業亦行空矣此上總明不退向下別明不退其義有三一位不退二行不退三念不退不住退解脫者即別明位不退不住之義謂此菩薩寶位不同聲聞之位住著解脫涅槃故云不住解脫問何名不退答此菩薩於第一義諦中道理中一合行故得位不退也不行退者即別明行不退之義謂菩薩行不同四諦還滅之行有住有退此達根本菩提真如實際智理一如無二之行故得行不退也而不念退者即別明念不退之義謂此菩薩之念不同念空無相無作有念無念分別取捨此以空生觀智照了諸法皆如如相是故無念而念念而無念以無念境是名念不退也相續乘乘心入不二此二句者承上謂乃不但行念不退且亦不住以能相續乘乘心入不二言相續乘乘者謂以行念不退毫無間斷故云相續乘乘言心入不二者謂境智如如故常空生心者釋上相續乘乘我空之義一道一淨等者釋上心入不二法空之義一道即中觀一淨即空觀是以空而不空能為不退一道一照也一道即中觀一照即假觀是以二邊不住中道不立直趨無餘不二大涅槃果海所謂應無所住而生其心如是住持如是行門如是念心是名佛子不退心回向之義也七大乘心位若佛子獨大乘心者解解一空故一切行心名一乘乘一空智智乘行乘乘智心心任載任用任載任一切衆生度三界河結縛河生滅河行者坐乘任用載用智乘趣入佛海故一切衆生未得空智任用不名為大乘但名乘得度苦海此釋獨大乘心回向之義也別經名等隨順一切衆生回向謂觀一切善惡無二相故若佛子等二句標定解解一空故至智乘行乘一節正明獨大乘心體用中道觀智回向之義所云獨大乘心者謂獨大無外也大即當體立名就義為稱乘乃運載為功廣博為義揀非聲聞辟支佛乘亦非住行位乘乃回向終心中道大乘也解解一空等者正釋獨大乘心之義上解即是能解法界廣大之智下解乃即所解法界廣大之理以智契理二俱平等了無能所故云解解一空故一切行心名一乘者謂即以此法界理智而起法界行心是故一切之行即法界行一切之心即法界心故云一切行心名一乘也乘一空智等者此釋智行雙運之義謂乘一乘之空智故而顯乘一乘之空理也以一乘空理故而起一乘空行繇一乘空行故而運一乘空理若非乘一乘之空智斷然不能破衆生堅固之迷非乘一乘之空行則亦不能成衆生真實之德也是故智起惑亡行興道成以是智行雙乘廣化衆生到涅槃城無諸難事如鳥二翼一舉萬里亦如目足相資直抵中堂故云乘一空智智乘行乘也乘智心心至趨入佛海故一節申明獨大乘義乘智心心任載任用此二句者承上繇乘大乘空智故能堪可心心大乘任載任用而任意運為也云任載者謂任一切衆生度三界河并結縛河生滅河也一切衆生總舉凡聖權小而言言度三界河者度即度脫三界即欲界色界無色界河者漂流沒溺之義以諸凡夫沒溺愛河不得出離今令乘此大乘得出三界不致沒溺故也結縛河者此度外道見使執縛以諸外道有種種邪見執縛是故不得出離生死苦海今令乘此大乘得解脫故生滅河者此度二乘生滅知見以二乘人生滅知見未亡而使乘此大乘超變易生死故上明任載之義向下明任用義其任用者謂此行者坐乘大乘任用任意縱橫自在無礙以是能載能用皆以一空智乘而趨入佛海故佛海即妙覺果海也一切衆生等者結顯獨大乘心之義揀別小乘不得至此何者謂以一切衆生未得一空智乘任載任用不得名為大乘但名為乘得度苦海安住化城自善而已所以菩薩不與權小人同故名獨大乘心也八無相心位若佛子無相心者妄想解脫照般若波羅蜜無二一切結業三世法如如一諦而行於無生空自知得成佛一切佛是我等師一切賢聖是我同學皆同無生空故名無相心此釋無相心回向之義也別經名真如相回向謂心得自在等三世佛常照有無故若佛子等二句標定妄想解脫至如如一諦一節此正明無相心體用中道觀智回向之義無相心者謂無妄想及與解脫分別之心妄想是生死法解脫是涅槃法生死即此岸道涅槃即彼岸道以諸凡夫妄想恆居生死此岸二乘已得解脫住著涅槃彼岸菩薩以般若大智慧照了生死及與涅槃於此無相般若波羅蜜中實無二法故云照般若波羅蜜無二既了妄想解脫無二法故則一切結業法三世因果等法皆即如如一諦無二理也而行於無生空至皆同無生空故一節此申明無相心觀照回向之義謂上既了妄想解脫皆如如一諦是以不住生死此岸亦即不住涅槃彼岸以不住故而能常行於無生空以行無生空故自知決定信得當來成佛亦知一切諸佛是已成佛道者是我等本源師一切三賢十聖是未成佛道者是我等同學友何以故皆同無生空故所云皆同無生空者謂諸一切賢聖所修以修此無生空一切諸佛所證以證此無生空故云皆同無生空故所以結顯名為無相心也佛藏經云釋迦如來因地從過去遠劫時而以四事供養無量無邊一切諸佛及佛弟子無空過者而此諸佛皆不記我汝於來世當得作佛何以故以我有所得故乃至最後供養普明如來方始與我授記汝於來世當得作佛號釋迦牟尼何以故以我無所得故無所得者即常行於無生空無生空者即無相心也九慧心位若佛子如如慧者無量法界無集無受生生生煩惱而不縛一切法門一切賢所行道一切聖所觀法所有亦如是一切佛教化方便法我皆集在心中外道一切論邪定功用幻化魔說佛說皆分別入二諦處非一非二非有陰界入是慧光明光明照性入一切法此釋慧心回向之義也別經名無縛無著解脫相回向謂以般若照三世諸法是一合相故若佛子等二句標定無量法界至所有亦如是一節正明如如慧心體用中道觀智回向之義所言如如慧者即真如之理慧謂此菩薩將親見真如之道真如相現前其智慧心中明了十界依正等法互攝圓融自在無礙所謂真得所如十方無礙所以得此如如慧者能於無量十法界中現身益物雖現身益物而無集因亦無受果無有生死無有煩惱如空谷以答響實無身心受彼生死故云無量法界無集無受生也生生煩惱而不縛者此二句義謂不止六凡法所不能縛即四聖界一切修證法門皆亦無著無縛言一切法門者乃即一切三賢所修行菩提道一切十聖所觀證真如法謂此所有賢聖法門悉皆如是不著不縛故云所有亦如是也一切佛教化方便法至非有陰界入一節申明如如慧心觀照之義既凡所有一切法門無著無縛故即能於一切諸佛教化開導方便法門菩薩亦皆集在如如慧心之中融通無礙豈但諸佛法門融通無二即入外道一切辨論一切邪定功用一切種種幻化若魔說若佛說若魔見若佛見我能融通如如慧心歷歷明明皆以分別入二諦處二諦即真諦俗諦也於此二諦究竟無惑非一非二云何非一謂魔說非佛說佛說非魔說魔說者邪見也佛說者正見也故非一也云何非二魔說實非魔說佛說實非佛說是故魔說佛說實無二法魔見佛見實無二體故非二也非有陰界等者謂魔與佛既是非二何有陰界入耶所以觀五陰非五陰觀十八界非十八界觀十二入非十二入故也是慧光明三句結成如如慧心體用觀智回向之義承上問既是諸法一切皆非是何境界答乃即如如智慧光明即此光明照法界性入一切法於本法界無二別故如是智慧如是觀照是名佛子如如慧心之回向也十不壞心位若佛子不壞心者入聖地智近解脫位得道正門明菩提心伏忍順空八魔不壞衆聖摩頂諸佛勸發入摩頂三昧放身光光照十方佛土入佛威神出沒自在動大千界與平等地心無二無別而非中觀知道以三昧力故光中見佛無量國土現為說法爾時即得頂三昧證虗空平等地總持法門聖行滿足心心行空空空慧中道無相照故一切相滅得金剛三昧門入一切行門入虗空平等地如佛華經中廣說此釋不壞心回向之義也別經名入法界無量回向謂覺一切法中道無相故若佛子等二句標定入聖地智至下而非中觀知道一節此正明不壞心體用觀智回向之義所言不壞心者其義有六故得不壞入聖地智近解脫位得道正門明菩提心伏忍順空八魔不壞有此六義故名不壞心也言入聖地智者謂住行向之三十心名賢地上菩薩名聖今茲十向終心所得智慧即登初地智慧故云入聖地智近解脫位者近者鄰也三賢至此相鄰初地將解脫分別二障故云近解脫位得道正門者道即諸佛達道此道不偏不邪曰正門者通也以初歡喜菩薩得正修行門路若到此門一超直入如來覺地所謂歡喜菩薩覺通如來盡佛境界今即十向終心將登初地故云得道正門明菩提心者明即了明菩提心者華言覺道亦云道心具大道心以成衆生明了此心故云明菩提心智度論云菩提心有五種一者十信菩薩名為發菩提心謂此菩薩於無量生死中為求阿耨多羅三藐三菩提故而乃發此大心故名發菩提心二者住行向諸菩薩名為伏菩提心謂此菩薩折諸煩惱降伏其心行諸波羅蜜行利益衆生故名伏菩提心三者初地至七地諸菩薩名為明菩提心謂此菩薩觀三世法總相別相分別籌量得見諸法本末實相清淨明了與般若波羅蜜相應故名明菩提心四者八地九地十地三位菩薩名出到菩提心謂此菩薩於般若波羅蜜中得方便力亦不著於般若波羅蜜故能滅一切煩惱障故得見一切十方諸佛體性真得無生法忍出離三界到薩婆若海故名出到菩提心五者等妙二地菩薩名為證無上菩提心謂此菩薩坐於道場斷諸煩惱成就阿耨多羅三藐三菩提故是名證無上菩提心此五種中之第三也謂此十向終心將登聖地明真見道究竟明了故曰明菩提心伏忍順空者忍有五忍三賢菩薩名伏忍位初地二地三地名信忍位四地五地六地名順忍位七地八地九地名無生忍十地等妙名寂滅忍此三賢位行滿居伏忍道極頂將登聖地一切異相無明現行不起亦能隨順於無生空故云伏忍順空八魔不壞者八魔一色魔二受魔三想魔四行魔五識魔六煩惱魔七死魔八天魔也五陰魔者亦名五蘊魔陰為蓋覆蘊猶積聚以集五蘊生滅使修行人不能超脫名五陰魔煩惱魔者即三界中見思煩惱一切妄惑若修行人為此妄惑惱亂心神不能成就阿耨菩提名煩惱魔言死魔者即身四大分散夭喪殞沒若修行人為此夭喪不能續延慧命名為死魔言天魔者乃即欲界第六他化自在天魔若修行人勤修勝善欲超三界生死而此天魔為作障礙發起種種擾亂之事令修行人不能成就世出世善樂因樂果故名天魔天魔一種是為外魔前七種是內魔梵語魔羅華言奪命又云殺者謂奪智慧之命而殺世出世間一切善根故云魔也言不壞者繇是菩薩入聖地智近解脫位得道正門明菩提心伏忍順空達妄想即真如了無明即佛性是故八魔不能壞也以是魔無能壞故感衆聖摩頂安慰其心諸佛勸發增進其行華嚴十回向品中云十方諸佛各以右手摩金剛幢菩薩之頂加被為說法主即此摩頂之義是故得入摩頂三昧即放身光而此身光光照十方國土即能入佛威神形儀如佛於十方國土中若出若沒或隱或顯自在無礙以是神變一時震動大千世界即與虗空平等地心無二無別而非中觀知道者謂此菩薩雖然如是神變而尚非歡喜地實證第一義諦中觀智道現百佛身百佛世界一一遍知無礙者也以三昧力至入虗空平等地一節申明加被之義承上所云既非初地中觀知道是何力也謂此菩薩雖非中觀知道而以諸佛三昧定水加被力故亦能於自身光中得見十方諸佛在無量國土中現為衆生說諸妙法以是見佛得聞法故爾時即得證入頂三昧而能實證虗空平等初歡喜地總持門也總持門者謂總一切法持無量義瓔珞經云地名持即持一切百萬阿僧祇功德智慧故所以證此地者一切如來聖行功德悉皆圓滿具足以是聖行悉滿足故而心心行空也言心心行空者即住行向之三十心心心分別我法二執之行至此悉空故云心心行空空空慧中道者空空是即所證人空法空三空之理慧者即是能證二空之智以是如理如智不即不離不一不二名空空慧中道所謂二諦融通三昧印也無相照故等者釋空空慧中道之義謂以無相中道之智而照無相中道之理無理不顯無相不滅是故一切異生性障等相滅盡無餘所謂虗空平等之地性德真如之理圓滿成就含攝周遍其量無外十界差別之相了不可得所以無相照故而一切相滅也以是障礙滅故即得金剛三昧正受法門一時現前繇現前故能入十地一切行門一時具足是名證入虗空平等地也此是略說如佛華經廣說其義四釋十地義三初總標問辭二別解文義三結讚法門初總標問詞盧舍那佛言千佛諦聽汝先問地者有何義此能說報佛召告當機化佛誡聽牒前問詞解脫十地菩薩理智觀行修證次第之法義也二別解文義十初體性平等地二初明斷證義二正釋其義初明斷證義華嚴疏云十地菩薩斷十種障證十真如真如體性實無差別乃隨勝德假立十種雖初地中已達一切而所證如猶未圓滿令圓滿故後後建立又初地中雖離分別我法二執但能遠離六識粗惑猶有七識微細俱生我法二執尚未空盡第六分別二執自初信發心時修生空觀至七信位已斷分別我執而隨入法空觀歷三賢位至初地時分別法執亦即斷矣第七俱生二執自初地位恆住雙空觀中至第七地後心方捨藏識乃至八地初心即得無功用行是則俱生我執現行永伏俱生法執間起至等覺後心位金剛喻定現在前時一剎那間生相無明異熟種子方始斷盡而無餘也其云十地斷十種障證十真如者何如初地斷一種異生性障此障乃從凡夫分別我執現行所起故名異生性障並斷二種愚執一執著我法愚二惡趣雜染愚謂此三法能障初地斷此愚障方登初地此地菩薩自從賢位初證理性始獲法味證二空理今二空觀現前便能永斷愚障既斷能益自他生大歡喜名歡喜地其所證者名曰遍行真如以能遍行染淨法故菩薩位寄轉輪聖王廣修慈悲等法而化導衆生故華嚴經云歡喜菩薩於十波羅蜜中檀波羅蜜最勝餘非不修但能隨力隨分下九度義倣此二正釋其義若佛子菩提薩埵入平等慧體性地真實法化一切行華光滿足四天果乘用任化無方理化神通十力十號十八不共法住佛淨土無量大願辨才無畏一切論一切行我皆得入若佛子者標名菩提薩埵顯德入平等地舉德位也每一地有三心初加行心以勇悍力奮迅不怯深證真如而趣入故中無間心以猛利行承事諸佛十方化導無間歇故後解脫心以無住行圓滿菩提歸無所得而解脫故自若佛子三句標名德位以明勝進心義菩提薩埵華言覺有情言有覺可求有生可度故入平等慧體性地者入即證入平等即法身理謂即證入真如平等不增不減法身理故此是心佛衆生三無差別之理慧乃佛慧謂即證入諸佛平等之慧以故凡所作為其慧平等故云入平等慧體性地別經名歡喜地菩薩智同佛智理齊佛理徹見大道盡佛境界而得法喜登於初地故名為歡喜地真實法化等者標所證之法也真者無妄實者不虗法謂教法化謂攝化言即轉此所證真實平等大法開化衆生而轉衆生成正覺故一切行華光滿足者行即六度四攝一切萬行華即因華光即智光菩薩至此一切皆得悉滿足故四天果乘用者四天即須彌山四洲謂歡喜地菩薩多作轉輪聖王掌護正法能大惠施周給孤露以法化世能令一切恆修善行諸所作業皆不離於念佛念法念僧統領閻浮提王七寶具足一日一夜游四天下故云四天果乘用任化無方者任意教化但隨機感無有方所故云任化無方理化神通者如理而化是何等人說何等法皆與實相不相違背以神通力折伏驕慢使令信受所謂應折伏者而折伏之應攝受者而攝受之或慈或威咸令衆生離苦得樂故云理化神通十力等者謂不但得四天果德以行教化而且更得如來十種智力十種聖號十八不共等法恆常住佛淨土以能隨類現化淨土有四合為三土此地菩薩乃住第二受用土中之他受用土也菩薩住此淨土廣發無邊弘誓大願以四無礙辨才說諸法門而無怖畏怖畏總有五種別有無量一切皆無故云無畏一切論者即是四明五明一切諸論一切行者即十地等妙諸大菩薩一切之聖行也我皆得入者此句總結上文如是種種法門此地菩薩無不通達故云我皆得入生出佛家坐佛性地一切障礙凡夫因果畢竟不受大樂歡喜從一佛土入無量佛土從一劫入無量劫不可說法為可說法反照見一切法逆順見一切法常入二諦而在第一義中以一智知十地次第一一事示衆生而常心心中道以一智知一切佛土殊品及佛所說法而身心不變以一智知十二因緣十惡種性而常住善道以一切智見有無二相以一智知入十禪支行三十七道而現一切色身六道以一切智知十方色色分分了起入受色報而心心無縛此釋住無間心之義謂上繇得聖智入聖位證聖理成聖行是故生出佛家坐佛性地也言生出佛家者謂在佛家而生出也如摩耶夫人凡有諸佛出世則為其母羅睺羅則為子故云生出佛家坐佛性地者謂此菩薩所證真如境界與諸佛同平等無差所謂諸佛法身入我性我性同共如來合如世尊降生時一手指天一手指地目顧四方周行七步曰天上天下唯吾獨尊世出世間此法最勝故云坐佛性地一切障礙凡夫因果畢竟不受此三句者正明斷障之義既云生出佛家坐佛性地是則一切異生性障凡夫有漏因果俱已解脫故云畢竟不受大樂歡喜者既永離一切障礙即得出世間心未曾有法是故大樂歡喜所謂分別二障極喜無也從一佛土入無量佛土者此明身土圓融無礙之義菩薩既已離障得樂故能現百佛身百佛之土乃至百千億佛身百千億佛土於是一處出生十方齊現是以身不礙土土不礙身塵塵混入剎剎圓融故從一劫入無量劫者此明時劫圓融無礙之義謂既能現身現土是故能以短時而為長時長時復為短時如世尊一坐之中過六十小劫復以六十小劫如彈指頃乃至於一剎那際三時轉大法輪者是也不可說法為可說法者此明說法圓融無礙之義以是真如之法本無言說本無名相但隨衆生機宜巧設方便而於無名相法以名相說無語言法以語言說故反照見一切法者謂此菩薩證佛平等大慧以反照見從凡夫時反妄皈真以始覺智而滅一切染法生一切淨法故逆順見一切法者即以平等佛慧見本源自性清淨心因無明不覺一念妄動逆真如理順無明流而滅一切淨法生一切染法故常入二諦而在第一義中者謂雖常照真諦而不沉空照俗而不滯有二諦圓融了無二相而恆在第一義中不即不離故以一智至心心無縛一節廣明住無間心智體照用之義既上入剎入劫說法智照而恆在第一義中即以第一義諦中道理智而起六種妙智發明世出世間至善開示衆生令入佛地永離苦趣故六種妙智者何一者以此一智能入初地了知十地中次第斷障證真事雖然位僅初地而十地中智理業已圓該故能以十地法門指示衆生而常心心中道也二者以此一智了知一切諸佛國土殊品染淨不一及知一切諸佛為諸染淨國土衆生說諸染淨法門即如娑婆世界佛為娑婆衆生說極樂世界佛為極樂衆生說雖一一了知而身心未曾變動故三者以一智了知無明老死十二因緣生滅始終亦知一切衆生三業六根十惡種性差別現行而常住於善道四者以一切智了見外道執常之有相執斷之無相雖分內外而於真如性體本無差別皆與實相不相違背同一法性不見有無二相故五者以此一智知入四禪天十禪支之觀行及權小助菩提三十七品之道法而現一切色身隨類現形入於六道使未種善根者令種已種善根者令其增長皆使入禪修道故六者以一切智了知十方法界依報正報內色外色分分幻化了滅生起入受色報緣起差別開示衆生而心心之際了無著縛故光光照一切是故無生信忍空慧常現在前從一地二地乃至佛界其中間一切法門一時而行故略出平等地功德海藏行願如海一滴毛頭許事此結當地功德以明解脫心也光光照一切者如是六種智光其光普照一切世出世間所有染淨諸法當體皆如如相是故無生信忍無生空慧常現在前以是常在前故而得解脫繇解脫故從此一地二地乃至十地入佛境界於其中間一切聖行法門一時而能盡行故略出等者顯上所說未能盡言蓋此平等地功德其海藏行願如海甚深無量無邊難可具說此所言者如大海之一滴毛頭許事至極至微故云略出耳二體性善慧地二初明斷證義二正解文義初明斷證義此地菩薩斷一種邪行障此障即所知障中俱生一分法執誤犯三業所起故名之也並斷二種愚執一者微細誤犯愚二者種種業趣愚此之三法能障二地斷此愚障方登二地菩薩今得增上尸羅波羅蜜多性戒具足遠離誤犯愚障既斷故名離垢地以所證真如名最勝真如此真如性具無邊德於一切法最為殊勝故菩薩位寄忉利天王假修十善等法化導衆生於十波羅蜜中尸羅波羅蜜最勝二正解文義若佛子菩提薩埵善慧體性地清淨明達一切善根所謂慈悲喜捨慧一切功德本從觀入大空慧方便道智中見諸衆生無非苦諦皆有識心三惡道刀杖一切苦惱緣中生識名為苦諦三苦相者如者如身初覺從刀杖身色陰二緣中生覺為行苦緣次意地覺緣身覺所緣得刀杖及身瘡腫等法故覺苦苦緣重故苦苦次受行覺二心緣向身色陰壞瘡中生苦覺故名為壞苦緣是以三覺次第生三心故為苦苦苦若佛子三句標顯名德位以明加行心之義善慧體性地者善者能也慧者明也謂此菩薩善修清淨法身平等大慧名善慧地別經名離垢地因中持戒梵行清白體離垢染名離垢地清淨明達即善慧離垢義正明所證所得體用清淨即所證法身理明達即能證菩提智一切善根乃智用也所謂等下出善根也何等善根所謂慈悲喜捨慧也慈者與衆生樂悲者能拔其苦喜者慶悅自他捨者自他解脫慧者鑒機說法一切功德本者如是五觀一切諸佛菩薩六度四攝三身四智無量恆沙稱性功德皆以四無量心慧五觀法門而為根本故云一切功德本也從觀入大空慧者申明慈等五觀之義大空慧者是佛所證甚深無相大空般若智體圓照法界心佛衆生三無差別無苦無樂無生無滅一切衆生迷而不覺是故菩薩興慈運悲拔苦與樂從此觀入大空慧體依體所起方便道智用中觀見三界二十五有四生六道十二類生迷本大空慧體認妄緣心起識分別造貪瞋癡殺盜淫等輕重善惡業輪墮在六道輪回三有此等衆生未出三界火宅六道俱苦故云無非苦諦推其苦諦因緣皆由六識造業六識受報故云皆有識心六道之中三善且置就三惡道而言地獄餓鬼畜生舉受刀杖二境以例一切極苦逼惱緣中生識以識未空故名苦諦其苦無量總三苦攝行苦苦苦壞苦如是三苦相者互為因緣由過去業感現五蘊有漏色身五陰遷流四相不停名為行苦更加六塵苦境觸心苦受相應難堪難忍是名苦苦一期壽終四大將散難割難捨是名壞苦三苦展轉無有間斷非大智慧人不能了知此三苦相虗空不實初發明行苦相如者指定之詞謂如身根初覺云何初覺從外刀杖境緣內具有情身根色陰於是根境二緣相觸其中觸令生覺此覺未別苦樂只有隨念而無計度但名為行苦緣所以前五識心為第六明了門第六識心為前五分別依前五識若不照境第六即無所緣第六若不續念前五唯是現量八識俱得解脫是故前五根塵識三總為行苦緣也次意地覺者此明苦苦緣義謂第六識覺前五識所緣五塵影子一剎那間流入意地送入第八含藏頓起現行復緣前五身覺所緣得刀杖境加身及身受刀杖瘡腫等法故復覺其苦苦緣苦中又苦故云重故苦苦次受行覺二心者此明壞苦緣義行覺二心一覺身受刀杖行苦覺心二覺刀杖加身之瘡腫等法苦苦覺心此又緣向身瘡色陰將欲壞時從壞瘡中生苦覺故是名為壞苦緣是以三覺次第生三心故為苦苦苦三覺三心一行苦覺生苦覺心二苦苦覺生覺瘡腫覺心三壞苦覺即生壞苦心三心心皆苦故為苦苦苦若有靈根衆生了知三覺三苦妄身妄心如幻如化即不起惑造業當下永絶輪回雖諸苦故而即轉成自覺覺他覺行圓滿即與諸佛菩薩無二無別上之三苦以明菩薩觀智悲心下之三苦乃明菩薩現身益物之義一切有心衆生見是三苦起無量苦惱因緣故我於是中入教化道三昧現一切色身於六道中十種辨才說諸法門謂苦識苦緣刀杖緣具苦識行身瘡腫發壞內外觸中或具不具具二緣中生識識作識受觸識名為苦識行二緣故心心緣色心觸觸惱受煩毒時為苦苦心緣識初在根覺緣名為苦覺心作心受觸識覺觸未受煩毒時是名行苦逼迮生覺如斫石火於身心念念生滅身散壞轉變化識入壞緣緣集散心苦心惱受念後緣染著心心不捨是為壞苦三界一切苦諦此釋住無間心以顯悲心觀行益物之義一切有心衆生即指四生六道十二類生揀非無情所謂但有心者皆當作佛此等衆生皆繇不能了達此苦幻妄非實見是三苦反起無量苦惱因緣造諸惡業以致生生死死死死生生如旋火輪無有休息故此菩薩於諸衆生無量苦惱緣中興慈運悲起同事攝入教化道三昧示現一切色身於六道中以十種妙辨才說諸苦集滅道四諦法門先示以苦諦相欲令一切衆生始知是苦厭苦求樂斷集修道證滅諦也何等為苦諦相耶謂苦識苦緣乃至瘡腫發壞等相也苦識即前五識為第六受苦門戶故云苦識苦緣即內五根身緣以身為衆苦本故云苦緣刀杖緣者即外境緣以境有牽心業用故云刀杖緣具字貫上貫下貫上苦識根緣貫下瘡腫發壞等言具苦識行者即行苦緣身瘡腫者即苦苦緣發壞二字即壞苦緣此總明三苦相此三苦相必具內外觸中內即根識外即境識內外衆緣和合觸中而成此苦故云內外觸中所謂眼識九緣生耳識唯從八鼻舌身三七後三五三四若加等無間從頭各增一以有為法仗因托緣缺則不生即是此義是故或衆緣具而成此苦衆緣不具則此不成初明具二緣中生識雖緣即根境二此二和中前生五識此識雖生性非恆一有間斷故不造不受此苦唯是第六識造業還是六識受報故云識作識受向下展轉辨明造與不造問何故前五不造答前五觸識觸令而生故云觸識此識無籌度心只名為苦識行秪具根境二緣故不造不受也與上行苦緣照應心心緣色等者由六識心此心緣上色陰瘡腫等法緣一觸一心觸心惱此已深受煩毒時二苦交煎故為苦苦與上重故苦苦照應心緣識者此釋造受緣起謂六識心緣五識心初在五根覺緣刀杖加身一念未起分別故只名為苦識由六識心不了目前虗幻妄境反被境風鼓蕩起心取著造作業苦心自領受故云心作心受言觸識覺觸者此言前五觸識唯覺觸境未曾深受煩苦毒時不造不受是只名為行苦一種故云觸識覺觸逼迮生覺者此以法喻合明釋上心作心受言造業者為第六心繇前五識緣現逆順影子一剎那間流入意地逼迮生覺心受煩毒譬如斫石中火旋斫旋出於身心中遷流不停念念生滅故云逼迮生覺已上明前五不造惟第六也身散壞者謂命盡時四大各離身色散壞轉變遷化故令阿賴耶識隨業牽引入於壞緣所謂因緣和合虗妄有生因緣別離虗妄名滅生從順習死從變流臨命終時未捨暖觸心苦心惱惟受最後一念染緣深染深著心心念念不能捨離是為壞苦與上壞苦緣照應如此三苦為衆苦本三界衆生俱未解脫故云三界一切苦諦此說苦諦法門向下明集道滅三諦法門也復觀無明集無量心作一切業相續相連集因集因名為集諦正見解脫空空智道心心名以智道道諦盡有果報盡有因清淨一照體性妙智寂滅一諦慧品具足名根一切慧性起空入觀是初善根此推苦諦之因令其知苦斷集修道證滅離苦得樂之義言復觀者返推其因言此等苦從何而有謂依無明幻妄所起故有此苦其無明者即不明也以是真如不守自性一念妄動生起三細不了前境增長六粗故曰無明因有無明遂集無量種種妄想攀緣之心造作一切諸惡業緣招引苦果相續相連過去之因感現在果現在之因招未來果如是集因集因以集三界因果名為集諦言正見解脫者此說道諦法門也謂上既知諸苦繇依無明集諦招感所生必破無明斷集諦因方得解脫欲斷集因須修道品即以正知正見識得自己本元心地看破妄身妄心遠離邪念了達緣生空幻不起惑不造業則不感果而得解脫故云正見解脫解脫則空以是空空妙智修諸道品念念心心入於智道是名以修智道名為道諦盡有果報等者此說滅諦法門也承上繇修道諦方能盡有果報盡有因也因果不忘為有以欲色界及無色界見思等惑流轉三界不能出離一切諸苦故名為有而以正知正見修行聖道不起貪瞋癡慢疑不起身邊諸邪見是以三界二十五有見惑思惑塵沙等惑苦果苦因悉皆空寂以空寂故清淨一照體性妙智體本清淨性離諸垢以此妙智照達一切因果皆空證空空寂滅之理名為寂滅一諦以上四諦文竟下文總結悲觀以顯慧為根本之義慧品具足名根者謂即大空慧品具足慈悲喜捨六度四攝無量功德方便行門皆依大空慧品為其根本故云慧品具足名根一切慧性起空入觀者此二句義謂上既即慈悲喜捨一切慧性皆依大空慧中起空入觀現身六道為諸苦惱衆生說示四諦法門使諸衆生知苦斷集修道證滅是名初善根也第二觀捨一切貪著行一切平等空捨無緣而觀諸法空際一相我觀一切十方地土皆吾昔身所用故土四大海水是吾故水一切劫火是吾昔身故所用火一切風輪是吾故所用氣我今入此地中法身滿足捨吾故身畢竟不受四大分段不淨故身是為捨品具足此釋捨觀法門也蓋我為汝所說四諦法門是我昔日知迷而捨故得解脫寂滅可證是故今以勸汝而亦隨修證也言所捨者是何物耶是捨無始已來為凡夫時妄想所起一切種種貪愛執著諸惡行法以昔有貪愛故為說修行解脫法門以貪愛與解脫俱屬對待不平等故今已一切捨去則一切法悉皆平等以平等故能捨所捨二緣性空故云捨無緣也繇是而觀染淨諸法空際一相平等理中無相可得所以我觀一切十方地土皆吾昔身所用故土四大海水是吾昔身所用故水一切劫火是吾昔身所用故火一切風輪是吾昔身所用故氣我今入此離垢地中法身滿足捨吾故身也言法身滿足者即此離垢地位所證最勝真如法性之身三德圓滿三身具足故云法身滿足捨吾故身等者即此位中所斷邪行障也以斷障證真故所以畢竟不受四大分段不淨雜染故身故云捨吾故身以不受故是為捨品具足此是第二觀捨善根義也第三次觀於所化一切衆生與人天樂十地樂離十惡畏樂得妙華三昧樂乃至佛樂如是觀者慈品具足此釋慈觀之義第三次觀等者蓋謂諸佛菩薩說法利生必隨機宜而與之樂故次觀於所化一切衆生種種根性如求人天樂者則與三皈五戒十善令其得生人天道果受勝妙樂如求菩薩乘者則與六度四攝法等令其得證十地之樂離十惡畏樂者往昔以造三業不淨必墮三塗怖畏之中反此十惡令修十善得生人天受十善樂故云離十惡畏樂得妙華三昧樂者發菩薩心修菩薩道萬行因華三昧正定乘此智定證十地果故得妙華三昧之樂乃至令得佛果無餘涅槃究竟之樂如是觀者是為慈品具足已上五段經文迭明住無間心觀行之義向下一節總結以顯解脫心義菩薩爾時住是地中無癡無貪無瞋入平等一諦智一切行本遊佛一切世界現化無量法身如一切衆生天華品說菩薩當爾之時住是第二地中慧品具足故無癡相捨品具足故無貪相慈悲喜品具足故無瞋相以無貪瞋癡故所以證入平等大空慧品一諦聖智是以平等一諦理智為一切萬行根本以是智行雙運而能游佛一切世界承事諸佛亦能現化無量法身攝受衆生也此處文義於大部中如一切衆生天華品廣說詳明三體性光明地二初明斷證義二正釋文義初明斷證義此地菩薩斷一種暗鈍鄣此聞所知障中俱生法執一分暗鈍所起以聞思修總持妙慧令不現前故名之也並斷二種愚執一者欲貪愚二者陀羅尼愚此之三法能障三地斷此愚障方登三地今此菩薩以聞持陀羅尼三慧現前便能永斷愚障既斷故名發光地所證真如名勝流真如謂此真如令所流教法極為最勝故菩薩寄位夜摩天王假修十善等法化導衆生於十波羅蜜中忍波羅蜜最勝二正釋文義若佛子菩提薩埵光明體性地以三昧解了智知三世一切佛法門十二法品名味句重誦記別直語偈不請說律戒譬喻佛界昔事方正未曾有談說是法體性名一切義別是名味句中說一切有為法分分受生初入識胎四大增長色心名六住於根中起實覺未別苦樂名觸識又覺苦樂識名三受連連覺者受無窮以欲我見戒取善惡有識初名生識終名死是十品現在苦因緣果觀是行相中道我久已離故無自體性若佛子三句標顯名德位以明加行心之義光明體性地者謂此菩薩成就勝定大法總持能發無邊智慧光明故云體性光明地別經名發光地謂以因中修習一切法界忍行之力果地開發大智慧光故名為發光地以三昧解了智至分分受生一節正明光明體性地以顯所證所得體用觀照之義言以三昧解了智者三昧即那伽定之別名也謂從此勝定發起大智慧光能解了知三世十方一切諸佛化導法門此地菩薩一一通達故名解了智也十二法品等者釋上一切佛法門義十二數也法軌則也品類從也名即名身味即文身句即句身謂佛所說一切諸佛權實法門總三藏十二部半滿法品必有文以載義繇義以成文文義相成而為經典其中名字義味音韻言句是中若事若理若因若果若權若實若顯若密以此十二部經盡其義也何名十二一曰重梵語祇夜華言應頌亦名重頌以是長行文義不盡欲被後來之機重宣義故二曰誦即修多羅華言契經上契諸佛之理下契衆生之機只有長行而無其偈如彌陀經心經等是三曰記別梵語和伽羅華言授記如來授記諸大菩薩聲聞弟子來世作佛劫國莊嚴等是四曰直語偈梵語伽陀華言諷誦亦名孤起不應長行直說偈句如金光明空品等是五曰不請說梵語優陀那華言自說無有人問如來以他心智觀衆生機而自宣說如佛頂經說五陰魔又彌陀經俱不待請自告弟子而說者是六曰律戒律戒多屬因緣梵語尼陀羅華言因緣如經中有人問故說是事如律中有持犯得失之事并制戒緣起事凡是如來所說一切根本緣起善惡因緣果報等是七曰譬喻托言訓曉為譬以淺況深為喻如來為鈍根者所設所謂諸有智者要以譬喻而得開解者是八曰佛界梵語暗羅伽華言本生謂如來說諸佛菩薩本因地中受生之事亦說自己本因地中受生之事如涅槃云比丘當知我於過去作獐作鹿作熊乃至作金輪王等是九曰昔事梵語伊帝目多伽華言本事如來說諸菩薩弟子因地為求菩提道法所行苦行之事謂如採果汲水拾薪設食布髮掩泥身為牀座然燈求偈割肉捨身乃至為金輪王捨頭千顆等是十曰方正梵語毗佛略華言大方廣大即體大方即相大廣即用大謂諸如來所說大乘方等經典其意猶如虗空廣博包含無所不攝十一曰未曾有梵語阿浮達磨華言未曾有亦名希有謂佛初生之時目顧四方周行七步足跡所蹈皆有蓮華放大光明遍照十方而發是言我是度一切生老病死苦者大地震動天雨衆華樹出音聲作天鼓樂如是希有之事凡昔未聞見者皆名希有十二曰談說梵語優波提舍華言論議謂諸經中凡有問答辨論諸法義者皆名論議如法華經智積菩薩乃與文殊師利論說妙法等是已上廣明十二部經名相向下總出十二部經之義是法等者釋承上義謂是十二法品體性等同一味實無差別因衆生心有無量心是以法門亦有無量所謂我無一切心何用一切法因有一切心故有一切法因有一切法故立一切名因有一切名故立一切義因立一切義發明一切法故云是法體性名一切義別也是名味句等者謂是十二法品名味句中差別無非發明一切衆生迷理成事迷智成識一切生滅有為諸法分分受生捨生之義欲令衆生知真本有識妄元無也初入識胎等者釋明分分受生義所言分分受生者謂初入識胎時乃是受生托質之始即行緣識分義此繇過去煩惱之惑覆於本心不了法界真如之理名為無明遂繇無明起諸妄心造作身口意等善不善行故名曰行以是無明與行二因所造惑業相牽因緣和合故令阿賴耶識投托母胎一剎那間染愛為種納想成胎故名初入識胎四大增長色心者即識緣名色分義名即是心以心但有其名無形質故色即形質即內外色地水火風四大和合漸漸增長而成身形一七名凝滑二七名胞三七名為軟肉四七名堅肉五七名為形位生諸根形手足故名四大增長色心名六住者即名色緣六入分義謂從名色已後至六七日名髮毛爪齒位至七七日名為具根形位謂以六根開張有入六塵之用乃妄心依止處故名六住於根中起實覺未別苦樂名觸識者即六入緣觸分義此即出胎已後乃至三四歲時六根對於六塵雖起覺知而未能別苦樂故名實覺因根境識三法和合相觸生覺故名觸識又覺苦樂識名三受者即觸緣受分義謂從五六歲至十二三歲時因六塵境觸對六根即能領受如對苦境時即覺是苦是名苦受對樂境時即知是樂名為樂受如苦樂不對時即覺不苦不樂是名平平之受雖云了別六塵粗境然未能起貪淫之心只名為受故曰又覺苦樂識名三受也此上五支是現在果連連覺著受無窮者即受緣愛分義謂從十四五歲至十八九歲時連連起心貪著淫欲等境故云連連覺著受無窮以欲我見戒取者即愛緣取分義謂從二十歲後繇有諸欲助發愛性種種取捨執我執人深生貪取及信邪師而起邪見持邪見戒望取生天其中所該五鈍五利十使煩惱故名以欲我見戒取善惡有者即取緣有分義謂因六識馳求諸境起造善惡引滿二業積集三有之因牽引阿賴耶識又受當生三有果報故名善惡有也此愛取有三支是現在因識初名生者即有緣生分義謂既現在所造善惡業因必受來世善惡業果故使賴耶隨善惡業六道受生此識最先投胎故云識初名生識終名死者即生緣老死分義謂從來世受生已後五蘊身相熟已還壞一期壽命盡矣此識最後而捨故云識終名死此生死二法雖曰來世之果乃約現在之因而言實該三世生滅去來受生捨法之義所謂去後來先作主公也是十品現在苦因緣果者此句總結上文謂以無明與行是過去二支因繇過去因感現在果今只所言現在因果不言過去二因者何以果該因佛欲現前諸人即識現前苦果苦因無使再造有漏苦因永滅當來苦果故也觀是行相中道我已久離者謂一切衆生雖有生滅去來不知如來藏中求於去來迷悟生死實不可得所以菩薩智慧觀察已證入法界中道理中無有生死無有去來故云我已久離無自體性入光明神通總持辨才心心行空而十方佛土中現劫化轉化百劫千劫國土中養神通禮敬佛前咨受法言復現六道身一音中說無量法品而衆生各自分分得聞心所欲之法苦空無常無我一諦之音國土不同身心別化此釋住無間心也所言現在十品苦因緣果我已久離故者今得證入光明體性地中具足游戲神通陀羅尼總持門無礙辨才大智慧門雖得如是境界而心心行空是以能於十方佛國土中現身現劫現化展轉變化促住則百劫住延則千劫住於國土中長養神通禮敬佛前咨受法言復能現六道身假同事法攝化衆生以一音中說無量法門品而隨衆生各自分分得聞心所欲法苦空無常無我一諦之音所謂圓音一演異類等解此也其苦等者此即身受心法四念處行苦者衆苦也即觀受是苦義衆生顛倒以苦為樂故令衆生觀受是苦得寂滅樂也空者即觀身是空義謂內身外道皆攬父母不淨精血集聚四大而成其身從頭至足悉皆不淨衆生顛倒執之為淨心生貪著故令衆生觀身是空證清淨法身也無常者即觀心無常義心即第六識心謂此心性流動念念生滅皆悉無常衆生顛倒計以為心故令衆生觀心無常證常住真心也無我者即觀法無我義謂一切法若善若惡衆生顛倒妄認一切諸法有我故令衆生觀法無我證無生我也故云苦空無常無我一諦之音者謂苦空等雖云四法實從一諦音中演出惟此一諦無二無三因衆生國土依正不同故此菩薩示現身心亦隨機差別而攝化之故云身心別化所謂佛身充滿於法界普現一切羣生前隨緣赴感靡不周而恆處此菩提座正合此意是妙華光明地中略開一毛頭許如法品解觀法門千三昧品說此總結當地功德說不能盡以明解脫心也是妙華等者謂是妙華光明地中所有功德行願如海藏等不可言說此中但略開一二如毛頭許相似若廣說者於大部內如法品中解觀法門千三昧品二文所說四體性爾𦦨地二初明斷證義二正釋文義初明斷證義此地菩薩斷一種微細煩惱現行障此即所知障中俱生一分微細無明之惑現起故名之也又斷二種愚執一者等至愛愚二者法愛愚斷此愚障方登𦦨慧地謂此菩薩初入證智善修三十七品菩提分法能起𦦨慧智火燒一切根本煩惱及隨煩惱之薪便能永斷愚障既斷智火最勝故名𦦨慧地所證真如名無攝受真如謂此真如無我執等所依取故菩薩位寄兜率天王假修三乘等法化導衆生於十波羅蜜中精進波羅蜜最勝二正釋文義若佛子菩提薩埵體性地中爾真𦦨俗不斷不常即生即住即滅一世一時一有種異異現異故因緣中道非一非二非善非惡非凡非佛故佛界凡界一一是名為世諦其智道觀無一無二玄道定品所謂說佛心行初覺定因信覺思覺靜覺上覺念覺慧覺觀覺猗覺樂覺捨覺是品品方便道心心入定果若佛子三句標顯名德位以明加行心義菩薩因中修習無邊菩提分法大精進力故果地中雙照平等名體性爾𦦨地別經名𦦨慧地謂為𦦨自在故爾真𦦨俗等者正明爾𦦨地中體用觀照法門謂此地中𦦨慧增勝為𦦨自在故能率爾照真了真照俗了俗照真了真故不斷照俗了俗故不常所謂般若無相二諦常然以其不斷不常故即生即住即滅以即生即住即滅故一世一時一有也一世者三相平等故一時者劫量平等故一有者諸法平等故種異異現異故者謂真性平等元無差別所以有差別者蓋即能熏種子之異種子既異則所熏起現行亦異故也然種異現異但隨因緣和合而有因緣別離而無而本真如自性不屬因緣有無變易是因緣不遷不變之體名為中道以是中道非一非二云何非一真如不變隨緣故非一也云何非二隨緣不變真如故非二也瓔珞經云二諦常爾故非一聖智照空故非二既真諦俗諦非一非二即善惡凡聖等果一切皆非故佛界凡界一一皆名為世諦何故佛界亦名為世諦謂對俗言真對惡言善對凡言聖俱屬對待故耳其智道觀無一無二者菩薩以智道觀之非一非二千臂經云菩薩如是觀照寂滅中道第一義諦之理本來無一無二是也上明智慧照用相義下明定品寂滅相義玄道定品所謂說佛心行者既云無一無二云何又有菩提道法賢聖差別蓋以玄妙道法一切定品無非說佛因地心行佛心行者即菩提妙心中所起智行此乃三世諸佛一切菩薩本因地中發起始覺悟本妙覺最初入道一步下手工夫初覺本定為因一切凡夫俱迷此定無智慧覺諸佛菩薩今悟此定始覺有本故名初覺定因繇初一覺覺得自性本定實與三世諸佛等無差別一信永信永無退轉故次之曰信覺信者論云於實德能深忍樂欲心淨為性對治不信樂善為業如水清珠能清濁水所以信乃入道根本是故十覺支中信覺為第一雖然所信本定若不思惟修行終成空信故次之曰思覺思者即令心造作為性於善品等役心為業謂取境正因等相驅役自心令造諸善然雖善思若無定力所持恐屬亂思故次之以靜覺靜即定也於所觀境專注不散為性智依為業然此定力印持以靜覺中若無精進之力恐墮無記故次之以上覺上覺者即精勤心於善惡品修斷事中勇悍為性對治懈怠滿善為業然精勤不懈更當念茲在茲而不忘失故次之以念覺念者於曾習境令心明記為性定依為業然雖念心不忘必加慧心照境分明不惑故次之以慧覺慧者於所觀境揀擇為性斷疑為業然雖慧心了境無惑屬粗必須更加微細觀察故次之以觀覺觀者照察於所觀境諦審為性入理為業繇觀覺入理而身心輕安故次之以猗覺猗者即輕安也於所觀境遠離粗重調暢身心堪任為性對治惛沉轉依為業又曰離重名輕調暢名安以是輕安調適能令身心悅樂故次之以樂覺樂者即悅喜也以所證理不生顛倒為性正智如如為業以是悅樂不倒而得解脫故次之以捨覺捨者即行蘊中捨謂精進等諸根令心平等正直無功用住為性對治掉舉靜住為業此十覺支合言七覺合者以念覺合思覺以觀覺合慧覺以猗覺合靜覺此雖品品不同皆助修道法中前方便道能令行人心心念念證入定果也是人住定中𦦨𦦨見法行空若起念定入生心定生愛順道法化生名法樂忍住忍證忍寂滅忍故諸佛於入光光華三昧中現無量佛以手摩頂一音說法百千起發而不出定住定味樂定著定貪定一劫千劫中住定見佛蓮華坐說百法門是人供養聽法一劫住定時諸佛光中摩頂發起定品出相進相去向相故不沒不退不墮不住頂三昧法上樂忍永盡無餘此廣明證入定果之義是人住定中者是人即當位人此人因修道品得住定中繇住定故即從定中發起智慧光𦦨𦦨𦦨照見諸法行相蕩然一空所謂無礙清淨慧皆依禪定生也若起念定入生心者謂若起念之時無非從定入中發生一念清淨慧照之心故云定入生心定生愛順者繇定發生慧照心故得覺法樂自在三昧於是定中貪愛逸順故云定生愛順道法化生等者謂修菩提道法故名道法化生於此道法忍可於心樂可於身故名法樂忍菩薩于此忍中安住不動深證不轉以是定愛及與法愛二愛難除此地雖證寂滅而于八地等無生寂滅二忍未獲是故諸佛大悲心念無緣慈力於入光光三昧中現無量佛各以右手摩頂安慰而加被之一音說法百千方便勸發而是菩薩亦不出定何故以住定味定樂定著定貪定故也初住名住住已有滋名味定得味安然名樂定執樂為實名著定著而固守名貪定於是乎根利者住定一劫障深者千劫中住定即定為行定中發光光中見佛在寶蓮華上坐為諸衆生說心地等百法明門是菩薩人興諸供養聽受妙法信念長遠一劫住定廣修福慧日深日厚得與諸佛心相體性入出無難時感諸佛復於光光華三昧中以手摩頂二番加勸方始發起利生定品於光光華三昧者以二光破二障以福花滅罪花以三昧安心摩頂安身於是身心安隱爾時菩薩受摩頂職得大解脫即時發起定品現身益物故有出相進相去向相也出即起定進即入定去即應現向即方所所謂東方入定西方起南方入定北方起童子身中入正定童女身中從定起乃至眼入耳出等是也故於此定知出而不沒知進而不退知去而不墮知向而不住所以不住頂三昧即法上樂忍亦復不住如是定愛及與法愛二障俱離故曰永盡無餘即入一切佛土中修行無量功德品行行皆光明入善權方便教化一切衆生能使得見佛體性常樂我淨此釋住無問心義也承上繇不住定愛即能現身入一切佛國土中承事十方諸佛勇猛精進更加修行無量無邊一切功德法品行行皆大光明行光明者即智行雙運也以不住法愛故即入種種善根方便教化一切衆生能使一切得見諸佛體性不止得見而已亦令證此如來真常真樂真我真淨之四德也是人生住是地中行化法門漸漸深妙空華觀智入體性中道一切法門品滿足猶如金剛上日月道品已明斯義此結當地功德智慧不可思議以明解脫心之義也是人生住等者言此菩薩既生是地亦住是中於此地中所證度生一切行化法門從此而去漸漸深妙難可測量菩薩所證空華觀智入諸佛體性中道一合而行所以一切諸佛法門品皆得圓滿具足也此處略說大部內喻如金剛上日月道品中已更廣明斯義五體性慧照地二初明斷證義二正釋文義初明斷證義此地斷一種下乘涅槃障此即所知障中俱生一分厭生死苦趣涅槃樂依彼所起故名之也並斷二種愚執一純作意背生死愚二純作意向涅槃愚此之三法能障五地斷此愚障方登難勝地菩薩今修菩提分法二智圓通真俗無礙能合難合無差別道便能永斷愚障既斷故名難勝地所證真如名類無差別真如謂此真如於生死及涅槃其類平等無差別故菩薩位寄化樂天王假修三乘等法化導衆生於十波羅蜜中禪波羅蜜最勝二正釋文義若佛子菩提薩埵慧照體性地法有十種力生品起一切功德行以一慧方便知善惡二業別行處力品善作惡作業智力品一切欲求願六道生生果欲力品六道性分別不同性力品一切善惡根一一不同根力品邪定正定不定是名定力品一切因果乘是因乘是果至果處乘因道是道力品五眼知一切法見一切受生故天眼力品百劫事一一知宿世力品於一切生煩惱滅一切受無明滅解脫力品是十力品智知自修因果亦知一切衆生因果分別若佛子三句標顯名德位以明加行心之義慧照體性地者謂此菩薩因中修習不可言說深禪大定之力故果地中乃得諸諦相應之慧圓照法界故云慧照體性地別經名難勝地是以二諦難合合此難合令其相應故名難勝地法有十種力生品者乃明所證之法謂此地中所證真如大法有十種力生品能起一切衆生世出世間無量功德行品皆以一慧方便所起上明所證十力之體向下釋明十力之用一知善惡二業別行處力品者謂此智力善能了知一切衆生作善作惡因緣果報差別處也所言差別處者謂作善業不得善報反招惡報及作惡業不得惡報反招善報問何修善者反招惡報答即如印經造像齊僧建會是修善也其中非是真實建立三寶乃是假公濟私誣因昧果故修善得不善報也所謂天堂未就地獄先成即此云何作惡反招善報如除惡人惡獸破壞外道和合乃至殺一闡提是作惡也其中非是實為惱害衆生乃是殺一救多除害興善正是菩薩大悲所為如此作惡是故無惡報也所謂慈心殺人越多生者即此如是差別行處一一為衆生說故云別行處力品也二知善作惡作業智力品者謂此智力能了知一切衆生三世所作善惡諸業諸受因果或受長壽報時而為短壽或受短壽報時而為長壽或富而貧或貧而富何也此業果報總在積因損因積德損德以轉變之所謂因德延壽損德而促壽也又般若云是人先世所造惡業餘業未盡命終應墮惡道以今持經功德先世罪業即為消滅不但不墮惡道當得菩提此乃出世法力廣大因故所以不可不修世出世善因也如是定與不定一一為衆生說故云業智力品三知一切衆生欲求願六道生生果欲力品者謂此智力能了知一切衆生心中所欲所求所願一切欲者即樂欲也謂或常欲供養三寶天地君王父母師長親近善友常報恩德或常欲念財色名食睡等一切求者即乞求也謂或樂求好師好友或求名聞利養或求功名富貴乃至求生好子孫等一切願者即願要也謂或願生西方成佛度生或願生天生人乃至願生地獄餓鬼畜生是名一切願求願六道生生果如是差別一一為衆生說故云欲力品也四知六道性分別不同性力品者謂此智力善能了知一切衆生性分不同或利或鈍得果大小上中下別一生二生三四五生當得菩提如是一一為衆生說故云性力品也五知一切善惡根一一不同根力品者謂此智力能善了知一切衆生根界差別云何差別謂善種子起善現行不善種子即起不善現行此善惡根有輕有重輕者易受教化重者難受教化易受化者如善來諸比丘袈裟著身鬚髮自落等也難受化者如城東老母等如是根界差別一一為衆生說故云根力品也六知邪定正定不定是名定力品者謂此智力善能了知一切外道邪定小乘偏定菩薩正定凡夫不定一一通達為衆生說故云是名定力品也七知一切因果乘是因乘是果至果處乘因道是道力品者言此智品了知六道乘有漏因至有漏果乘無漏因至無漏果以至果處而乘因道一一了達為衆生說是名道力品八五眼知一切法見一切受生故天眼力品者其眼有五謂天眼通非礙肉眼閡非通法眼惟觀俗慧眼只緣空佛眼如千日照異體還同此舉天眼而言謂證知天眼徹見現前一切世間根塵染淨差別等法並見一切衆生以隨善惡業緣受報好醜生時死時一一示諸衆生故云天眼力品九知百劫事一一知宿世力品者言此智力了知一切衆生種種宿命百千萬億劫前死此生彼姓族名字苦樂壽命如實為衆生說故云宿世力品十知於一切生煩惱滅一切受無明滅解脫力品者言此智力了知於一切生煩惱因滅一切受無明果滅煩惱無明一切習氣因果滅盡如實為衆生說故云解脫力品如是十力品智知自身修因果亦知一切衆生所修因果分別明了無差錯故此十種智前五了知衆生生滅因緣後五了知衆生還滅因緣而身心口別用以淨國土為惡國土以惡國土為妙樂國土能轉善作惡轉惡作善色為非色非色為色以男為女以女為男以六道為非六道非六道為六道乃至地水火風非地水火風是人爾時以大方便力從一切衆生而見不可思議下地所不能知覺舉足下足事此釋住無間心也以顯此地體用不可思議不但所得十力智品而已其身心口更有差別妙用不可測也而身心口別用等者以身能現通心能繫念口能說法此即三輪妙用之力故云而身心口別用以是三輪妙用力故能以常寂光淨土示為五趣雜居地即能以五趣雜居土為極樂國土以是國土本無差別但隨衆生一一變現故云以淨國土為惡國土以惡國土為淨妙國土法華三變淨土是也能轉善作惡者如無厭足王是能轉惡作善者如廣額屠兒是色為非色非色為色者如放光散花東涌西沒西涌東沒種種神變等是以男為女者如舍利弗被天女一指轉為女人相者是以女為男者如法華龍女倐轉為男於無垢世界成佛者是以六道為非六道非六道為六道者六道即凡非六道即聖即如面然大士等是乃至地水火風非地水火風者其中足一句應云非地水火風為地水火風如以十八神變身為水火擔負乾草入中不燒等是已上善惡等性一一皆不可得若有定性則不能轉如是種種自在神用皆是菩薩大方便智力用所作任從一切衆生見之而皆使頓入不可思議也不但下凡衆生見而不可思議即前下地諸菩薩等皆所不能知覺菩薩舉足下足之事所謂初地不知二地事也是人大明智漸漸進分分智光光無量無量不可說不可說法門現在前行此結當地功德不可思議以明解脫心也承上而言下地所不能知者何也謂此菩薩大明慧智漸漸深遠上進以能分分證入諸佛一切種智所證智光之光無量無量及一切不可說不可說種種法門如是一時一一現在前行是豈凡小心識所能思量言議者哉六體性華光地二初明斷證義二正釋文義初明斷證義此地斷一種粗相現行障此即所知障中俱生一分執有染淨粗相現行所起故名之也並斷二種愚執一者現觀察行流轉愚二者相多現行愚此之三法能障現前地斷此愚障方登現前地今知一切法無有染淨住無相作意令真如圓滿便能永斷愚障既斷般若現前故名現前地所證真如名無染淨真如謂此真如體性無染淨故菩薩位寄自在天王假修三乘等法化導衆生於十波羅蜜中般若波羅蜜最勝二正釋文義若佛子菩提薩埵體性華光地能於一切世界中十神通明智品以示一切衆生種種變化以天眼明智知三世國土中微塵等一切色分分成六道衆生身一一身微塵細色成大色分分知以天耳智知十方三世六道衆生苦樂音聲非非音非非聲一切法聲以天身智知一切色色非色非男非女形於一念中遍十方三世國土劫量大小國土中微塵身以天他心智知三世衆生心中所行十方六道中一切衆生心心所念苦樂善惡等事以天人智知十方三世國土中一切衆生宿世苦樂受命一一知命續百劫若佛子三句標顯名德位以明加行心之義體性華光地者謂此菩薩因中修習無量智慧故果地中得證諸佛般若波羅蜜多大智行華一時開敷故云體性華光地別經名現前地謂本一切功德智慧俱得現前故名現前地能於一切世界中至百千大願品具足一節此釋住無間心也菩薩住是地中能於十方一切世界之中而運十種神通大明智品以示一切衆生種種變化一切難可測量也何名十種明智品一以天眼明智者即天眼通謂此智品能了知十方三世國土中色微塵等分地水火風一切四大幻色分分聚成六道衆生身相而其一一分段身中毛孔等色分際皆知是幾微塵細色而成一身形體大色如此分分色相一一了知而不錯故二以天耳智者即天耳通謂得此智能聞知十方三世六道衆生身心逼悅受苦受樂所出音聲非非受苦樂音非非受苦樂聲乃至一切江河湖海水流風動鐘鈴鑼鼓種種諸法音聲一一知故三以天身智者即色身通謂得此智能覺知一切色色非色言色色者即諸衆生依報國土境色正報身體根色如是根境諸內外色是名色色言非色者即佛所住真如法性土色及佛光明遍照清淨法性身色故云非色非男非女形者謂色既非色故男女等相一切皆非如是一切色色非色等形於一念中遍知及知十方三世國土劫量大小延促長短及國土中微塵等身四以天他心智者即他心通謂得此智能了知過現未來三世衆生心中所行及十方六道中一切衆生心心所念若念苦樂善惡等事五以天人智者即宿命通謂得此智即能了知十方三世國土之中一切衆生宿世善惡業因感現前苦樂受命果報能一一知及其受命長短相續百劫等事一一明了為衆生說已上五智以知世諦緣起無有染相可得向下五智以知真諦解脫緣滅亦無淨相可得以天解脫智知十方三世衆生解脫斷除一切煩惱若多若少從一地乃至十地滅滅皆盡以天定心智知十方三世國土中衆生心定不定非定非不定起定方法有所攝受三昧百三昧以天覺智知一切衆生已成佛未成佛乃至六道一切人心心亦知十方佛心中所說之法以天念智知百劫千劫大小劫中一切衆生受命命久近以天願智知一切衆生賢聖十地三十心中一一行願若求苦樂若法非法一切求十願百千大願品具足此釋後五品智也以下所言衆生皆指賢聖與上不同六以天解脫智者即滅盡通謂得此智了知十方三世衆生解脫隨其智量斷除一切煩惱若多若少其從一地乃至十地次第斷證以除一分無明惑障得證一分真如妙理終極金剛究竟滅滅皆盡無餘如是種種解脫一一知故七以天定心智者即神境通謂得此智了知十方三世國土中衆生其心定與不定非定非不定者及諸起定方法有所攝受三昧及百三昧一切禪定等法一一知故八以天覺智即言音通此智了知一切衆生已成佛者未成佛者乃至六道一切人之心心所念如法華云知諸衆生種相體性念何事思何事修何事等不但知諸衆生心心所念亦知十方諸佛心中隨為衆生根行所說九以天念智即未來通此智了知百劫千劫大小劫中一切衆生受命命之久近劫量差別而此時劫本無延促但隨衆生煩惱輕重厚薄不一是故劫量亦有長短大小不等一切衆生受命亦有久近增減不一如是命劫一一遍知所謂一念普觀無量劫也十以天願智即無作通此智了知一切賢聖衆生一一所修行門一一所發大願若求苦樂其求苦者即如藥王燒身然臂不輕所受杖木打擲阿難五濁誓願先入等是其求樂者如韋提希願生樂土法藏比丘誓願衆生咸生安養等是其求法者即以權實顯密正教等法其非法者即為天魔外道邪教等法乃至願為閻羅天子制諸罪人皆名非法者是一切求者總結上求下化無所不求十願如普賢願王與十無盡句乃至諸佛無量無邊百千大願品此地菩薩一一具足而悉知之是人住地中十神通明中現無量身心口別用說地功德百千萬劫不可窮盡而爾所釋迦略開神通明品如觀十二因緣品中說此結當位智德以明解脫心也是人住地中者結本體性華光地名十神通明中等二句結上十種智品三輪差別妙用德也說地功德三句總結當地功德甚深無量無窮無盡不可說不可說百千萬億劫數說不能盡之義而爾所釋迦牟尼如來但以略開此地神通明智品耳此處所說在大部內如觀十二因緣品中所說無有差別七體性滿足地二初明斷證義二正釋文義初明斷證義此地菩薩斷一種細相現行障此即所知障中俱生一分執有生滅細相現行所起故名之也並斷二種愚執一者細相現行愚二者純作意求無相愚繇有此之三法能障遠行地斷此愚障方登第七地今遠三界近法王位行過二乘善修無相到無相邊功用至極望前過遠故名遠行地便能永斷愚障既斷所證真如名法無差別真如謂此真如能了種種教法皆同真如不無相故菩薩位寄初禪天王假修三乘等法化導衆生於十波羅蜜中方便波羅蜜最勝二正釋文義若佛子菩提薩埵滿足體性地入是法中十八聖人智品下地所不共所謂身無漏過口無語罪念無失念離八法一切法中捨常在三昧是入地六品具足復從是智生六足智三界結習畢竟不受故欲具足一切功德一切法門所求滿故進心足一切法事一切劫事一切衆生事以一心中一時知故念心足是二諦相六道衆生一切法故智慧足知十法趣人乃至一切佛無結無習故解脫足見一切衆生知他人自我弟子無漏無諸煩惱習故以智知他身六通足是人入六滿足明智中便起智身隨六道衆生心行口辨說無量法門品示一切衆生故隨一切衆生心行常入三昧而十方大地動虗空化華故能令衆生心行以大明智具足見過去一切劫中佛出世亦是示一切衆生心以無著智見現在十方一切國土中一切佛一切衆生心心所行以神通道智見未來中一切劫一切佛出世一切衆生從是佛受道聽法故若佛子三句標顯名德位以明加行心也滿足體性地者因中修方便度故果地中證得如來一切智行圓滿具足故名滿足體性地別經名遠行地此菩薩出三界河過二乘地到涅槃城近法王位故名遠行地入是法中等者標所證之法也謂入滿足體性法中已是如來十八聖人智品不與二乘權小所共不但不於此共即下地諸菩薩亦所不及故云十八不共何名十八聖智一身無漏過者亦名身無失謂此菩薩從無始來常以諸戒修其身心一切煩惱等障淨盡無餘以是身業清淨得大神通故云身無漏過也二口無語罪者亦名口無失謂此菩薩從無量劫常以五語隨諸衆生方便為說種種妙法令得道果是以口業清淨故云口無語罪也三念無失念者亦名意無失謂此菩薩從無始來常修諸禪心無所著意無放逸但隨衆生機宜方便攝化是以意業清淨故云念無失念也四離八法者亦名無異想心謂此菩薩從因地來但於衆生方便教化已離凡夫及以二乘執有有相執無無相執常常見執斷斷見以是心無八種顛倒故云離八法也五一切法中捨者亦名無不知捨心謂此菩薩從無始來以大般若照察世出世間一切染淨諸法當體全空了不可得以是心無貪著故云一切法中捨也六常住三昧者亦名無不定心謂此菩薩從無始來常恆不離甚深大定但隨衆生隱顯攝化故云常在三昧也是入地六品者結前六品智也復從是智等者起後六品智也謂繇具足六品智體復從是智生六滿足智用何名六智一欲具足者亦名欲無減謂此菩薩示生三界攝化衆生於三界結習煩惱畢竟不受故云欲具足也二進心足者亦名精進無減謂此菩薩於諸如來一切智慧諸功德藏一切化導方便法門所求圓滿具足故云進心足也三念心足者亦名念無減謂此菩薩能了達世出世間一切安立法事一切劫量長短大小延促等事一切衆生因緣果報受命長短苦樂等事一切衆生心念等事以一心中一時了知故云念心足也四智慧足者亦名智慧無減謂此菩薩能了達真俗二諦有無二相六道衆生一切心念因果等法一一為衆生說故云智慧足也五解脫足者亦名解脫無減謂此菩薩能知十發趣人乃至一切諸佛斷除一切煩惱無明結習滅盡無餘故云解脫足也六六通足者亦名解脫知見無減謂此菩薩具足天眼天耳他心漏盡神境如意之六通故所以徹見一切賢聖六道衆生並能了知一切他人自我所化弟子無漏無諸煩惱習故繇是以智知他身相及自身相故云六神足也是人等下結前六足智也便起智身等者起後六智也是菩薩人不止已入六滿足明智中而已復更具足六種智用何為六智一便起智身隨六道衆生心行者亦名身業隨智慧行謂此菩薩方便運起智身隨智而轉普為六道衆生現神變相調伏衆生種種心行令其各得見相解悟證入道果故云便起身等二口辨說無量法門品示一切衆生故隨一切衆生心行者亦名口業隨智慧行謂此菩薩能以清淨微妙語業隨智而轉隨順一切衆生心行善巧開導令得解悟證入道果故云口辨說等三隨一切衆生心行常入三昧者亦名意業隨智慧行謂此菩薩以清淨意業隨智而轉順一切衆生心行常入三昧觀根逗教而為說法除滅衆生無明癡暗是以三輪業用定慧圓明是故十方大地六返震動虗空之中天雨四華能令衆生開悟心行故云隨一切衆生心行等四以大明智具足見過去一切劫中佛出世亦是示一切衆生心者亦名過去無礙智謂此菩薩以大明智了見過去世時一切無量無邊說不可說劫中所有一切諸佛出世為一切衆生說法是諸衆生從是諸佛受道聽法悉能遍知以此開示現前一切衆生心行令各各悟入故五以無著智見現在十方一切國土中一切佛一切衆生心心所行者亦名現在無礙智謂此菩薩以無著智見現在世十方所有一切國土之中一切諸佛出世為一切衆生說種種法是諸衆生從佛聽法悉能受持心心所行亦示一切現前衆生令得開悟故六以神通道智見未來中一切劫一切佛出世一切衆生從是佛受道聽法者亦名未來無礙智謂此菩薩以神通道智照見未來世中一切劫等所有一切諸佛出世為一切衆生說種種法是諸衆生從是諸佛聽法受教亦示現前衆生令得心開以悟入故住是十八聖人中心心三昧觀三界微塵等色是我故身一切衆生是我父母而今入是地中一切功德一切神光一切佛所行法乃至八地九地中一切法門品我皆已入故於一切佛國土中示現作佛成道轉法輪示入滅度轉化他方過去來今一切國土中此明解脫心也住是十八聖人中者結前心心三昧者起後此菩薩住是十八聖人智中常以心心不離三昧正定於三昧中復觀三界微塵等色是我昔日為凡夫時所受故身復觀一切十方衆生悉皆是我無量劫中稟受色身父母經云脫骨如須彌山所飲母乳如四大海水也如是脫骨之多飲乳之廣實非一生二生父母非百生千生父母乃至百千萬億不可說劫父母繇我纍劫修行報答父母饒益衆生是故而今入是滿足體性地中具足慈悲喜捨六度萬行一切功德聚身此身能現化佛為三資糧四加行諸菩薩說四諦等法故此地具足一切神通智慧光聚是名智光聚身此身能現報佛為大菩薩說一乘法是地圓滿一切諸佛所修所證理果法身此身能為諸佛衆生依正之體三身至此圓滿具足故云滿足體性地而今入是地中一切功德一切神光一切佛所行法乃至八地九地中一切法門品我皆已得證入也於一切國土等者申明所證三身之義繇得分證三身能於一切國土中示現受生出家苦行成道作佛大轉法輪以度衆生於此應緣一期事畢乃復示現入於滅度又轉教化他方過去來今恆在一切國土之中種種示現不可思議八體性佛吼地二初明斷證義二正釋文義初明斷證義此地菩薩斷一種加行障此即所知障中俱生一分令無相觀不任運起故名之也並斷二種愚執一者無相作功用愚二者於相不自在愚此之三法能障八地斷此愚障方登不動地謂此菩薩今入無功用道得無分別智照任運相續報行純熟居無相觀不為諸法煩惱所動便能永斷愚障既斷故名不動地所證真如名不增不減真如謂此真如住無相觀不隨染淨所增減故菩薩寄位二禪天王作小千世界主以一乘法化導衆生於十波羅蜜中願波羅蜜最勝二正釋文義若佛子菩提薩埵佛吼體性地入法王位三昧其智如佛佛吼三昧故十品大明空門常現在前華光音入心三昧其空慧者謂內空慧門外空慧門有為空慧門無為空慧門性空慧門無始空慧門第一義空慧門空空慧門空空復空慧門空空復空空慧門如是十空門下地各所不知虗空平等地不可說不可說神通道智以一念智知一切法分分別異而入無量佛國土中一一佛前咨受法轉法度與一切衆生而以法藥施一切衆生為大法師為大導師破壞四魔法身具足化化入佛界若佛子三句標顯名德位以明勝進心也佛吼體性地者此菩薩說法無畏如大師吼等無差別故名佛吼體性地別經名不動地此菩薩與佛心菩提心涅槃心悉皆不起故云不動地入法王位三昧等者此顯所證法門也入即證入菩薩證入無上自覺聖智法王大樂三昧正受寶位於諸法中如法自在若出若沒心常在定故云法王位三昧其智如佛者上入法王三昧即所證無上涅槃乃法身之理聚其智如佛是能證無上菩提乃報身之智聚佛吼三昧者即法報不分三身圓現起後得智說法利生乃功德聚之化身也十品大明空門常現在前者此菩薩得證如來三身圓明四智全彰十品大明空慧智門常現在前而不即不離也華光音入心三昧者申明佛吼之義華即行華成人之德光即智光破人之障音即法音開人之迷入心即以行智法音轉入衆生心中而成正覺故云華光音入心三昧其空慧者牒定所言十品大明空慧常現在前之義何謂十品一者內空慧門謂內空五蘊之根識界衆生迷此慧門妄認四緣假合為自身相妄認六塵緣影為自心相為生死結根門為妄想煩惱門菩薩恆以智慧直照五蘊身心當體全空皆如幻夢故得證入內空慧門也二者外空慧門謂外空山河國土色等六塵諸法諸凡夫人不知皆是識心變現妄想取捨被境遷流為名相門為塵勞門菩薩恆以智慧照破六塵諸法皆無自性故得證入外空慧門也三者有為空慧門謂即總空世諦諸有為法內之根識外之世界皆屬有為衆生不知幻化不實執我我所不得解脫為生死流轉門菩薩恆以智慧照破內外諸法緣生如幻都無自性故得證入有為空慧門也四者無為空慧門即空真諦諸無為法二乘之人不知即色即空即有即無而其色空有無皆屬對待為狹劣門菩薩以深智慧照了無為之法亦皆是空故得證入無為空慧門也五者性空慧門總有為無為二性皆空謂即凡夫滯有如來說為不有二乘沉空如來說為不空以是不有而有是為妙有不空而空是為真空為隨順門菩薩以是甚深般若智照法界圓融事理一切無礙二性空寂平等平等故得證入性空慧門也六者無始空慧門謂即無始無明住地煩惱本無有根以是無明不覺瞥然現起初發心諸菩薩皆不能了為起滅門菩薩以大智慧光照一切諸法起無始相滅無終相起滅之際無法可得故得證入無始空慧門也七者第一義空慧門即中道理名第一義諦因對第二義假立名言為勝義門菩薩以是如理智照勝義諦門悉同真性無相可得不居二邊不存中道故得證入第一義空慧門也八者空空慧門謂即空上第一義空之空為重空門菩薩即以空空智照此空亦復不存故得證入空空慧門也九者空空復空慧門謂即空上空第一義空之空為重空重空門菩薩以是空空復空智照此空空亦復空故得證入空空復空慧門也十者空空復空空慧門謂即空上空空復空之空是名為究竟一切空空復空空門此空亦復當空以是無空之空空無所空是則無所得空故得證入空空復空空慧門也如是十空慧門惟此八地所證下地諸菩薩等各所不知也言虗空平等地者此舉位分以顯德也蓋言下地各所不能知者謂此菩薩得證虗空平等地理智不但十空而已更有不可說不可說神通道智門而下地諸菩薩猶不能知也神謂神妙難測通謂變通無礙道即道理難窮智即智慧無量所謂佛真法身猶如虗空應物現形如水中月種種神通道智皆悉平等故能以一念智悉皆了知一切染淨諸法分分別異隨根施攝而復能入無量佛國土中承事諸佛一一佛前咨受聽法勇猛精進復轉不退法輪度與一切衆生而以法藥施及一切衆生是故為大法師為大導師破壞四魔四魔既破法身具足以法身具足故而能展轉化化入於佛界是諸佛數是諸九地十地數中長養法身百千陀羅尼門百千三昧門百千金剛門百千神通門百千解脫門如是百千虗空平等門中而大自在一念一時行劫說非劫非劫說劫非道說道道說非道非六道衆生說六道衆生六道衆生說非六道衆生非佛說佛佛說非佛而入出諸佛體性三昧中反照順照逆照前照後照因照果照空照有照第一中道義諦照是智惟八地所證下地所不及不動不到不出不入不生不滅此明住無間心也是諸佛數等者謂此菩薩即是諸佛之數即是九地十地數中長養法身即得百千陀羅尼總持門百千三昧正定門百千金剛不壞門百千神通變化門百千解脫方便門如是百千種種法門於虗空平等門中得大自在云何自在於一念一時皆能行故也仁王般若云不動菩薩二禪王得變易身常自在能於百萬微塵剎隨其形類化衆生悉知三世無量劫於第一義常不動是也劫說非劫等者申明自在之義言劫說非劫非劫說劫者梵語劫波羅此云時分言劫有大小長短時分不同如諸天有拂石劫地獄有芥城劫人間有轆轤劫菩薩修行究竟經過三大阿僧祇劫斷盡無明之時方得成佛是名為劫如是等劫本非實有名為非劫故云劫說非劫非劫說劫也非道說道道說非道者造諸惡邪見等業故云非道修十善菩提道法故云道也對非道而言正道因正道而言非道求其正道及與非道了不可得故曰非道說道道說非道也六道即凡非六道即聖因凡說聖因聖說凡如是究竟凡聖之相實不可得故曰非六道衆生說六道衆生六道衆生說非六道衆生也魔外即佛佛即魔外魔界佛界求其異體亦不可得故曰非佛說佛佛說非佛也如是體性虗空地平等境界無有延促無有善惡無有聖凡無魔無佛一時俱是一時俱非逆行順行逆說順說無非方便無非佛事所謂或是或非人不識逆行順行天莫測也而入出諸佛體性三昧中者謂此菩薩若入若出或隱或現皆不離諸佛體性三昧中得大自在也以下十種智照發明出入諸佛體性三昧中不思議境界之義反照順照逆照者謂反照本來時云何順無明流逆真如理起一切染法復云何順真如理逆無明流起一切淨法故云反照等也前照後照因照果照者謂前照無始無明不覺之苦因後照生生死死業繫之苦果又前照始覺清淨之樂因後照本覺究竟之樂果故云前照等也空照有照第一中道義諦照者謂空照照真離一切相有照照俗即一切法是以照真非真照俗非俗二邊不住中道不立離即俱非故云第一中道義諦照也如是十種智照惟是八地所證其在下地菩薩各所不及何故謂此菩薩所證真如不動不到以離動到相故不出不入以離出入相故不生不滅以離生滅相故於此智定照與照者同時寂滅也是地法門品無量無量不可說不可說今以略開地中百千分一毛頭許事羅漢品中已明此總結顯所證一切功德以明解脫心也是地法門等者謂此菩薩所證一切法門無量無量不可說不可說法品無有限量非言說所及者今略開地中功德百千萬億分中如一毛頭許事而已此處略說大部內羅漢品中已明斯義九體性華嚴地二初明斷證義二正釋文義初明斷證義此地菩薩斷一種不欲行障此即所知障中俱生法執一分利樂有情事中不欲勤行所起故名之也並斷二種愚執一者陀羅尼愚二者辨才自在愚此之三法能障九地斷此愚障方登善慧地謂此菩薩今得十種無礙智用現前于諸智中最為殊勝繇此智用無礙便能永斷愚障既斷能轉清淨大法之輪是以善用其慧故名善慧地所證真如名智自在真如謂此真如智用自在以四無礙智所依止故菩薩寄位三禪天王作中千世界主以一乘法化導衆生於十波羅蜜中力波羅蜜最勝二正釋文義若佛子菩提薩埵佛華嚴體性地以佛威儀如來三昧自在王王定出入無時於十方三千世界百億日月百億四天下一時成佛轉法輪乃至滅度一切佛事以一心中一時示現一切衆生一切色身八十種好三十二相自在樂虗空同無量大悲光明相好莊嚴非天非人非六道一切法外而常行六道現無量身無量口無量意說無量法門而能轉魔界入佛界佛界入魔界復轉一切見入佛見佛見入一切見佛性入衆生性衆生性入佛性其地光光光照慧慧照明𦦨明𦦨無畏無量十力十八不共法解脫涅槃無為一道清淨若佛子三句標名德位以明勝進心也佛華嚴體性地者謂此菩薩所證境界與佛莊嚴等無差別華即行華嚴即佛果所謂修萬行因華莊嚴一乘佛果故別經名善慧地此菩薩善入諸佛種類善用諸佛平等大慧故名善慧地以佛威儀等者正明華嚴體性善慧之用此菩薩形儀如佛無二無別有威可畏降伏諸魔制諸外道此以折門化導衆生有儀可觀開化天人導引羣生此以攝門化導衆生以佛威儀是於動中化利衆生以如來三昧自在王是於靜中化利衆生如者即本覺義來者即始覺義以始本不二故又言來無所從去無所至無來無去故名如來自在王者以王即自在義王定出入無時者申明自在體用之義以顯法身能現報身境界此菩薩若動若靜若來若去若坐若臥四威儀中皆以如來三昧自在王定出入無時所謂默時說說時默大施門開無壅塞也於十方三千等者以顯報化二身不離法身境界良以法身遍一切處猶若虗空應物現形如水中月以是法身無形無相能現於色故於十方三千世界百億日月百億四天下中一時示現成佛一時示現轉正法輪一時示現度脫衆生乃至一時示現入於涅槃一切種種佛事皆以一念心中一時示現於一切衆生前不先不後所現一切法身皆具八十種好三十二相自在大樂與虗空同具足無量大悲無量光明無量相好無量莊嚴非天非人亦非六道是何境界即一切法二諦界外不墮數量以是非天現天非人現人乃至非六道身而能常行六道但隨衆生所見所聞種種不同隨機示現無量身無量口無量意說無量法門品以是三輪妙用而能即轉魔界入於佛界或轉佛界入於魔界或轉一切諸見而入佛見或轉佛見入一切見轉衆生性而入佛性復轉佛性入衆生性如是種種轉變無有二相且又不止此等境界其地智光光光照慧慧照互察諸法而無窮盡光光照者即光與光相照以智能照境故慧慧照者即慧與慧相照以慧能了境故明𦦨明𦦨即智慧威猛相以破所知無迹象故無畏是智慧無障礙無量即智慧無間斷以此光不屬情境是本智慧光明所聚故云無畏無量也十力等者此推廣所言也謂此菩薩不但只得光明而已更得具足如來十力十八不共等法及證解脫涅槃無為一道清淨之理所謂智光照無量方便無窮盡也而以一切衆生作父母兄弟為其說法盡一切劫得道果又現一切國土身為一切衆生相視如父如母天魔外道相視如父如母此明住無間心也以顯菩薩大慈大悲大誓大願力故而以十方四生六道一切衆生作父母報恩想作弟兄扶持想種種方便為其說法盡一切劫必使俱得道果始滿菩薩度生本願此即卑劣行門之遠因緣攝受中下衆生機宜故又現一切國土身相為令一切衆生各各相視如父如母又令天魔外道相視如父如母此即尊勝行門之近因緣攝受上根衆生機宜故住是地中從生死際起至金剛際以一念心中現如是事而能轉入無量衆生界如是無量略說如海一滴此明解脫心義以結當地功德不可思議也言住是地中者此舉人顯德也此菩薩住是地中從無明不覺生死輪際起至究竟本覺金剛輪際止於其中間所有凡聖迷悟染淨修斷因果一切差別法門而以一念心中如彈指頃示現如是等事而能轉入無量諸衆生界使解脫故如是無量無邊不可稱說功德之相略而說之如大海水毛頭一滴相似十體性入佛界地二初明斷證義二正釋文義初明斷證義此地菩薩斷一種未得自在障此即所知障中俱生法執一分法味自在所起能障大法智雲及所起事業不現在前故名之也並斷二種愚執一者現大神通愚二者微細祕密愚此之三法能障十地斷此愚障方登法雲地菩薩法身圓滿性智清淨空有兩忘極證中道之理便能斷盡愚障既斷故智慧雲彌滿法界雨大法雨充足一切枯槁衆生故名法雲地所證真如名業自在真如一切業惑悉得解脫與真如理得相應故菩薩寄位四禪天王作大千世界主演一乘法教化衆生於十波羅蜜中智波羅蜜最勝餘諸波羅蜜一切功德至此俱得圓滿具足二正釋文義二初明所證德二結讚法門初明所證德若佛子菩提薩埵入佛界體性地其大慧空空復空空復空如虗空性平等智有如來性十功德品具足空同一相體性無為神虗體一法同法性故名如來應順四諦二諦盡生死輪際法養法身無二是名應供遍覆一切世界中一切事正智聖解脫智知一切法有無一切衆生根故是正遍知明明修行佛果時足故是明行足善逝三世佛法法同先佛法佛去時善善來時善善是名善善是人行是上德入世間中教化衆生使衆生解脫一切結縛故名世間解脫是人一切法上入佛威神形儀如佛大士行處為世間解脫調順一切衆生名為丈夫於天人中教化一切衆生咨受法言故是天人師妙本無二佛性玄覺常常大滿一切衆生禮拜故尊敬故是佛世尊一切世人咨受奉教故是佛地是地中一切聖人之所入處故名佛界地若佛子三句標顯名德位以明勝進心也入佛界體性地者此菩薩所證一切理智行願諸功德藏即與十方諸佛所證境界等無差別故名入佛界體性地別經名法雲地菩薩現無邊身雲說無邊法雨故名法雲地其大慧空等者申明入佛境界以顯住無間心也其大慧空者即上空空復空空慧門其空既空空亦復空如是之空如虗空性等遍法界此即大圓無垢理聚圓極乃即法身境界法身無相十方平等故云其大慧空空亦復空空亦復空即如虗空性也平等智有如來性者此即平等性智智聚圓明乃即報身境界以是報身而證法身故云有如來性十功德品具足者此即成所作智而功德聚圓成乃即化身境界而此化身以修諸波羅蜜而成故云十功德品具足空同一相等者釋上十功德品以明菩薩三身圓顯十號齊彰不即不離之義何名十功德品一者如來空同一相體性無為此二句者顯本法身以本法身如來無所從來亦無所去猶若虗空無有色相迭相見故以是體性本自無為離於施作故云空同一相體性無為是也神虗體一法同法性此二句者顯報身佛與應身佛以報化佛神妙不測虗徹靈通應周沙界其體無殊而所現身即是法身是以心佛衆生平等平等所云神虗體一法同法性故名如來二者應供謂即應順四諦二諦供也四諦有四四諦一聲聞人乃應生滅四諦二緣覺人即應無作四諦三菩薩人以應無生四諦四如來者以應無量四諦二諦即是真諦俗諦以如來五住究盡二死永亡萬行圓成福慧具足圓應四諦二諦之供乃至盡生死輪真如實際即以四諦二諦之法滋養法身無有二相普現法界饒益衆生是名應供號也三者正遍知其義有二一者遍知即以能證正智及本所證一切聖解脫智周遍普覆一切界中了知一切染淨諸法若有若無一切聖凡根性差別緣起之事無不明了是名遍知二者正知謂即了知一切諸法皆如實相無二法故是名正知二義合言是名正遍知也四者明行足明即三明行即萬行謂從因地發心以智慧覺明明修行萬行因華智慧光明至佛果時福慧二嚴圓滿具足所以稱兩足尊故云明行足也五者善逝謂善往返三界示現受生出家入山修行成道轉法以化衆生示現涅槃此乃三世諸佛道法佛佛道同古佛儀式法同先佛法也佛去時善善應緣而來示成正覺而來實無所從去來吉祥是名善善也六者世間解謂是地人能行諸佛善善上德以是現身入世間中廣設教乘開化衆生使諸衆生解脫結習業繫等縛名世間解脫也七者無上士謂是聖人能於一切法上入佛威神形儀如佛是以大士行處一切世中解脫無能過者名無上士也八者調御丈夫調謂調理如能醫者善調一切衆病御謂駕御如善御者善治象馬世尊乃是三界醫王四生慈父善能除諸衆生身心二病使諸衆生離苦得樂善調善御而恆順之名調御丈夫也九者天人師謂於天上人間四衆八部衆中教化一切衆生能使一一咨受法言深解獲益名天人師也十者佛世尊謂妙本無二者即性覺妙明本覺明妙以是性妙本覺無二無相佛性玄覺充滿法界不即不離不隨不變常常大滿其中妙本無二即本法身佛性玄覺即是應身常常大滿乃即報身亦名自覺覺他覺行圓滿三身圓具三覺果滿乃名曰佛能使一切衆生禮拜故尊敬故乃名世尊二義合言故名佛世尊也上明十號之義下明入佛界地之義入者趨入也謂以一切世人咨受奉教一心皈命以有歸覺路故是為佛地言此佛地能增長一切衆生法身慧命菩提稼苗故名佛地是地中一切聖人之所入處故名佛界地二義合言故首言入佛界地仁王般若經云十方法界一切如來皆依此門而得成佛若言越此得成佛者是為諸魔所說非是佛說故云一切聖人之所入處也二結讚法門二初本土主伴讚二他方主伴讚初本土主伴讚二初本土佛與記二本土伴讚歎初本土佛與記爾時坐寶蓮華上一切與授記歡喜法身手摩其頂此明究竟圓滿證入妙覺果海以顯解脫心也言爾時坐寶蓮華上盧舍那佛及千華上千釋迦佛千百億釋迦佛乃至一切諸佛皆與此法雲地菩薩授記即當成佛劫國莊嚴等事歡喜踊躍同以法身清淨光明網相光手而摩其頂勸轉法輪也二本土伴讚歎同見同學菩薩異口同音讚歎無二同見同一見解謂即同見真如法身實相理也同學同一師學謂同學菩薩道同授灌頂職也以是同學菩薩皆悉異口同音讚歎無二也二他方主伴讚二初請轉法輪二讚勝功德初請轉法輪又有百千億世界中一切佛一切菩薩一時雲集請轉不可說法輪虗空藏化導法門上言授記此言佛及菩薩同時請轉法輪者正欲廣傳流通此道使天上人間化化不絶也華嚴十地品云此地菩薩以自願力起大悲雲現種種身周旋往返於一念頃普遍十方百億那繇他世界微塵國土演說大法請轉法輪與此義互相發明二讚勝功德是地有不可說奇妙法門品奇妙三明三昧門陀羅尼門非下地凡夫心識所知唯佛佛無量身口心意可盡其源如光音天品中說十無畏與佛道同此總結顯當地功德微妙難窮奇特殊勝也謂不但具足虗空藏化導法門而已更有不可心思言議奇妙廣大法門品奇妙三明智慧門奇妙三昧定力門奇妙陀羅尼總持門此諸法門非下地菩薩及凡夫心識所能知之唯佛與佛現無量身口心意乃可盡說其源所謂惟證乃知難可測也法華云唯佛與佛乃能究盡諸法實相義同此處文義如大部中光音天品所說十無畏與佛道同而無差別也心地法門乃十方如來及大菩薩自住三摩地中受用境界凡我博地凡夫依文解義於教海中究其心源是則名為因戒生定因定發慧如法修行同證如來三摩地中無二相矣
